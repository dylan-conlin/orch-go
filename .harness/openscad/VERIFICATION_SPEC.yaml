# VERIFICATION_SPEC.yaml — validate.scad base/project split
# Beads ID: orch-go-d9r0a

deliverables:
  - path: .harness/openscad/lib/validate.scad
    type: source-update
    description: "Updated header to mark as BASE (refreshable), with directive not to add project-specific validators"
    verification: "grep 'BASE' .harness/openscad/lib/validate.scad && grep 'validate-project.scad' .harness/openscad/lib/validate.scad"

  - path: .harness/openscad/lib/validate-project.scad
    type: new-file
    description: "Project-owned extension file with documentation, examples, and call-site parameterization guidance"
    verification: "test -f .harness/openscad/lib/validate-project.scad && grep 'project-owned' .harness/openscad/lib/validate-project.scad"

  - path: .harness/openscad/CLAUDE.md
    type: docs-update
    description: "Updated directory structure (shows both validate files) and Parameter Validation section (documents split pattern and call-site parameterization)"
    verification: "grep 'validate-project.scad' .harness/openscad/CLAUDE.md && grep 'Call-site parameterization' .harness/openscad/CLAUDE.md"

  - path: .harness/openscad/parts/bracket.scad
    type: source-update
    description: "Added use <../lib/validate-project.scad>"
    verification: "grep 'validate-project.scad' .harness/openscad/parts/bracket.scad"

  - path: .harness/openscad/parts/cable-clip.scad
    type: source-update
    description: "Added use <../lib/validate-project.scad>"
    verification: "grep 'validate-project.scad' .harness/openscad/parts/cable-clip.scad"

  - path: .harness/openscad/parts/enclosure.scad
    type: source-update
    description: "Added use <../lib/validate-project.scad>"
    verification: "grep 'validate-project.scad' .harness/openscad/parts/enclosure.scad"

  - path: .harness/openscad/parts/gear.scad
    type: source-update
    description: "Added use <../lib/validate-project.scad>"
    verification: "grep 'validate-project.scad' .harness/openscad/parts/gear.scad"

automated_verification:
  - command: "grep -c 'validate-project.scad' .harness/openscad/parts/*.scad"
    expected: "All 4 parts files include validate-project.scad"
  - command: "grep 'BASE' .harness/openscad/lib/validate.scad"
    expected: "Header marks file as BASE (refreshable)"
  - command: "grep 'project-owned' .harness/openscad/lib/validate-project.scad"
    expected: "File documents project ownership"

manual_verification:
  - step: "Verify OpenSCAD renders still work with both use directives"
    command: "openscad -o /dev/null --backend manifold .harness/openscad/parts/bracket.scad"
    when: "When openscad CLI is available"

design_decisions:
  - decision: "validate-project.scad uses `use <validate.scad>` to import base validators"
    reason: "Project validators can compose on top of base validators without parts needing to know the dependency chain"
  - decision: "Call-site parameterization over wrapper modules or config files"
    reason: "OpenSCAD modules already accept default parameters — overriding at the call site is simpler and more transparent than indirection layers"
  - decision: "All parts include both use directives even when no project validators exist yet"
    reason: "Ensures project validators are available immediately when added, without requiring parts to be updated later"
