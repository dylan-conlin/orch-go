# VERIFICATION_SPEC.yaml — Layer 5 vision-check.sh gate
# Beads ID: orch-go-oimo2

deliverables:
  - path: .harness/openscad/gates/vision-check.sh
    type: gate-script
    description: "Layer 5 vision verification gate — multi-angle render + Claude vision analysis"
    verification: "File exists, is executable, tests pass"

  - path: .harness/openscad/test/test-vision-gate.sh
    type: test
    description: "10 tests for vision gate (8 structural, 2 LLM-dependent)"
    verification: "bash .harness/openscad/test/test-vision-gate.sh — 8 passed, 0 failed, 2 skipped"

  - path: .harness/openscad/parts/cable-clip-spec.md
    type: spec-update
    description: "Added verification viewpoints section (top-down, front, side)"
    verification: "grep 'Verification Viewpoints' .harness/openscad/parts/cable-clip-spec.md"

  - path: .harness/openscad/CLAUDE.md
    type: docs-update
    description: "Updated gate stack table from 4 to 5 layers"
    verification: "grep 'Vision verification' .harness/openscad/CLAUDE.md"

  - path: .harness/openscad/test/test-e2e-pipeline.sh
    type: test-update
    description: "Added Layer 5 to e2e pipeline test with --skip-l5 flag"
    verification: "grep 'Layer 5' .harness/openscad/test/test-e2e-pipeline.sh"

automated_verification:
  - command: "bash .harness/openscad/test/test-vision-gate.sh"
    expected: "ALL TESTS PASSED (8 passed, 0 failed, 2 skipped)"

manual_verification:
  - step: "Run with --with-llm to verify full Claude vision analysis"
    command: "bash .harness/openscad/test/test-vision-gate.sh --with-llm"
    when: "When claude CLI is available"

design_decisions:
  - decision: "Layer 5 is separate from Layer 4 (not a modification)"
    reason: "Different abstraction levels — L4 analyzes source code, L5 analyzes rendered output"
  - decision: "Viewpoint definitions live in spec files, not the gate script"
    reason: "What to verify is per-part/per-project; how to verify is generic"
  - decision: "Fail-open on all error paths"
    reason: "Advisory gate — should never block work due to infrastructure issues"

remaining_work:
  - "26-letter instrumented sweep for calibration data (dependency noted in task)"
  - "Precision/recall measurement once calibration data exists"
  - "Promote from advisory to blocking after measured precision >80%"
