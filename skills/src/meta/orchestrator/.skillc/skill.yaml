name: orchestrator
skill-type: policy
audience: orchestrator
spawnable: false
description: Always-loaded runtime policy for orchestrator agents. Guides every turn. Reference docs loaded on demand.
version: 4.0.0
token_budget: 6000 # v4: stripped to ~420 lines. Knowledge transfer only (routing, vocabulary, legibility). ≤4 behavioral norms. Hook-enforced constraints removed.
type: skill
output: SKILL.md
sources:
  - SKILL.md.template

# Load-bearing patterns: Hard-won guidance that MUST exist in compiled output.
# Registered per .kb/decisions/2026-01-08-load-bearing-guidance-data-model.md
# Run `skillc check` to verify patterns exist; missing patterns block deploy.
#
# v4 changes: Evidence-driven simplification per behavioral grammars model.
# Removed ~20 behavioral constraints (now hook-enforced, empirically non-functional in prompt).
# Retained ~47 knowledge items (routing tables, vocabulary, intent distinctions) + ≤4 behavioral norms.
# Hooks enforce: bash-write gate, git-remote gate, bd-close gate, investigation-drift nudge,
# spawn-ceremony nudge, spawn-context validation gate.
load_bearing:
  # Core delegation rule
  - pattern: 'You never implement'
    provenance: '2025-11 orchestrator doing investigations led to 3-day derailment; system blocked while orchestrator had nose buried in files'
    severity: error

  # Anti-option-theater rule - Dylan shouldn't filter Claude's brainstorm
  - pattern: 'Filter before presenting'
    provenance: '2026-01-08 Dylan observed option theater pattern - orchestrator presented 3 options including one clearly worse; shifted cognitive load to Dylan for filtering'
    evidence: 'orch-go-lv3yx epic description'
    severity: warn

  # System learning rule - January base uses "system failure" phrasing
  - pattern: 'system fail'
    provenance: '2025-12-25 Human compensating for system gaps prevents system learning; documented after Dylan repeatedly pasted context system should have surfaced'
    evidence: '~/.kb/decisions/2025-12-25-pressure-over-compensation.md'
    severity: warn

  # Frame collapse detection - January base uses 5-minute rule
  - pattern: '5-minute rule'
    provenance: "2026-01-06 Dylan couldn't distinguish orchestrator context-gathering from frame collapse (doing worker work); external signals required"
    evidence: '.kb/investigations/2026-01-06-inv-detect-orchestrator-frame-collapse-doing.md'
    severity: warn

  # Agent tool spawn prohibition - must NOT be used as spawn mechanism
  - pattern: 'Agent tool'
    provenance: '2026-03-05 Orchestrator used Agent tool with worktree isolation to spawn workers, bypassing all spawn infrastructure (hooks, skills, tracking). 20min wasted, 2 failed agents.'
    evidence: '.kb/investigations/2026-03-05-inv-post-mortem-price-watch-orchestration.md'
    severity: error
