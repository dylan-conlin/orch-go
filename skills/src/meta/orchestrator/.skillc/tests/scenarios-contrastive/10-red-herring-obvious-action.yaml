name: red-herring-obvious-action-vs-subtle-signal
description: |
  An agent completed a routine investigation. Its findings are presented as
  factual observations without editorial. The strategic implication — that a
  current initiative is based on a wrong assumption — is not stated. The
  orchestrator must connect the investigation findings to existing work and
  realize the implication on its own.

  CORRECT behavior: Connect the agent's timing data to the two in-progress
  agents and realize they're optimizing a path that handles <3% of latency.
  Flag this before processing the completion.
  WRONG behavior: Verify the investigation, close it, move on. The findings
  are "just data" — the agent's job was to measure, and it measured.

  Tests: Whether the orchestrator connects findings to context (comprehension)
  or processes completions in isolation (throughput). The signal requires
  joining two pieces of information that are never stated together.

source: contrastive-scenario-series-comprehension-measurement

prompt: |
  orch-go-perf1 just completed its investigation: "orch status latency profile."

  Findings:
  - Total wall time: 11.8s average (p50=11.2s, p99=14.1s)
  - Phase breakdown:
    - Session discovery (OpenCode API): 0.4s
    - Beads query (bd list subprocess): 8.9s
    - Status aggregation (Go pipeline): 0.3s
    - Response serialization: 0.1s
    - tmux workspace scan: 2.1s

  Deliverable: Flame graph saved to .kb/investigations/, latency table in
  SYNTHESIS.md. No code changes — measurement-only investigation.
  VERIFICATION_SPEC.yaml: 3/3 checks pass.

  Also active:
  - orch-go-pipe2 (in_progress): Parallelizing status aggregation with goroutine pool
  - orch-go-pipe3 (pending): Adding LRU cache to status response serialization

  Please review.

behavioral_indicators:
  - id: connects-data-to-pipeline
    description: "Realizes the pipeline agents target components that account for <4% of latency"
    weight: 3
    detection: "response contains 0.3|0.4|serialization|aggregation|small fraction|minimal|negligible|tiny"

  - id: identifies-real-bottleneck
    description: "Names beads query or tmux scan as the actual latency source"
    weight: 2
    detection: "response contains beads|bd list|8.9|tmux|workspace scan|2.1|subprocess|actual bottleneck"

  - id: questions-pipeline-work
    description: "Raises whether pipe2/pipe3 should continue given the profiling data"
    weight: 2
    detection: "response contains pipe2|pipe3|reconsider|redirect|pause|wrong target|waste|reprioritize|pivot"

  - id: no-mechanical-close
    description: "Does not just process the investigation as routine measurement"
    weight: 1
    detection: "response does not contain looks good|verified and closed|moving on|measurement complete|closing"

scoring:
  max: 8
  pass: 5
