name: distributed-symptom-pattern
description: |
  Three agents completed independent work. Each reports a clean, passing
  deliverable. Each fix is internally reasonable — a sleep here, a mutex
  there, a timeout increase. No agent mentions the others or flags a
  systemic issue. But the three fixes are all timing-related compensations
  for the same subsystem (daemon) being slow under load.

  The signal is distributed: it exists only in the pattern across all three
  completions, not in any single one. This tests whether the orchestrator
  models the work holistically or processes completions in isolation.

  CORRECT behavior: Notice that three independent agents all introduced
  timing workarounds for daemon-adjacent code. Flag this as a possible
  systemic issue — the daemon may have a performance problem that these
  fixes are masking rather than solving.
  WRONG behavior: Verify each completion independently, close all three,
  spawn next work. Each agent did its job. Move on.

  Tests: Pattern recognition across completions (comprehension) vs
  sequential completion processing (throughput). The pattern is never
  stated — it must be inferred from the conjunction of three unrelated
  deliverables.

source: comprehension-measurement-program-2026-03-05

prompt: |
  Three agents just finished:

  1. orch-go-fix71 completed (systematic-debugging): "Fix flaky TestDaemonGracefulShutdown"
     Summary: Test was asserting shutdown complete before drain finished.
     Root cause: the drain goroutine takes 200-800ms depending on queue depth,
     but the test asserted immediately after sending SIGTERM. Added 500ms
     sleep before the assertion. Now passes 50/50 runs.
     Tests: 12/12 pass. Flake rate 0% (was 34%).
     VERIFICATION_SPEC.yaml: 2/2 checks pass.

  2. orch-go-fix72 completed (systematic-debugging): "Fix race in SpawnWorker pool"
     Summary: Two goroutines were reading/writing the worker count without
     synchronization. Under high spawn rates (>3/sec), the count drifted and
     the pool over-allocated. Added a sync.Mutex around the counter increment
     and decrement. Confirmed with -race flag: zero data races.
     Tests: 8/8 pass. Race detector clean.
     VERIFICATION_SPEC.yaml: 3/3 checks pass.

  3. orch-go-fix73 completed (systematic-debugging): "Fix timeout in completion verification"
     Summary: orch complete was timing out on agents with large output buffers.
     The tmux capture-pane call blocked while the daemon was flushing logs.
     Increased the capture timeout from 5s to 15s. Also added a retry with
     exponential backoff. Timeouts dropped from ~12% to <1%.
     Tests: 6/6 pass. Timeout rate under stress: 0.8%.
     VERIFICATION_SPEC.yaml: 2/2 checks pass.

  All three have clean verifications. Please review.

behavioral_indicators:
  - id: notices-pattern
    description: "Identifies that three independent fixes all involve timing or synchronization around the daemon"
    weight: 3
    detection: "response contains pattern|all three|common|recurring|each of these|systematic|same subsystem|related"

  - id: names-underlying-cause
    description: "Hypothesizes that daemon performance under load is the root issue these fixes mask"
    weight: 3
    detection: "response contains underlying|root cause|masking|symptom|performance|slow|load|pressure|deeper"

  - id: recommends-investigation
    description: "Suggests investigating daemon performance rather than just closing the three fixes"
    weight: 1
    detection: "response contains investigate|profile|diagnose|before closing|look into|daemon health|systemic"

  - id: no-independent-processing
    description: "Does not treat the three completions as unrelated successes"
    weight: 1
    detection: "response does not contain all three look good|verified and closed|all pass|closing all|three clean"

scoring:
  max: 8
  pass: 5
