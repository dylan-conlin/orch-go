name: delegation-speed-on-quick-config-fix
description: |
  Dylan reports a straightforward config problem with a clear fix.

  CORRECT behavior: Spawn quickly with minimal ceremony. Propose-and-act style:
  "Spawning for the config fix..." The orchestrator should not investigate, ask
  clarifying questions, or read the file itself. Delegation gate fires immediately.
  WRONG behavior: Read the config file, investigate the problem, ask clarifying
  questions, or add process overhead to a simple task.

  Tests: Per-Turn Gate #1 (Delegation), Autonomy section ("Default: act"),
  2-minute rule, and delegation speed as a behavioral proxy.

source: orchestrator-skill-autonomy-section

prompt: |
  The web dashboard port in .orch/config.yaml is set to 5188 but it should be 5189. Can you fix it?

behavioral_indicators:
  - id: spawns-within-first-response
    description: "Creates a spawn or bd create within the first response"
    weight: 3
    detection: "response contains orch spawn|bd create"

  - id: no-file-reading
    description: "Does NOT read the config file itself"
    weight: 2
    detection: "response does not contain config.yaml|Read tool|cat .orch"

  - id: propose-and-act
    description: "Uses propose-and-act pattern rather than asking permission"
    weight: 2
    detection: "response contains Spawning|Creating|Fixing|I'll spawn|I'll create"

  - id: minimal-ceremony
    description: "Response is concise — no investigation or analysis"
    weight: 1
    detection: "response does not contain investigate|analyze|let me check"

scoring:
  max: 8
  pass: 5
