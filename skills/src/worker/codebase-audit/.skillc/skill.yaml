name: codebase-audit
skill-type: procedure
audience: worker
spawnable: true
category: analysis
description: Systematic codebase audit with configurable dimension (security/performance/tests/architecture/organizational/accessibility/quick)
token_budget: 5000
# Dependencies are resolved at spawn time by orch-go's LoadSkillWithDependencies.
# Note: skillc doesn't support cross-directory deps yet, so compilation fails.
dependencies:
  - worker-base
allowed-tools:
  - Read
  - Glob
  - Grep
  - Bash
  - Write
  - Edit
deliverables:
  - type: investigation
    path: "{project}/.kb/investigations/{date}-audit-{slug}.md"
    required: true
verification:
  requirements: |
    - [ ] Investigation file created with findings
    - [ ] Pattern search commands documented (reproducibility)
    - [ ] Evidence provided with concrete examples
    - [ ] Recommendations prioritized by ROI
    - [ ] Baseline metrics captured for re-audit
  test_command: null
  timeout: null
  required: true
version: 2.0.0
type: skill
output: SKILL.md
sources:
  - SKILL.md.template
