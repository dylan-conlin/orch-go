name: head-to-head
skill-type: procedure
audience: worker
spawnable: true
category: evaluation
description: Same task, two approaches. Use both, report qualitative comparison. Intentionally lightweight — boundaries, not methodology.
token_budget: 1500
dependencies:
  - worker-base
parameters:
  - name: task
    description: The task to perform with both approaches
    type: string
    required: true
  - name: approach_a
    description: First approach/tool/method
    type: string
    required: true
  - name: approach_b
    description: Second approach/tool/method
    type: string
    required: true
allowed-tools:
  - Read
  - Glob
  - Grep
  - Bash
  - Write
  - Edit
deliverables:
  - type: investigation
    path: '{project}/.kb/investigations/{date}-comparison-{slug}.md'
    required: true
verification:
  requirements: |
    - [ ] Agent used BOTH approaches on the same task
    - [ ] Report covers what each does well and what each struggles with
    - [ ] Comparison is from firsthand experience, not documentation
  test_command: null
  required: true
version: 1.0.0
type: skill
output: SKILL.md
sources:
  - SKILL.md.template
