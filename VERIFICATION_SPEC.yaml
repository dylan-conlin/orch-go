feature: TTL-based archived workspace expiry (30-day default)
beads_id: orch-go-g7id

verification:
  automated:
    - command: "go test ./cmd/orch/ -run TestCleanExpiredArchives -count=1 -v"
      expects: "4 tests pass (basic, dry-run, no-dir, fallback-modtime)"
    - command: "go test ./pkg/daemon/ -run TestExpireArchived -count=1 -v"
      expects: "2 tests pass (basic, no-dir)"
    - command: "go build ./cmd/orch/"
      expects: "builds cleanly"
    - command: "go vet ./cmd/orch/ ./pkg/daemon/ ./pkg/daemonconfig/"
      expects: "no warnings"

  manual:
    - step: "Run orch clean --workspaces --dry-run in orch-go project"
      expects: "Shows expired archived workspaces (if any >30 days old)"
    - step: "Run orch clean --workspaces --archived-ttl 7 --dry-run"
      expects: "Shows archived workspaces older than 7 days"

changes:
  - file: cmd/orch/clean_cmd.go
    what: "Added cleanExpiredArchives() function, --archived-ttl flag (default 30), wired into --workspaces flow"
  - file: cmd/orch/clean_test.go
    what: "Added 4 tests for cleanExpiredArchives (basic, dry-run, no-dir, modtime-fallback)"
  - file: pkg/daemon/cleanup.go
    what: "Extended defaultCleanup() to also expire archived workspaces, added expireArchivedWorkspaces()"
  - file: pkg/daemon/cleanup_test.go
    what: "Added 2 tests for expireArchivedWorkspaces"
  - file: pkg/daemonconfig/config.go
    what: "Added CleanupArchivedTTLDays field (default 30)"

tests:
  command: "go test ./cmd/orch/ -run TestCleanExpiredArchives -count=1 -v && go test ./pkg/daemon/ -run TestExpireArchived -count=1 -v"
  result: "6/6 pass"
