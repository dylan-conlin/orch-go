verification:
  automated:
    - command: "go build ./cmd/orch/"
      expectation: "Compiles cleanly"
    - command: "go test ./pkg/events/ -run TestLogGateDecision -v"
      expectation: "3 tests pass: Block, Bypass, AccretionPrecommit"
    - command: "go test ./cmd/orch/ -run TestGateDecision -v"
      expectation: "2 tests pass: TestGateDecisionStats, TestGateDecisionStats_Empty"
    - command: "go test ./pkg/events/ ./cmd/orch/ -count=1"
      expectation: "All existing tests still pass (no regressions)"

  manual:
    - step: "Run orch spawn without --bypass-triage"
      expectation: "Spawn blocked, events.jsonl gets spawn.gate_decision with gate_name=triage, decision=block"
    - step: "Run orch stats after gate events exist"
      expectation: "GATE DECISIONS section appears showing blocks/bypasses by gate"

  files_changed:
    - pkg/events/logger.go: "Added EventTypeSpawnGateDecision, GateDecisionData, LogGateDecision"
    - pkg/events/logger_test.go: "Added 3 tests for LogGateDecision"
    - pkg/orch/spawn_preflight.go: "Added logGateDecision calls at triage/verification/hotspot block/bypass points"
    - cmd/orch/precommit_cmd.go: "Added logPrecommitGateDecision calls at accretion block/bypass points"
    - cmd/orch/stats_types.go: "Added GateDecisionStats, GateDecisionEntry, GateSkillEntry types"
    - cmd/orch/stats_cmd.go: "Added spawn.gate_decision aggregation in event processing loop"
    - cmd/orch/stats_output.go: "Added GATE DECISIONS text output section"
    - cmd/orch/stats_test.go: "Added TestGateDecisionStats and TestGateDecisionStats_Empty"
