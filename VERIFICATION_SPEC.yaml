task: "events.jsonl monthly rotation to bound unbounded growth"
beads_id: orch-go-d4pzp
tier: light

verification:
  commands:
    - name: "Events package tests (rotation + learning + logging)"
      command: "go test -count=1 ./pkg/events/"
      expect: "all pass"
    - name: "Daemon package tests"
      command: "go test -count=1 ./pkg/daemon/"
      expect: "all pass"
    - name: "Verify package attempts tests"
      command: "go test -count=1 -run 'TestGetFixAttempt|TestGetAllRetry' ./pkg/verify/"
      expect: "all pass"
    - name: "Spawn backends + orch package tests"
      command: "go test -count=1 ./pkg/spawn/backends/ ./pkg/orch/"
      expect: "all pass"
    - name: "Binary compiles"
      command: "go build ./cmd/orch/"
      expect: "clean compile"

  manual_checks:
    - "After rebuild, new events write to ~/.orch/events-YYYY-MM.jsonl"
    - "orch stats reads from both legacy events.jsonl and rotated files"
    - "Daemon learning refresh works correctly with rotated files"
