files_changed:
  - cmd/orch/reject_cmd.go          # New command (~150 lines)
  - cmd/orch/reject_cmd_test.go     # Unit tests for category validation and flags
  - cmd/orch/main.go                # Register rejectCmd
  - pkg/events/logger.go            # EventTypeAgentRejected + AgentRejectedData + LogAgentRejected
