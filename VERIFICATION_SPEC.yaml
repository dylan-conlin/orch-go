task: Add architecture lint to pre-commit hook + compilation gate for agents
beads_id: orch-go-ptiq
date: 2026-03-01

verification:
  type: feature
  deliverables:
    - path: scripts/pre-commit-exec-start-cleanup.sh
      description: "Pre-commit gate: go build (compilation) + go test -run TestArchitectureLint (arch lint)"
  tests_run:
    - command: "./scripts/pre-commit-exec-start-cleanup.sh (with staged Go file)"
      result: "PASS - compilation gate + architecture lint passed in ~3s"
    - command: "./scripts/pre-commit-exec-start-cleanup.sh (no staged Go files)"
      result: "PASS - exits immediately (skip when irrelevant)"
  integration:
    - description: "bd shim at .git/hooks/pre-commit already calls scripts/pre-commit-exec-start-cleanup.sh if executable"
      evidence: "Line: if [ -x scripts/pre-commit-exec-start-cleanup.sh ]; then"
  leave_it_better:
    - stale_artifacts: "No stale artifacts encountered"
  notes:
    - "Script skips entirely when no Go files are staged (fast path for non-Go commits)"
    - "Uses -count=1 to prevent test caching (ensures fresh architecture check)"
    - "Existing architecture_lint_test.go enforces two-lane ADR constraints"
