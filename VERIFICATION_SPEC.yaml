task: Re-enable circuit breaker with redesigned 3-layer heuristics
beads_id: orch-go-cod2
date: 2026-03-01

verification:
  type: feature
  deliverables:
    - path: pkg/control/circuitbreaker.go
      description: "Circuit breaker functions: Ack, Resume, HaltStatus, HeartbeatAge, CircuitBreakerStatus"
    - path: pkg/control/circuitbreaker_test.go
      description: "8 tests for circuit breaker functions"
    - path: cmd/orch/control_cmd.go
      description: "CLI commands: orch control ack, orch control resume, updated status"
    - path: pkg/daemon/daemon.go
      description: "Daemon halt-file check before spawning"
    - path: pkg/daemon/circuitbreaker_test.go
      description: "2 daemon integration tests for halt-file blocking"
  tests_run:
    - command: "go test ./pkg/control/ -run 'TestAck|TestHeartbeat|TestHalt|TestResume|TestCircuitBreaker|TestDefault' -v"
      result: "PASS - 8 tests"
    - command: "go test ./pkg/daemon/ -run 'TestOnceExcluding_HaltFile|TestOnceExcluding_NoHaltFile' -v"
      result: "PASS - 2 tests"
    - command: "go build ./cmd/orch/ && go vet ./cmd/orch/ ./pkg/control/ ./pkg/daemon/"
      result: "PASS - builds clean, no vet warnings"
  integration:
    - description: "Post-commit hook re-enabled in .git/hooks/post-commit"
      evidence: "Uncommented: [ -x $HOME/.orch/hooks/control-plane-post-commit.sh ] && ..."
    - description: "Shell hook renamed from .disabled to active"
      evidence: "~/.orch/hooks/control-plane-post-commit.sh (was .disabled)"
    - description: "Heartbeat refreshed (was 13+ days stale)"
      evidence: "touch ~/.orch/heartbeat"
  manual_verification:
    - step: "orch control ack → 'Heartbeat acknowledged.'"
    - step: "orch control status → shows circuit breaker OK + heartbeat age"
    - step: "echo 'reason: test' > ~/.orch/halt → orch control status → HALTED"
    - step: "orch control resume → clears halt + refreshes heartbeat"
  leave_it_better:
    - stale_artifacts: "No stale artifacts encountered"
