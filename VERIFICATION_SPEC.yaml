task: "Design living threads system for mid-session comprehension capture"
beads_id: orch-go-kgxtt
type: architect
tier: light

deliverables:
  - path: ".kb/investigations/2026-03-05-design-living-threads-mid-session-comprehension.md"
    description: "Design document with 5 findings, 5-phase implementation plan"
    status: complete

design_decisions:
  - decision: "New orch thread command vs extending debrief"
    choice: "New orch thread command group"
    rationale: "Threads are mid-session; debrief is terminal"

  - decision: "Thread file format"
    choice: "YAML frontmatter + dated H2 sections"
    rationale: "Supports accumulation, consistent with .kb/ conventions"

  - decision: "Thread lifecycle"
    choice: "forming → active → resolved (with promotes-to)"
    rationale: "Natural insight maturation with promotion path"

  - decision: "Debrief content source"
    choice: "Agent completion reasons → What Happened; threads → What We Learned"
    rationale: "Agent explain-back is reporting, not comprehension"

  - decision: "Relationship to synthesis-as-comprehension"
    choice: "Extends as Phase 4 (mid-session capture)"
    rationale: "Phases 1-3 are boundary; Phase 4 is mid-session"

implementation_phases:
  - phase: 1
    name: "Thread Artifact + CLI"
    self_contained: true
  - phase: 2
    name: "Debrief Integration"
    depends_on: [1]
  - phase: 3
    name: "Orient Integration"
    depends_on: [1]
  - phase: 4
    name: "Knowledge Placement + Skill Update"
    depends_on: [1]
  - phase: 5
    name: "Lifecycle Automation (Optional)"
    depends_on: [1]

manual_verification:
  - "Review design for alignment with synthesis-as-comprehension plan"
  - "Validate thread format consistency with .kb/ conventions"
