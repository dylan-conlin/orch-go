    result: PASS

  unit_tests:
    command: go test -v -count=1 -run "^TestLogAgentRejected" ./pkg/events/
    result: "PASS (2 tests: TestLogAgentRejected, TestLogAgentRejected_OmitsEmptyOptionals)"

