design_match:
  source: .kb/investigations/2026-03-20-inv-design-accretion-response-layer-wire.md
  mechanism: "Mechanism 1: orch reject"
  args: "<beads-id> <reason> (both mandatory)"
  flags: "--category [quality|scope|approach|stale] (default quality), --workdir"
  actions:
    - Validate beads ID exists and is closed
    - Check for existing rejected label (dedup)
    - Reopen issue via bd reopen
    - Add rejection comment with category
    - Emit agent.rejected event
