task: "Integrate active plans into orch orient"
beads_id: orch-go-4ezmg

verification:
  automated:
    - command: "go test ./pkg/orient/ -v -count=1"
      expects: "PASS (49 tests)"
      covers:
        - Plan file parsing (active, completed, superseded status filtering)
        - Phase extraction with status markers
        - TLDR extraction
        - Projects list parsing
        - Empty/nonexistent directory handling
        - Format output with active plans section
        - Format output without plans (no section shown)

    - command: "go build ./cmd/orch/"
      expects: "exit 0"
      covers:
        - orient_cmd.go compiles with plan collection wired in

  manual:
    - step: "Create an active plan in .kb/plans/ and run 'orch orient'"
      expects: "Active plans section appears with title, projects, TLDR, and phase checklist"
      result: "VERIFIED - plan showed with [>] marker for in-progress phase"

    - step: "Run 'orch orient --json' with active plan"
      expects: "active_plans array in JSON output with name, title, status, tldr, projects, phases"
      result: "VERIFIED - full JSON structure present"
