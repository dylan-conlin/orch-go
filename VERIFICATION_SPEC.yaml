task: "Wire daemon audit verdict processing to orch reject"
beads_id: orch-go-ie81t
tier: light

verification:
  commands:
    - name: "Audit verdict unit tests"
      command: "go test ./pkg/daemon/ -run 'TestParseAuditVerdict|TestReadAuditVerdict|TestProcessAuditVerdict' -count=1 -v"
      expect: "14 PASS, 0 FAIL"
    - name: "Full daemon test suite (regression)"
      command: "go test ./pkg/daemon/ -count=1 -timeout 120s"
      expect: "ok (no regressions)"
    - name: "Full project build"
      command: "go build ./..."
      expect: "clean compile"

  manual_checks:
    - "AUDIT_VERDICT.md format documented in ParseAuditVerdict godoc"
    - "Rejector and AuditLabeler interfaces added to Daemon struct"
    - "processAuditVerdictIfPresent wired into CompletionOnce after successful completion"
    - "Low-confidence FAIL labels audit:needs-review instead of auto-rejecting"
    - "PASS removes audit:deep-review label"
    - "Events audit.failed and audit.passed logged for traceability"
