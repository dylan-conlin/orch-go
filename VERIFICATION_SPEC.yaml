task: "Enhance orch debrief with comprehension support"
beads_id: orch-go-d5rdt

verification:
  automated:
    - command: "go test ./pkg/debrief/ -v"
      expects: "22 tests pass including 9 new quality heuristic tests"
      result: "PASS — all 22 tests pass (0.004s)"

  smoke:
    - command: 'orch debrief --dry-run --learned "X because Y"'
      expects: "What We Learned section contains the learned item"
      result: "PASS"

    - command: "orch debrief --dry-run --quality"
      expects: "ADVISORY warnings for missing_connectives"
      result: "PASS — missing_connectives warning emitted"

    - command: 'orch debrief --dry-run --quality --learned "X because Y"'
      expects: "Quality: PASS"
      result: "PASS"

    - command: 'orch debrief --learned "test"'
      expects: "Thread/Insight/Position comprehension prompt printed after summary"
      result: "PASS"

  build:
    command: "go build ./cmd/orch/"
    result: "PASS — compiles cleanly"

deliverables:
  - pkg/debrief/quality.go
  - pkg/debrief/quality_test.go
  - cmd/orch/debrief_cmd.go
