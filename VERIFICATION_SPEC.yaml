task: "Hook: Phase reporting timer - enforce first-3-actions phase comment"
beads_id: orch-go-k1y28

verification:
  automated:
    - command: "cd ~/.orch/hooks && python3 -m pytest test_enforce_phase_startup.py -v"
      expects: "19 passed"
      covers:
        - is_spawned_worker detection (worker, non-spawned, orchestrator)
        - is_phase_comment detection (bd comment, bd comments add, non-phase, non-bash, single quotes)
        - State file save/load round-trip
        - Grace period (first 3 calls silent)
        - Phase comment auto-detection and caching
        - Nudge at call 4-5 (allow + additionalContext)
        - Block at call 6+ (deny)
        - Beads fallback check with caching
        - Short-circuit when phase already cached
        - Non-worker and no-beads-id pass-through

  manual:
    - step: "Register hook in ~/.claude/settings.json PreToolUse array (no matcher)"
      expects: "Hook fires on all tool calls for spawned workers"
      instruction: |
        Add to hooks.PreToolUse:
        {
          "hooks": [
            {
              "type": "command",
              "command": "$HOME/.orch/hooks/enforce-phase-startup.py",
              "timeout": 10
            }
          ]
        }

behavior:
  grace_period: "First 3 tool calls allowed unconditionally"
  nudge: "Calls 4-5: allow + PHASE REPORTING OVERDUE warning"
  block: "Calls 6+: deny until Phase: reported via bd comment"
  auto_allow: "bd comment with Phase: always allowed and sets phase_found=true"
  caching: "Once phase found, no further bd show checks (O(1) short-circuit)"
  scope: "CLAUDE_CONTEXT=worker AND ORCH_SPAWNED=1 AND ORCH_BEADS_ID set"
