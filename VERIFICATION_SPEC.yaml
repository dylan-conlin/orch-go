task: "Add focus-aware priority boost to daemon issue selection"
beads_id: orch-go-2np1g

deliverables:
  - path: pkg/daemon/focus_boost.go
    description: "Focus boost logic: matchFocusToProject, applyFocusBoost, BuildProjectDirNames"
  - path: pkg/daemon/focus_boost_test.go
    description: "11 tests covering matching, boosting, integration with NextIssue/Preview"

tests:
  command: "go test ./pkg/daemon/ -run 'Focus|Boost' -v"
  result: "11 passed"

verification:
  automated:
    - command: "go test ./pkg/daemon/ -run 'Focus|Boost' -v"
      expect: "PASS"
    - command: "go test ./pkg/daemon/"
      expect: "ok (no regressions)"
    - command: "go build ./..."
      expect: "builds cleanly"

  manual:
    - step: "Set focus: orch focus 'price-watch', run orch daemon preview"
      expect: "PW issues show boosted priority, preview shows focus line"
    - step: "Clear focus: orch focus clear, run orch daemon preview"
      expect: "No boost applied (backward compatible)"

notes:
  - "Focus matching works via: (1) issue prefix directly in goal text, (2) project dir basename via ProjectRegistry"
  - "Boost default is 1 level (P2 → effective P1), clamped at P0"
  - "applyFocusBoost copies issue slice to avoid mutating callers"
  - "Wired into: daemon run loop, once, dry-run, and preview commands"
