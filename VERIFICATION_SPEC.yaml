type: feature
deliverables:
  - path: cmd/orch/spawn_cmd.go
    description: "--explore-depth and --explore-judge-model flags with validation (depth 1-5)"
    verification: go build ./cmd/orch/ compiles; flag validation rejects depth 0 and 6
  - path: pkg/spawn/config.go
    description: "ExploreDepth and ExploreJudgeModel fields on Config struct"
    verification: "Fields present, threaded through context generation"
  - path: pkg/spawn/context.go
    description: "Iteration protocol and cross-model judge in SPAWN_CONTEXT template (conditional on depth > 1)"
    verification: go test ./pkg/spawn/ -run TestExplore -count=1
  - path: pkg/orch/spawn_types.go
    description: "ExploreDepth and ExploreJudgeModel on SpawnContext"
    verification: "Fields present, passed through BuildSpawnConfig"
  - path: pkg/events/logger.go
    description: "exploration.iterated event type with ExplorationIteratedData struct and LogExplorationIterated method"
    verification: go test ./pkg/events/ -run TestLogExplorationIterated -count=1
  - path: cmd/orch/emit_cmd.go
    description: "exploration.iterated event support in orch emit command"
    verification: "Switch case handles exploration.iterated"
  - path: cmd/orch/serve_harness.go
    description: "TotalIterations and IteratedRuns fields in ExplorationMetrics"
    verification: go test ./cmd/orch/ -run TestBuildHarnessResponse_ExplorationWithIteration -count=1
  - path: skills/src/meta/exploration-orchestrator/SKILL.md
    description: "Phase 4b iteration loop instructions, cross-model judge guidance, convergence rules"
    verification: "Skill includes iteration phase, decision rules, convergence guard"
  - path: pkg/spawn/explore_test.go
    description: "Tests for depth bounds, iteration context, judge model context"
    verification: go test ./pkg/spawn/ -run TestExplore -count=1 -v
tests:
  commands:
    - go test ./pkg/spawn/ -run TestExplore -count=1
    - go test ./pkg/events/ -run TestLogExplorationIterated -count=1
    - go test ./cmd/orch/ -run TestBuildHarnessResponse_Exploration -count=1
    - go test ./... (full suite)
  result: All PASS
evidence:
  - claim: "Depth 1 (default) produces no iteration instructions"
    basis: "TestExploreContextGeneration checks 'no iteration at depth 1' and 'no depth display at 1'"
  - claim: "Depth >1 produces full iteration protocol with convergence guards"
    basis: "TestExploreDepthIterationInContext verifies iteration protocol, decision rules, event emission, budget display"
  - claim: "Cross-model judge model is injected into judge spawn command"
    basis: "TestExploreJudgeModelInContext checks '--model sonnet' in spawn command"
  - claim: "exploration.iterated event logs correctly"
    basis: "TestLogExplorationIterated verifies event type, iteration count, gaps_addressed, new_workers"
  - claim: "Harness tracks iteration metrics"
    basis: "TestBuildHarnessResponse_ExplorationWithIteration verifies TotalIterations=1, IteratedRuns=1"
