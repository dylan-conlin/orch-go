task: "Move OpenSCAD hooks to global (~/.orch/hooks/)"
beads_id: orch-go-fim6j
tier: light

verification:
  commands:
    - name: "Staged hooks don't crash on empty input"
      command: |
        python3 .orch/staging/hooks/gate-openscad-stl-cgal.py < /dev/null; echo "cgal: $?"
        python3 .orch/staging/hooks/gate-openscad-post-render.py < /dev/null; echo "render: $?"
        python3 .orch/staging/hooks/gate-architect-production-files.py < /dev/null; echo "architect: $?"
      expect: "All exit 0"

  manual_checks:
    - "Orchestrator deploys hooks per .orch/staging/hooks/DEPLOY.md"
    - "CGAL gate blocks STL export without --backend cgal in OpenSCAD project"
    - "Post-render gate finds gates/geometry-check.sh via git rev-parse"
    - "Architect gate reads .harness/config.yaml domain and blocks only in openscad projects"
    - "Non-OpenSCAD projects unaffected (no openscad commands, no domain config)"

  notes: |
    Governance hook blocked direct writes to ~/.orch/hooks/ — expected behavior.
    Hooks staged at .orch/staging/hooks/ with full deployment instructions.

    Key changes from originals:
    - gate-openscad-post-render.py: path resolution via git rev-parse instead of __file__-relative
    - gate-architect-production-files.py: domain detection via .harness/config.yaml guard
    - Both command-pattern hooks unchanged in logic (already self-filter on openscad presence)
