task: "Wire UserPromptSubmit hook for comprehension:pending queue count"
beads_id: orch-go-5ygdv
tier: light

verification:
  commands:
    - name: "Hook script exists and is executable"
      command: "test -x .claude/hooks/comprehension-queue-count.sh && echo PASS"
      expect: "PASS"

    - name: "Hook returns valid JSON with additionalContext"
      command: "bash .claude/hooks/comprehension-queue-count.sh | python3 -c 'import json,sys; d=json.load(sys.stdin); assert \"additionalContext\" in d; print(\"PASS\")'"
      expect: "PASS"

    - name: "Threshold escalation works"
      command: "COMPREHENSION_THRESHOLD=0 bash .claude/hooks/comprehension-queue-count.sh | grep -q 'OVER THRESHOLD' && echo PASS"
      expect: "PASS"

    - name: "Hook wired in settings.json"
      command: "python3 -c \"import json; d=json.load(open('.claude/settings.json')); assert 'UserPromptSubmit' in d['hooks']; print('PASS')\""
      expect: "PASS"

  manual_checks: []

  notes: |
    Hook runs bd list -l comprehension:pending -s closed --no-pager, counts items
    matching ^orch- pattern, and injects count as additionalContext.
    Threshold default: 5 (configurable via COMPREHENSION_THRESHOLD env var).
    Measured at ~50ms per invocation.
