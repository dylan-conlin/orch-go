  - claim: "Structured YAML verdict output"
    basis: "Complete YAML schema in SKILL.md with sub_findings, contested_findings, coverage_gaps, overall sections"
  - claim: "Contested findings surfaced as most valuable output"
    basis: "Dedicated contested_findings section in verdict, anti-pattern guidance, bias toward contested over rejected"
  - claim: "Judge is spawnable by exploration orchestrator"
    basis: "Orchestrator Phase 4 and SPAWN_CONTEXT template both reference 'orch spawn ... exploration-judge' command"
