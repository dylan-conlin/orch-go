task: "PreToolUse bash filter for git add -A/git add . in worker sessions"
beads_id: orch-go-zs9oc

deliverables:
  - path: ~/.orch/hooks/gate-worker-git-add-all.py
    description: "PreToolUse hook blocking blanket git add in worker sessions"

tests:
  command: "inline python3 test harness (10 cases)"
  result: "10 passed, 0 failed"
  cases:
    - "git add -A in worker → deny"
    - "git add --all in worker → deny"
    - "git add . in worker → deny"
    - "git add -A in chain in worker → deny"
    - "git add file.go in worker → allow"
    - "git add multiple files in worker → allow"
    - "git add -p in worker → allow"
    - "git add -A in orchestrator → allow"
    - "git add . with no context → allow"
    - "escape hatch SKIP_GIT_ADD_ALL_GATE=1 → allow"

manual_steps_required:
  - step: "Remove uchg flag: chflags nouchg ~/.claude/settings.json"
  - step: "Add hook entry to PreToolUse -> Bash hooks array in settings.json"
    snippet: |
      {
        "type": "command",
        "command": "$HOME/.orch/hooks/gate-worker-git-add-all.py",
        "timeout": 10
      }
  - step: "Re-apply uchg if desired: chflags uchg ~/.claude/settings.json"

notes:
  - "Worker-only gate (CLAUDE_CONTEXT=worker). Orchestrator and interactive sessions unaffected."
  - "Escape hatch: SKIP_GIT_ADD_ALL_GATE=1"
  - "~/.claude/settings.json has uchg flag — requires manual registration"
