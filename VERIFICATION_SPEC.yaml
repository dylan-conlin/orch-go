task: Implement orch skill lint command (5 static analysis rules)
beads_id: orch-go-12cf
date: 2026-03-01

verification:
  automated:
    - command: "go test ./pkg/skill/ -v"
      expectation: "12 tests pass (2-3 per rule x 5 rules + 1 integration)"
    - command: "go vet ./pkg/skill/ ./cmd/orch/"
      expectation: "No issues"
    - command: "go build ./cmd/orch/"
      expectation: "Clean build"

  manual:
    - step: "go run ./cmd/orch/ skill lint orchestrator"
      expectation: "Produces real output with cosmetic-redundancy warning and dead-constraint info"
    - step: "go run ./cmd/orch/ skill lint feature-impl"
      expectation: "Runs without error, shows dead-constraint info"

  rules_implemented:
    - name: must-density
      threshold: ">3 per 100 words"
      source: "DSL design principles investigation"
    - name: cosmetic-redundancy
      threshold: "same phrase >2 times"
      source: "Defense-in-depth investigation"
    - name: section-sprawl
      threshold: ">30 total constraints"
      source: "DSL general-purpose drift"
    - name: signal-imbalance
      threshold: "same behavior term >3 constraint lines"
      source: "Framework investigation (17:1 ratio)"
    - name: dead-constraint
      threshold: "any constraint without test coverage"
      source: "Defense-in-depth investigation"

  leave_it_better:
    - stale_artifacts: "No stale artifacts encountered"
