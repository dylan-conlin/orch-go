task: "harness init --openscad: domain flag with gates, validators, config copy and --refresh"
beads_id: orch-go-5iw98
tier: light

verification:
  commands:
    - name: "Domain init tests"
      command: "cd ~/Documents/personal/harness && go test -v -count=1 -run 'TestDomain' ./pkg/scaffold/"
      expect: "9 PASS, 0 FAIL"
    - name: "Full harness test suite"
      command: "cd ~/Documents/personal/harness && go test -count=1 ./..."
      expect: "7 packages PASS"
    - name: "Binary compiles and shows new flags"
      command: "harness init --help"
      expect: "contains --openscad and --refresh flags"

  manual_checks:
    - "harness init --openscad --dry-run shows gates, validate.scad, validate-project.scad, config.yaml steps"
    - "harness init --openscad creates all domain files in project"
    - "harness init --openscad --refresh overwrites base files but preserves validate-project.scad"
    - "OPENSCAD_HARNESS_PATH env var overrides default source path"

  notes: |
    Implementation lives in ~/Documents/personal/harness (standalone harness binary),
    not in orch-go. orch harness init delegates to this binary with DisableFlagParsing,
    so --openscad and --refresh pass through automatically.

    Files modified in harness repo:
    - cmd/harness/init_cmd.go (added --openscad and --refresh flags)
    - pkg/scaffold/domain.go (new: DomainInit, resolveSourcePath)
    - pkg/scaffold/domain_test.go (new: 9 tests)
