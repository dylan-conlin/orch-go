task: "Implement P3 coaching hooks: session-triage, completion-classification"
beads_id: orch-go-2qrn

deliverables:
  - path: ~/.orch/hooks/nudge-orchestrator-session-triage.py
    description: "SessionStart hook that surfaces pending triage:review issues"
  - path: ~/.orch/hooks/nudge-completion-outcome-classification.py
    description: "PreToolUse (Bash) hook that nudges outcome classification on orch complete"
  - path: ~/.orch/hooks/tests/test_nudge_orchestrator_session_triage.py
    description: "21 tests for session-triage hook"
  - path: ~/.orch/hooks/tests/test_nudge_completion_outcome_classification.py
    description: "27 tests for completion-classification hook"

tests:
  command: "cd ~/.orch/hooks/tests && python3 -m pytest test_nudge_orchestrator_session_triage.py test_nudge_completion_outcome_classification.py -v"
  result: "48 passed in 0.10s"

manual_steps_required:
  - description: "Register hooks in ~/.claude/settings.json"
    reason: "macOS sandbox prevents worker agents from writing settings.json"
    instructions: |
      Add to PreToolUse -> Bash hooks array:
        {"type": "command", "command": "$HOME/.orch/hooks/nudge-completion-outcome-classification.py", "timeout": 10}
      Add new entry to SessionStart hooks array:
        {"hooks": [{"type": "command", "command": "$HOME/.orch/hooks/nudge-orchestrator-session-triage.py", "timeout": 10}]}

notes:
  - "2 of 4 P3 hooks already existed: investigation-drift and spawn-context"
  - "Both new hooks follow naming convention 'nudge-' (coaching, not gate)"
  - "Existing hook tests still pass (45 passed for investigation-drift + spawn-context)"
