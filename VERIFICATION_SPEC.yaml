task: "Decision lifecycle gate: classify at birth, budget cap, auto-archive stale"
beads_id: orch-go-tkr3y
tier: light

verification:
  commands:
    - name: "Decision enforcement gate tests"
      command: "go test -v -count=1 -run 'Enforcement' ./pkg/verify/ 2>&1 | cat"
      expect: "8 PASS, 0 FAIL"
    - name: "Decisions lifecycle package tests"
      command: "go test -v -count=1 ./pkg/decisions/"
      expect: "9 PASS, 0 FAIL"
    - name: "Decisions CLI tests"
      command: "go test -v -count=1 -run 'Decisions' ./cmd/orch/"
      expect: "2 PASS"
    - name: "Binary compiles"
      command: "go build ./cmd/orch/"
      expect: "clean compile"

  manual_checks:
    - "orch decisions budget shows 62/30 with enforcement type breakdown"
    - "orch decisions audit shows all decisions classified"
    - "orch decisions stale finds context-only >30d uncited decisions"
    - "14 stale/stub decisions archived (9 March 10 stubs + 5 others)"
    - "All 62 remaining decisions have **Enforcement:** field"
    - "GateDecisionEnforcement wired into V1 level in pkg/verify/level.go"
