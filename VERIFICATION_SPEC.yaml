task: "Coaching hooks — investigation drift and spawn ceremony nudges"
beads_id: orch-go-g1xc
date: 2026-03-03

deliverables:
  - name: "Investigation drift coaching hook"
    files:
      - ~/.orch/hooks/nudge-orchestrator-investigation-drift.py
    verified: true
    evidence: "pytest test_nudge_orchestrator_investigation_drift.py -v → 20/20 pass"

  - name: "Spawn ceremony coaching hook"
    files:
      - ~/.orch/hooks/nudge-orchestrator-spawn-context.py
    verified: true
    evidence: "pytest test_nudge_orchestrator_spawn_context.py -v → 25/25 pass"

  - name: "Tests for both hooks"
    files:
      - ~/.orch/hooks/tests/test_nudge_orchestrator_investigation_drift.py
      - ~/.orch/hooks/tests/test_nudge_orchestrator_spawn_context.py
    verified: true

  - name: "Hook registration in settings.json"
    status: "MANUAL STEP REQUIRED"
    reason: "settings.json has uchg flag, cannot be modified by agent"
    manual_step: |
      Add to ~/.claude/settings.json:

      Under hooks.PreToolUse[matcher=Bash].hooks:
        {"type": "command", "command": "$HOME/.orch/hooks/nudge-orchestrator-spawn-context.py", "timeout": 10}

      Under hooks.PreToolUse[matcher=Read|Edit|Write].hooks:
        {"type": "command", "command": "$HOME/.orch/hooks/nudge-orchestrator-investigation-drift.py", "timeout": 10}

tests:
  python:
    command: "cd ~/.orch/hooks && python3 -m pytest tests/test_nudge_orchestrator_investigation_drift.py tests/test_nudge_orchestrator_spawn_context.py -v"
    result: "45/45 passed in 0.14s"

notes:
  - "Both hooks use allow+context pattern (coaching nudge, not deny)"
  - "Investigation drift: tracks sequential .kb/investigation reads, nudges at 3+, escalates at 6+"
  - "Spawn ceremony: detects orch spawn without prior kb context, coaching reminder"
  - "State tracked via ~/.orch/hook-state/ temp files keyed by CLAUDE_SESSION_ID"
  - "Spawn ceremony resets investigation drift counter (investigation→spawn transition)"
  - "Escape hatch: --skip-artifact-check bypasses spawn ceremony nudge"
  - "Only triggers for orchestrator/meta-orchestrator sessions (workers pass through)"

leave_it_better:
  knowledge: "No new quick entries needed — hooks implement design from orch-go-89at"
  stale_artifacts: "No stale artifacts encountered"
