    description: Exploration judge skill with 5-dimension evaluation and structured YAML verdict output
    verification: skill loads via loader, contains all 5 dimensions and verdict format markers
  - path: skills/src/meta/exploration-orchestrator/SKILL.md
    description: Updated orchestrator to delegate judging to exploration-judge skill
    verification: Phase 4 references exploration-judge spawn command
  - path: pkg/spawn/context.go
    description: Updated SPAWN_CONTEXT template to reference judge skill instead of inline criteria
    verification: Template mentions exploration-judge, judge-verdict.yaml, verdict types
  - path: pkg/spawn/explore_judge_skill_test.go
    description: Tests for judge skill loading and verdict schema completeness
    verification: go test ./pkg/spawn/ -run TestExplorationJudge
  - path: pkg/spawn/explore_test.go
    description: Updated context generation tests to verify judge skill references
    verification: go test ./pkg/spawn/ -run TestExploreContextGeneration
tests:
  command: go test ./pkg/spawn/ -count=1
  result: PASS (0.416s)
evidence:
  - claim: "Judge skill evaluates on 5 dimensions: grounding, consistency, coverage, relevance, actionability"
