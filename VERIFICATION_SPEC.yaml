type: feature
deliverables:
  - path: pkg/events/logger.go
    description: 3 new exploration event types (decomposed, judged, synthesized) with typed data structs and log methods
    verification: go test ./pkg/events/ -run TestLogExploration -count=1 -v
  - path: cmd/orch/emit_cmd.go
    description: Extended orch emit to support exploration.decomposed, exploration.judged, exploration.synthesized
    verification: go build ./cmd/orch/ compiles; orch emit exploration.decomposed --help
  - path: cmd/orch/serve_harness.go
    description: ExplorationMetrics aggregation in harness API response
    verification: go test ./cmd/orch/ -run TestBuildHarnessResponse_Exploration -count=1 -v
  - path: web/src/lib/stores/harness.ts
    description: ExplorationMetrics TypeScript interface added to HarnessData
    verification: npx svelte-check shows no harness-related errors
  - path: web/src/routes/harness/+page.svelte
    description: Exploration Runs dashboard section with metrics and judge verdict bar
    verification: Visual check at http://localhost:5188/harness
  - path: skills/src/meta/exploration-orchestrator/SKILL.md
    description: Added orch emit instructions for all 3 exploration lifecycle events
    verification: Skill contains orch emit exploration.decomposed/judged/synthesized commands
tests:
  commands:
    - go test ./pkg/events/ -run TestLogExploration -count=1
    - go test ./cmd/orch/ -run TestBuildHarnessResponse_Exploration -count=1
  result: All PASS
evidence:
  - claim: "3 exploration events flow through events.jsonl"
    basis: "Event types EventTypeExplorationDecomposed/Judged/Synthesized defined, typed log methods tested"
  - claim: "Harness API aggregates exploration metrics"
    basis: "ExplorationMetrics computed from exploration.* events, tested with 2 runs (1 complete, 1 partial)"
  - claim: "Dashboard shows exploration quality metrics"
    basis: "Svelte page renders total_runs, completed_runs, findings, avg_workers, judge verdict bar"
  - claim: "Exploration orchestrator skill emits events"
    basis: "SKILL.md updated with orch emit commands at each lifecycle phase"
