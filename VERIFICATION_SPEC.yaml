task: "orch review shows review tiers and auto-completed items"
beads_id: orch-go-7ew1

deliverables:
  - path: cmd/orch/review.go
    description: "Updated review command with review tier badges, auto-completed display, scan-tier TLDR"
  - path: cmd/orch/review_test.go
    description: "7 new tests for review tier badges, auto-completed dedup, status display"

tests:
  command: "go test ./cmd/orch/ -run 'TestCompletionInfoReviewTier|TestCompletionInfoIsAutoCompleted|TestGetRecentAutoCompletions|TestReviewTierBadgeDisplay|TestAutoCompletedStatusDisplay|TestAutoCompletedDeduplication' -v"
  result: "7 passed"

verification:
  automated:
    - command: "go test ./cmd/orch/ -v"
      expect: "all tests pass"
    - command: "go vet ./cmd/orch/"
      expect: "no errors"
    - command: "go build ./cmd/orch/"
      expect: "builds cleanly"

  manual:
    - step: "Run `orch review` and verify tier badges {auto}/{scan}/{review}/{deep} appear"
    - step: "Verify auto-completed items from events.jsonl appear as [auto-completed]"
    - step: "Verify scan-tier items show TLDR inline instead of full synthesis card"

notes:
  - "ReviewTier populated from AGENT_MANIFEST.json, falls back to DefaultReviewTier(skill)"
  - "Auto-completed events read from events.jsonl (last 24h), deduplicated against pending completions"
  - "Pre-existing test failure in pkg/urltomd (network timeout) unrelated to changes"
