verification:
  test_command: "go test ./cmd/orch/ -run TestE2E -v"
  expected_output: "PASS"
  test_count: 18

  acceptance_criteria:
    - id: AC-001
      description: "Single agent lifecycle: spawn → visible → phase transitions → complete → gone"
      test: TestE2ELifecycle_SingleAgent
      status: pass

    - id: AC-002
      description: "Multiple agents at different stages: active visible, closed filtered out"
      test: TestE2ELifecycle_MultipleAgents
      status: pass

    - id: AC-003
      description: "Progressive closure: agents disappear one by one as issues close"
      test: TestE2ELifecycle_MultipleAgents/progressive_closure
      status: pass

    - id: AC-004
      description: "Degraded modes: agents remain visible with reason codes when infrastructure is down"
      test: TestE2ELifecycle_DegradedModes
      status: pass

    - id: AC-005
      description: "Phase extraction: latest Phase comment wins"
      test: TestE2ELifecycle_LatestPhaseExtraction
      status: pass

  evidence:
    build: "go build ./cmd/orch/ - clean"
    vet: "go vet ./cmd/orch/ - clean"
    tests: "18 subtests, all pass in 0.011s"

  manual_steps: []
