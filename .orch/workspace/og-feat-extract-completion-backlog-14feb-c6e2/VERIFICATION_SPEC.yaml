failure_modes:
  - symptom: "Tests fail instead of skipping"
    root_cause: "t.Skip() not called correctly in placeholder tests"
    fix: "Ensure each test calls t.Skip() before any assertions"
    
  - symptom: "LSP errors about unused variables"
    root_cause: "Variables declared but commented out in placeholder tests"
    fix: "Comment out variable declarations along with assertions"

verification_commands:
  - command: "go test ./pkg/orch/... -v"
    expected_output: "All 6 tests skip with 'Placeholder test - will be implemented in orch-go-k5v' message"
    actual_result: "✅ All 6 test cases skip as expected"
    
  - command: "go build ./pkg/orch"
    expected_output: "No output (successful build)"
    actual_result: "✅ Package builds successfully"
    
  - command: "ls pkg/orch/"
    expected_output: "completion.go  completion_test.go"
    actual_result: "✅ Both files present"

manual_steps:
  - step: "Verify structural extraction is pure (no behavior changes)"
    procedure: "Check that no code from serve_agents.go was modified - only pkg/orch/ structure created"
    result: "✅ No changes to serve_agents.go - pure structural extraction"
    
  - step: "Verify blocked issue can proceed"
    procedure: "Check that orch-go-k5v has the necessary types and function signatures to implement"
    result: "✅ AgentInfo type and DetectCompletionBacklog() signature provide clear interface"

