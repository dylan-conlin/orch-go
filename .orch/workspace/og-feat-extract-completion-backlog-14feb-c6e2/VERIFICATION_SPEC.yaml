      - "Documentation includes usage example and expected implementation notes"

  - behavior: "Test structure prepared for future implementation"
    acceptance_criteria:
      - "AC-005: pkg/orch/completion_test.go exists with test cases"
      - "AC-006: Tests cover all expected scenarios (empty list, no backlog, single/multiple agents, exclusions, case-insensitive)"
