verification:
  build:
    - command: "go build ./cmd/orch/"
      expect: "clean compile"
    - command: "go vet ./cmd/orch/"
      expect: "no issues"
  tests:
    - command: "go test ./pkg/daemon/ -run 'TestDaemon_.*Orphan|TestOrphan' -v"
      expect: "18 tests pass"
    - command: "go test ./pkg/daemon/..."
      expect: "all tests pass, no regressions"
    - command: "go test ./pkg/daemonconfig/..."
      expect: "all tests pass"
  manual:
    - description: "orch daemon run --verbose shows orphan detection in startup config"
      check: "Output includes 'Orphan detection: 30m0s (age threshold: 1h0m0s)'"
    - description: "Orphan detection runs at configured interval"
      check: "Verbose output shows orphan detection messages after 30 minutes"
