verification:
  type: investigation
  claim_tested: KA-10 (anti-accretion mechanisms self-accrete)
  verdict: confirms

  commands_run:
    - description: "Line count per cmd/orch/ file"
      command: "for f in cmd/orch/*.go; do wc -l < $f; done | sort -rn"
    - description: "Line count per pkg/ subdirectory"
      command: "find pkg/$d -name '*.go' -not -name '*_test.go' -exec cat {} + | wc -l"
    - description: "Enumerate daemon periodic tasks"
      command: "grep 'RunPeriodic' cmd/orch/daemon_periodic.go"
    - description: "Count event types in CLAUDE.md"
      command: "grep -E '^\\| `[a-z]' CLAUDE.md | wc -l"
    - description: "File count growth over time"
      command: "git ls-tree -r --name-only $commit -- cmd/orch/ pkg/ | grep '.go$' | grep -v '_test.go' | wc -l"

  key_findings:
    - "35% of 138K non-test Go lines are governance/measurement/KB management"
    - "85% of daemon periodic tasks (22/26) are governance/measurement"
    - "76% of event types (64/84) are governance/measurement"
    - "Governance file share accelerated 18%→23% in March 2026"

  manual_verification_steps:
    - "Run line counts and verify categorization totals match"
    - "Re-enumerate periodic tasks and verify 26 total, 4 core"

  artifacts_produced:
    - ".kb/models/knowledge-accretion/probes/2026-03-20-probe-governance-infrastructure-self-accretion.md"
    - ".kb/investigations/2026-03-20-inv-investigate-accretion-management-overhead.md"
    - ".orch/workspace/og-inv-investigate-much-orch-20mar-d271/SYNTHESIS.md"
