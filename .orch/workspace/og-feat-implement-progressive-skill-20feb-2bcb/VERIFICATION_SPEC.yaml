observable_behaviors:
  - description: "FilterSkillSections strips @section-annotated sections not matching the filter"
  - description: "Nil/empty filter returns content unchanged (backward compatible)"
  - description: "Spawn pipeline applies filtering between settings resolution and context building"
  - description: "Section markers in skill sources survive skillc deployment"

acceptance_criteria:
  - id: AC-001
    description: "go test ./pkg/skills/... passes all 21 tests including 11 new filtering tests"
    command: "go test ./pkg/skills/... -count=1"
    expected: "PASS"
  - id: AC-002
    description: "go build ./cmd/orch/ succeeds (spawn wiring compiles)"
    command: "go build ./cmd/orch/"
    expected: "exit 0"
  - id: AC-003
    description: "go vet ./cmd/orch/ passes"
    command: "go vet ./cmd/orch/"
    expected: "exit 0"
  - id: AC-004
    description: "feature-impl --phases impl --mode direct achieves 20%+ token savings"
    result: "22% savings (1967 tokens of 8872 total)"
  - id: AC-005
    description: "Unfiltered spawns produce identical output (no --phases = no filtering)"
    result: "FilterSkillSections with nil filter returns content unchanged (tested)"

