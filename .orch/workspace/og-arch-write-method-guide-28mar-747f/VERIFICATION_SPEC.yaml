verification:
  type: content-review
  status: ready-for-review

  checks:
    - name: guide-exists
      command: "test -f .kb/GUIDE.md && echo PASS"
      expected: "PASS"
      result: "PASS"

    - name: guide-length-under-3-pages
      command: "wc -l .kb/GUIDE.md"
      expected: "< 120 lines (~3 pages)"
      result: "80 lines — within constraint"

    - name: shape-classification-opens-guide
      command: "head -5 .kb/GUIDE.md"
      expected: "First section is about work shape, not the cycle diagram"
      result: "Opens with 'notice the shape of the work' before any diagram"

    - name: real-example-not-synthetic
      command: "grep -c 'Frame\\|Resolution\\|Tension' .kb/GUIDE.md"
      expected: "> 0 — contains real brief example"
      result: "Real brief from orch-go-wgkj4 cleaned of IDs"

    - name: cycle-diagram-present
      command: "grep -c 'Thread.*question' .kb/GUIDE.md"
      expected: "> 0"
      result: "Composition cycle diagram present in second section"

    - name: probe-file-created
      command: "test -f .kb/models/knowledge-accretion/probes/2026-03-28-probe-composition-guide-teaches-method.md && echo PASS"
      expected: "PASS"
      result: "PASS"

    - name: probe-merged-to-model
      command: "grep '2026-03-28.*Composition' .kb/models/knowledge-accretion/model.md | head -1"
      expected: "Probe reference in model Probes section"
      result: "Probe findings merged into model: Probes section, Evolution section, Open Question #7"

  manual_checks:
    - "Dylan reviews guide for writing quality and shape taxonomy accuracy"
    - "Test with orch init reference after init flow is updated"
