verification:
  automated:
    - name: "Thread promote creates claims.yaml for models"
      command: "go test ./cmd/orch/ -run TestThreadPromoteCmd_Model -v"
      expected: "PASS"
      covers: "claims.yaml existence and content after model promotion"

    - name: "Thread promote does NOT create claims.yaml for decisions"
      command: "go test ./cmd/orch/ -run TestThreadPromoteCmd_Decision -v"
      expected: "PASS"
      covers: "decisions should not get claims.yaml"

    - name: "All promote tests pass"
      command: "go test ./cmd/orch/ -run TestThreadPromoteCmd -count=1"
      expected: "PASS (7 tests)"
      covers: "No regressions in promote workflow"

    - name: "Claims package tests pass"
      command: "go test ./pkg/claims/ -count=1"
      expected: "PASS"
      covers: "SaveFile/Marshal used by seed creation"

  reproduction:
    original_bug: "orch thread promote creates model.md but not claims.yaml"
    verified: true
    verification_method: "Added test assertion for claims.yaml in TestThreadPromoteCmd_Model — test failed before fix, passes after"

  manual: []
