verification:
  type: bug-fix
  issue: orch-go-qku1

  reproduction:
    description: "orch review triage promote-to-ready fails with 'failed to remove triage:review'"
    root_cause: "CLIClient.RemoveLabel calls non-existent 'bd unlabel' command instead of 'bd label remove'"
    steps:
      - "CLIClient.RemoveLabel was invoked with bd unlabel <id> <label>"
      - "bd CLI returns 'unknown command unlabel'"
      - "promoteToReady() returns error 'failed to remove triage:review'"

  fix:
    files_changed:
      - path: pkg/beads/cli_client.go
        change: "RemoveLabel: 'unlabel' → 'label', 'remove'; AddLabel: 'label' → 'label', 'add'"
      - path: pkg/beads/cli_client_test.go
        change: "Added TestCLIClient_LabelCommands verifying correct subcommand args"

  automated_tests:
    - command: "go test ./pkg/beads/ -run TestCLIClient_LabelCommands -v"
      expected: "PASS (both subtests)"
    - command: "go test ./pkg/beads/ -run TestCLI -v"
      expected: "PASS (4 tests)"
    - command: "go test ./cmd/orch/ -run TestTriage -v"
      expected: "PASS"
    - command: "go vet ./cmd/orch/ ./pkg/beads/"
      expected: "Clean (no output)"

  smoke_test:
    description: "Created test issue orch-go-sr11 with triage:review label, ran bd label remove and bd label add manually to confirm the exact commands the fixed code generates work correctly"
    result: "Label removed and added successfully, verified via bd label list"

  manual_verification:
    - "Run 'orch review triage' interactively and promote an item — should succeed without 'failed to remove triage:review' error"
