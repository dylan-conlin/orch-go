# Verification Specification: Spawn Gate Hotspot File Detection Fix

## Observable Behavior
RunHotspotCheckForSpawn now detects bloat-size hotspots (files >800 lines, CRITICAL >1500 lines) when a task description explicitly names such a file.

## Acceptance Criteria

- criterion: Bloat analysis included in spawn check
  test: go test -v -run TestRunHotspotCheckForSpawn_IncludesBloatAnalysis ./cmd/orch/
  expectation: PASS - test creates 1600-line file and verifies bloat-size hotspot detected
  result: PASS

- criterion: No regressions in existing hotspot tests
  test: go test ./cmd/orch/... ./pkg/spawn/gates/...
  expectation: All 32 hotspot-related tests pass
  result: PASS (cmd/orch: 3.528s, pkg/spawn/gates: 0.068s)

- criterion: Build succeeds
  test: go build ./cmd/orch/ && go vet ./cmd/orch/ ./pkg/spawn/gates/
  expectation: No errors
  result: PASS

## Failure Mode

- symptom: Spawn gate doesn't detect CRITICAL file by name in task
  root_cause: RunHotspotCheckForSpawn didn't call analyzeBloatFiles
  diagnostic: Test TestRunHotspotCheckForSpawn_IncludesBloatAnalysis fails with "Expected non-nil result"
  fix: Add analyzeBloatFiles(projectDir, 800) call to RunHotspotCheckForSpawn

## Evidence

| Criterion | Evidence Type | Artifact |
|-----------|---------------|----------|
| Bloat analysis included | test output | TestRunHotspotCheckForSpawn_IncludesBloatAnalysis PASS |
| No regressions | test output | 32 hotspot tests pass |
| Build succeeds | build output | No errors |

## Manual Verification (for orchestrator)

To verify the bug is fixed:

1. Create a large file (>1500 lines) in the project
2. Run: `go run ./cmd/orch spawn --bypass-triage feature-impl "fix bug in <large-file>"`
3. Expected: Spawn should be blocked with "CRITICAL hotspot" error

Note: The integration test verifies this programmatically; manual verification optional.
