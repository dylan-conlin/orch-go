verification:
  automated:
    - name: orient package tests
      command: go test ./pkg/orient/ -v
      expected: "PASS" with 30+ tests including TestThroughputFromEvents_DurationSeconds

    - name: binary builds clean
      command: go build ./cmd/orch/
      expected: exit 0, no errors

    - name: vet passes
      command: go vet ./pkg/orient/
      expected: exit 0, no issues

  smoke_test:
    - name: in_progress shows non-zero
      command: go run ./cmd/orch/ orient --json
      expected: "in_progress" field > 0 when agents are running (was always 0 before fix)
      result: "in_progress: 4" confirmed

  manual:
    - name: avg_duration_min will populate when events include duration_seconds
      note: |
        The orient calculation now correctly reads duration_seconds from events.
        However, agent.completed events currently never include this field (0/1184).
        A separate issue was created for the telemetry emission bug.

root_causes:
  - bug: in_progress always 0
    location: cmd/orch/orient_cmd.go:collectInProgressCount
    cause: "Parser expected numbered lines (line[0] >= '0') but bd list outputs issue ID lines (e.g., 'orch-go-abc1 [P2] ...')"
    fix: "Changed to match lines containing ' in_progress ' marker"

  - bug: avg_duration_min always 0
    location: pkg/orient/orient.go:ComputeThroughput
    cause: "Read 'duration_minutes' from events but LogAgentCompleted emits 'duration_seconds'"
    fix: "Now reads duration_seconds first (converts to minutes), falls back to duration_minutes for legacy events"
