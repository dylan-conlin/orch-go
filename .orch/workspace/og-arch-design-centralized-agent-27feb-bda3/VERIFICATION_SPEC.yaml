# Verification Specification: Centralized Agent Lifecycle State Machine Design
# Design Document: .kb/investigations/2026-02-27-inv-design-centralized-agent-lifecycle-state.md

observable_behaviors:
  primary: "Design document defines a state machine with 7 states, 5 transitions, and explicit side-effect ordering for each transition"
  secondary:
    - "Each transition lists ALL required side effects with subsystem, operation, and criticality"
    - "Migration plan has 6 phased issues with dependency chains"
    - "Design is compatible with No Local Agent State constraint"

acceptance_criteria:
  AC-001:
    behavior: "Investigation file complete with design"
    condition: ".kb/investigations/2026-02-27-inv-design-centralized-agent-lifecycle-state.md exists with Phase: Complete"
    verification: "cat .kb/investigations/2026-02-27-inv-design-centralized-agent-lifecycle-state.md | grep 'Phase.*Complete'"

  AC-002:
    behavior: "Implementation issues created with dependencies"
    condition: "6 issues exist: orch-go-bho1, orch-go-ohde, orch-go-hbtr, orch-go-vp6u, orch-go-vem4, orch-go-mgbk"
    verification: "bd show orch-go-bho1 && bd show orch-go-ohde && bd show orch-go-hbtr && bd show orch-go-vp6u && bd show orch-go-vem4 && bd show orch-go-mgbk"

  AC-003:
    behavior: "Dependency chain is correct"
    condition: "Phase 2+ depends on Phase 1 (types). Complete depends on abandon. GC depends on abandon. Daemon depends on GC."
    verification: "bd show orch-go-ohde | grep depends"

  AC-004:
    behavior: "All 4 known bugs are addressed in the design"
    condition: "Investigation references: abandon missing labels, clean killing Claude agents, stale daemon status, orphaned in_progress"
    verification: "grep -c 'ghost agent\\|kills active Claude\\|stale daemon\\|orphan' .kb/investigations/2026-02-27-inv-design-centralized-agent-lifecycle-state.md"

  AC-005:
    behavior: "Design compatible with No Local Agent State constraint"
    condition: "LifecycleManager described as coordinator (not cache), does not store agent state"
    verification: "grep 'does NOT store' .kb/investigations/2026-02-27-inv-design-centralized-agent-lifecycle-state.md"

evidence_requirements:
  - criterion: AC-001
    type: "file existence + content check"
    artifact: ".kb/investigations/2026-02-27-inv-design-centralized-agent-lifecycle-state.md"
  - criterion: AC-002
    type: "beads issue existence"
    artifact: "bd list output showing all 6 issues"
  - criterion: AC-003
    type: "dependency graph"
    artifact: "bd show output with depends_on fields"

manual_verification:
  - "Review state machine diagram for completeness (all states reachable, all transitions have side effects)"
  - "Review migration plan for feasibility (phases are independently deployable)"
  - "Confirm design doesn't violate two-lane ADR or No Local Agent State constraint"
