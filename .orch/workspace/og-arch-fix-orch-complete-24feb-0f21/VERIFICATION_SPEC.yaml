name: accretion-gate-preexisting-bloat-skip
type: bug-fix
issue: orch-go-1208

observable_behaviors:
  - name: Pre-existing bloat passes with warning
    description: Files already >1500 lines before agent's changes do NOT block completion
    verification: |
      go test ./pkg/verify/ -run TestVerifyAccretionForCompletion_PreExistingBloatDetailed -v
    expected: PASS - result.Passed=true, 1 warning containing "pre-existing bloat"

  - name: Agent-caused bloat still blocks
    description: Files pushed over 1500 lines by agent's changes still block completion
    verification: |
      go test ./pkg/verify/ -run TestVerifyAccretionForCompletion_AgentCausedBloat -v
    expected: PASS - result.Passed=false, 1 error

  - name: Skip flag available
    description: --skip-accretion flag exists and is wired through SkipConfig
    verification: |
      grep -n "skip-accretion" cmd/orch/complete_cmd.go
    expected: Flag registration, SkipConfig field, hasAnySkip, skippedGates, shouldSkipGate, getSkipConfig

  - name: All accretion tests pass
    description: Full accretion test suite passes including new tests
    verification: |
      go test ./pkg/verify/ -run TestVerifyAccretion -v
    expected: 12/12 PASS

acceptance_criteria:
  - pre-existing bloat (file already >1500 before changes) downgrades from ERROR to WARNING
  - agent-caused bloat (agent pushes file over 1500) remains ERROR (blocking)
  - --skip-accretion flag exists as manual escape hatch
  - existing tests updated, 2 new tests added

manual_steps: none
