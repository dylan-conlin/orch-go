      - "Downstream action is advisory surfacing and attention collection, not automatic remediation"
      - "Relevant packages compile cleanly with tests skipped, which is enough for the current pre-commit compile gate"
      - "Full relevant test targets still contain unrelated existing failures outside this investigation's doc-only scope"

