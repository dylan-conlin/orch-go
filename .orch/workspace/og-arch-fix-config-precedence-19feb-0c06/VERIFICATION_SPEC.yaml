verification:
  type: bug-fix
  issue: orch-go-1105

  reproduction:
    description: "runWork elevates user default_model to CLI priority, overriding project opencode.model"
    before:
      command: "rg -n \"Load user config default_model\" cmd/orch/spawn_cmd.go"
      expected: "no matches (load block already removed in HEAD)"
    after:
      command: "rg -n \"default_model\" cmd/orch/spawn_cmd.go"
      expected: "Note warns not to inject default_model into spawnModel"
    verified: true

  tests:
    - command: "go test ./pkg/spawn -run TestResolve_BugClass10_UserDefaultModelNotInjectedAsCLI -count=1"
      result: "PASS (0.007s)"

  manual_steps_required: []
