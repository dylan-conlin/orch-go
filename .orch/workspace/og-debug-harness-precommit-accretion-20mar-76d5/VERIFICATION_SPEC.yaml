verification:
  automated:
    - name: harness-tests-pass
      command: "cd ~/Documents/personal/harness && go test ./... -count=1"
      expect: "all 7 packages pass"

    - name: accretion-gate-advisory
      command: "harness precommit accretion"
      expect: "exits 0, output contains 'advisory'"

    - name: accretion-gate-json-always-passed
      command: "harness precommit accretion --json"
      expect: 'JSON output has "passed": true'

  behavioral:
    - name: pre-commit-no-longer-blocks
      description: "Stage a file that would exceed the critical threshold (>1500 lines) and verify the pre-commit hook does not block the commit"
      reproduction: |
        1. Create/modify a Go file to exceed 1500 lines
        2. git add the file
        3. git commit
        4. Verify commit succeeds with advisory warnings (not blocked)

  root_cause:
    location: "~/Documents/personal/harness/pkg/accretion/precommit.go:91"
    description: "CheckStagedAccretionWithResolver set result.Passed=false for agent-caused bloat exceeding critical threshold, causing harness precommit accretion to return error"
    fix: "Agent-caused bloat now goes to WarningFiles. Passed is always true."
