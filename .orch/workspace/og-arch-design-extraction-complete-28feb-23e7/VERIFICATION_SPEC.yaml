# Verification Specification for complete_cmd.go Extraction Design
# This is the design phase — verification is that the design is complete and actionable

observable_behaviors:
  - Design investigation covers all functions in complete_cmd.go
  - Implementation issues created for each extraction phase
  - Dependencies between phases are correctly set

acceptance_criteria:
  - name: investigation_complete
    description: Investigation file has Phase Complete and covers all 7 responsibility clusters
    verification: "Read .kb/investigations/2026-02-28-design-extraction-complete-cmd-go.md — check Phase field and 7 findings"
    status: passed

  - name: issues_created
    description: 4 implementation issues exist with descriptions and acceptance criteria
    verification: "bd show orch-go-fcrf, orch-go-jqp7, orch-go-e5e0, orch-go-qtuo"
    status: passed

  - name: dependency_chain
    description: Phase 4 depends on Phase 1 (SkipConfig must move first)
    verification: "bd show orch-go-qtuo — check blockedBy includes orch-go-fcrf"
    status: passed

  - name: dead_code_flagged
    description: archiveWorkspace() identified as dead code for deletion
    verification: "grep -r 'archiveWorkspace' cmd/orch/ — only the definition exists, no callers"
    status: passed

  - name: expected_reduction
    description: Design targets complete_cmd.go under 800 lines (from 2,267)
    verification: "Sum of extraction targets: ~130 (SkipConfig) + ~300 (postlifecycle) + ~180 (checklist) + ~400 (pipeline) + ~36 (dead code) = ~1,046 lines moved/deleted"
    status: passed

manual_verification_needed:
  - "Implementation agents should verify go build/test after each phase"
  - "Orchestrator should verify the 4 issues are picked up by daemon in correct order"
