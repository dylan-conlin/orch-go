verification:
  type: automated
  status: pass

  tests:
    - name: "ReadValidatedStatusFile returns nil for dead PID (stale file)"
      test_command: "go test -v -run TestReadValidatedStatusFile_StaleFile ./pkg/daemon/"
      expected: "PASS"
      actual: "PASS"

    - name: "ReadValidatedStatusFile returns status for live PID"
      test_command: "go test -v -run TestReadValidatedStatusFile_LiveProcess ./pkg/daemon/"
      expected: "PASS"
      actual: "PASS"

    - name: "ReadValidatedStatusFile backward compatible with PID=0"
      test_command: "go test -v -run TestReadValidatedStatusFile_NoPID ./pkg/daemon/"
      expected: "PASS"
      actual: "PASS"

    - name: "ReadValidatedStatusFile returns error when no file exists"
      test_command: "go test -v -run TestReadValidatedStatusFile_NoFile ./pkg/daemon/"
      expected: "PASS"
      actual: "PASS"

    - name: "Full daemon package tests pass"
      test_command: "go test ./pkg/daemon/..."
      expected: "ok"
      actual: "ok (10.240s)"

  reproduction:
    bug_description: "handleDaemon() and readDaemonStatus() report daemon as running based on stale daemon-status.json after unclean shutdown"
    fix_verification: |
      The bug was in three reader paths:
      1. handleDaemon() in serve_system.go — now uses ReadValidatedStatusFile()
      2. readDaemonStatus() in status_cmd.go — now checks daemon.IsProcessAlive(status.PID)
      3. handleVerificationStatus() in serve_verification.go — now uses ReadValidatedStatusFile()

      All three paths now validate PID liveness before reporting daemon as running.
      TestReadValidatedStatusFile_StaleFile directly reproduces the bug scenario (status file
      with dead PID) and verifies it returns nil instead of the stale status.

  smoke_test:
    description: "Cannot fully smoke-test without restarting running orch serve (old binary). Unit tests cover the exact scenario."
    limitation: "Running server uses old binary; new binary compilation succeeds for pkg/daemon/ but cmd/orch/ has pre-existing build error in unrelated files (rework_cmd.go, spawn_cmd.go)"

  notes:
    - "Pre-existing build error in cmd/orch/ from RunPreFlightChecks signature change by concurrent agent — not caused by this fix"
    - "No callers of daemon.ReadStatusFile() remain outside the daemon package — all migrated to ReadValidatedStatusFile()"
