# Verification Specification: Language-Agnostic Accretion Metrics
# Design: .kb/investigations/2026-02-14-design-language-agnostic-accretion-metrics.md

observable_behaviors:
  primary: "Accretion metrics produce meaningful health signals across Go and TypeScript projects using uniform thresholds"
  secondary:
    - "Generated files excluded from metrics without manual per-project configuration"
    - "Cross-project aggregation possible via enriched event schema"
    - "Four metric primitives enable system-wide health at a glance"

acceptance_criteria:
  AC-001:
    name: "Uniform thresholds flag structural issues in both Go and TypeScript"
    behavior: "800/1500 line thresholds correctly identify bloated files regardless of language"
    condition: "MUST flag all authored files >800 lines; MUST NOT flag generated files"
    verified: true
    evidence: "Spike: wc -l across orch-go (Go), opencode (TS), beads (Go) — thresholds correct for authored code"

  AC-002:
    name: "AccretionDeltaData includes ProjectDir for cross-project aggregation"
    behavior: "Events in events.jsonl include project directory"
    condition: "MUST include project_dir and project_name fields in AccretionDeltaData"
    verified: false
    evidence: "Schema gap confirmed in pkg/events/logger.go:482-493 — field not yet added"

  AC-003:
    name: "Generated files excluded via pattern matching"
    behavior: "Hotspot analysis skips generated files (*.gen.ts, *.pb.go, etc.)"
    condition: "MUST exclude files matching generated patterns from bloat analysis"
    verified: false
    evidence: "types.gen.ts (5,065 lines) identified as only false positive — pattern-matchable"

  AC-004:
    name: "Four metric primitives computable from existing data"
    behavior: "risk_file_ratio, extraction_debt, accretion_velocity, file_bloat_score derivable"
    condition: "SHOULD be computed from line counts and session history already collected"
    verified: true
    evidence: "Formula definitions validated against existing data structures in events/logger.go and hotspot.go"

failure_modes:
  FM-001:
    name: "Generated file false positive"
    symptom: "types.gen.ts flagged as CRITICAL hotspot despite being generated"
    diagnostic: "Check if file matches *.gen.* pattern"
    fix: "Add generated file patterns to exclusion list in hotspot.go"

  FM-002:
    name: "Cross-project events indistinguishable"
    symptom: "Cannot determine which project an accretion.delta event came from"
    diagnostic: "Check AccretionDeltaData for project_dir field"
    fix: "Add ProjectDir and ProjectName fields to AccretionDeltaData struct"

manual_verification_required:
  - "Confirm --all-projects scan performance is acceptable (<5 seconds for 10+ projects)"
  - "Validate dashboard UX for cross-project health panel"
