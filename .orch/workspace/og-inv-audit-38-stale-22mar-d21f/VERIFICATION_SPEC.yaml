verification:
  type: investigation
  outcome: classification-table

  assertions:
    - name: all-38-classified
      description: Every stale decision has a classification (ACTIVE/SUPERSEDED/REMOVED/ASPIRATIONAL)
      evidence: SYNTHESIS.md contains 38 entries across 4 classification tables (17+3+4+14=38)
      status: pass

    - name: enforcement-checked
      description: Each decision checked against pkg/, cmd/, skills/src/, .claude/, CLAUDE.md
      evidence: 40+ grep patterns run; 4 parallel agents searched code, gates, architecture, skills
      status: pass

    - name: active-verified
      description: ACTIVE decisions have concrete code/skill enforcement evidence
      evidence: Each ACTIVE entry includes file path and enforcement mechanism
      status: pass

    - name: aspirational-verified
      description: ASPIRATIONAL decisions confirmed to have no enforcement
      evidence: Grep patterns returned zero matches for aspirational concepts in code
      status: pass

    - name: superseded-chain-verified
      description: SUPERSEDED decisions have a specific later decision that replaced them
      evidence: Health score decisions superseded by 2026-03-11-remove; registry superseded by CLAUDE.md constraint
      status: pass

  manual_verification:
    - description: "Orchestrator reviews 14 aspirational decisions and decides: implement, shelve, or delete"
    - description: "Verify classification matches kb reflect stale list (run: kb reflect --format json)"

  commands_run:
    - "grep patterns for: question gates, escalation levels, SSE, ghost filtering, lineage, etc."
    - "glob of .kb/decisions/**/*.md and .kb/global/decisions/**/*.md"
    - "file reads of 62+ decision files (first 20 lines each)"
    - "code verification: workspace.go, escalation.go, lifecycle.go, claude.go, gate-git-add-all.py"
