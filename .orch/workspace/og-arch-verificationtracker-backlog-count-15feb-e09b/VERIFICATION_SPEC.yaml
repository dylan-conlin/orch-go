## Bug Reproduction
# Original bug: daemon preview shows 7 unverified, orch review shows 1
# Cause: CountUnverifiedCompletions() counted closed issues, orch review filtered them out

expected_behavior: |
  VerificationTracker backlog count (shown in daemon preview) should match
  the count of completions shown by `orch review`. Both systems should use
  the same filtering logic to exclude closed/deferred/tombstone issues.

