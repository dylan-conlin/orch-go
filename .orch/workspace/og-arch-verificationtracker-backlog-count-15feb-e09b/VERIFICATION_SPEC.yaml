## Manual Verification (Recommended)

manual_test_procedure: |
  1. Create a checkpoint entry for a closed issue:
     - Find or create a closed beads issue
     - Manually add checkpoint entry to ~/.orch/verification-checkpoints.jsonl
     - Set gate1_complete=false and gate2_complete=false
  
  2. Run daemon preview:
     orch daemon preview
     Note the "Verification backlog" count
  
  3. Run orch review:
     orch review
     Count the number of pending completions shown
  
  4. Verify counts match:
     - Both should exclude the closed issue
     - Backlog count == review completion count

expected_outcome: |
  Before fix: Backlog count would include closed issue, review would not
  After fix: Both exclude closed issue, counts match

