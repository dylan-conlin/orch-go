implementation_summary: |
  Added explain-back verification gate to orch complete. This gate:
  
  1. Prompts human (Dylan) to explain what was built and why before completion
  2. Creates an unfakeable verification gate - can't rubber-stamp conversational explanation
  3. Captures explanation as beads comment for future reference
  4. Forces processing (like pilot callouts in instrument flying)
  
  Components added/modified:
  - pkg/verify/check.go: Added GateExplainBack constant
  - pkg/verify/explain_back.go: New file with PromptExplainBack function
  - cmd/orch/complete_cmd.go: 
    - Added --skip-explain-back flag
    - Integrated explain-back gate into runComplete flow
    - Updated SkipConfig struct and related methods
    - Added help text documenting the new gate
  
  Flow:
  1. All other verification gates pass
  2. Discovered work gate runs
  3. Probe verdicts surfaced
  4. **NEW: Explain-back gate prompts for:**
     - What did you build? (1-2 sentences)
     - Why does it matter? (1-2 sentences)
     - How did you verify it works? (1-2 sentences)
  5. Explanation saved as beads comment with "EXPLAIN-BACK:" prefix
  6. Session handoff update
  7. Issue closed
  
  Skip behavior:
  - Skipped for orchestrator sessions (they have SESSION_HANDOFF.md)
  - Skipped for untracked agents (no beads issue to comment on)
  - Can be bypassed with --skip-explain-back --skip-reason "..."
  - Requires terminal (fails in non-interactive mode without skip)

coverage_notes: |
  No new tests added specifically for explain_back.go because:
  - The prompting logic is interactive (requires user input)
  - Similar to discovered work prompting (also not unit tested)
  - Will be validated through manual testing during actual completions
  
  Verified:
  - Build succeeds (no compilation errors)
  - Existing tests pass (no regressions)
  - Integration with complete_cmd.go follows existing patterns

manual_verification_required: true
manual_verification_steps: |
  To test the explain-back gate:
  1. Complete an agent that has reported Phase: Complete
  2. Verify the explain-back prompts appear
  3. Provide answers to the three questions
  4. Check that the explanation is saved as a beads comment
  5. Test --skip-explain-back flag with --skip-reason
