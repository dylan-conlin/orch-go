verification:
  commands:
    - name: "Build binary"
      command: "go build -o ./build/orch ./cmd/orch/"
      expect: "exit 0, no errors"

    - name: "daemon once shows verification output"
      command: "./build/orch daemon once 2>&1"
      expect: "stdout contains 'Verification check:'"

    - name: "daemon run --dry-run shows verification output"
      command: "./build/orch daemon run --dry-run 2>&1"
      expect: "stdout contains 'Verification check:'"

    - name: "go vet passes"
      command: "go vet ./cmd/orch/"
      expect: "exit 0, no output"

    - name: "verification tests pass"
      command: "go test ./pkg/daemon/ -run TestVerification -count=1"
      expect: "PASS"

  manual_steps: []
