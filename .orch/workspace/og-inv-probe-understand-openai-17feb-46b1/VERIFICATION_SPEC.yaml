type: investigation
outcome: success
investigation_path: .kb/investigations/2026-02-17-inv-probe-understand-openai-gpt-plugin.md

questions_answered:
  - question: "What OpenAI plugin is installed in OpenCode?"
    answer: "Codex auth plugin (internal, at src/plugin/codex.ts) - handles OAuth for ChatGPT Pro"
    evidence: "codex.ts:351 exports CodexAuthPlugin, plugin/index.ts:10 imports it"

  - question: "How does the plugin authenticate?"
    answer: "PKCE OAuth flow via auth.openai.com, browser-based login, tokens stored in auth.json"
    evidence: "codex.ts:10-14 defines CLIENT_ID and ISSUER, lines 21-143 implement OAuth flow"

  - question: "What models are available through OAuth?"
    answer: "6 Codex models: gpt-5.1-codex-max, gpt-5.1-codex-mini, gpt-5.2, gpt-5.2-codex, gpt-5.3-codex, gpt-5.1-codex"
    evidence: "codex.ts:360-372 explicit whitelist, all others deleted"

  - question: "What model ID format does OpenCode expect?"
    answer: "providerID/modelID (e.g., openai/gpt-5.2-codex) - matches orch's format"
    evidence: "session/index.ts:789-797, provider.ts:1101-1118"

  - question: "Will openai/gpt-4o reach the right provider?"
    answer: "Format is correct but gpt-4o is removed by Codex plugin when OAuth is active"
    evidence: "codex.ts:368-371 deletes non-whitelisted models"

  - question: "Are there rate limits?"
    answer: "Unknown - not documented in source code. Included with ChatGPT Pro subscription."
    evidence: "No rate limit logic found in codex.ts or provider.ts"

  - question: "Does plugin respect passed model?"
    answer: "Yes, model string flows through to Provider.getModel() which looks up in loaded providers"
    evidence: "session/index.ts:797, provider.ts:1101-1118"

verdict: "orch config set default_model gpt4o will NOT work end-to-end. Need Codex-model aliases and OAuth setup."

manual_steps_required:
  - "One-time: Run OpenCode TUI → authenticate OpenAI via Codex OAuth"
  - "Verify: After auth, check auth.json has openai entry"
  - "Test: orch spawn --model gpt-5.2 investigation 'test' should create session"
