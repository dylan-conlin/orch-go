verification:
  type: investigation
  skill: investigation

  deliverables:
    - path: .kb/models/daemon-autonomous-operation/probes/2026-02-27-probe-phantom-agent-spawns-daemon-status-stale-file.md
      exists: true
      description: Probe file documenting findings against daemon-autonomous-operation model
    - path: .kb/investigations/2026-02-27-investigate-phantom-agent-spawns.md
      exists: true
      description: Full investigation with D.E.K.N. summary and 5 findings

  commands_run:
    - command: "cat ~/.orch/daemon.pid && ps -p 25932"
      purpose: Verify daemon PID file vs process liveness
      result: PID file exists (25932) but process is dead
    - command: "cat ~/.orch/daemon-status.json"
      purpose: Check daemon status file contents
      result: File shows paused status with stale last_poll
    - command: "grep 'session.spawned' ~/.orch/events.jsonl | tail -20"
      purpose: Build timeline of recent spawns
      result: Identified 5 daemon spawns + 10 manual spawns in window
    - command: "grep -E '(e6wo|zqgk|iwb3|dm9x|rmef|1245)' ~/.orch/events.jsonl"
      purpose: Trace events for reported phantom agents
      result: All 5 daemon spawns have daemon.spawn events with sequential counts
    - command: "ps aux | grep 'orch serve'"
      purpose: Check running orch processes
      result: Only orch serve (PID 45906) running, no daemon process
    - command: "overmind status"
      purpose: Check dashboard-managed services
      result: api, web, opencode — no daemon service

  conclusions:
    - "Phantom spawns were actually legitimate daemon-initiated spawns from PID 25932"
    - "Spawn count metric is accurate — only counts session.spawned events"
    - "Stale daemon-status.json causes false 'running' report after daemon death (bug)"
    - "orch complete/abandon don't trigger spawns — they free concurrency slots"

  bugs_found:
    - id: "stale-daemon-status"
      severity: P2
      description: "orch status and dashboard API report daemon as running based on stale file existence, not process liveness"
      location: "serve_system.go:419, status_cmd.go:1308"

  manual_verification:
    - "Check that probe file has all 4 required sections (Question, What I Tested, What I Observed, Model Impact)"
    - "Verify investigation D.E.K.N. summary is complete"
