task: Add agent badges to work graph tree nodes
beads_id: orch-go-jvs1
tier: light

deliverables:
  - path: web/src/lib/components/work-graph-tree/work-graph-tree-helpers.ts
    description: AgentBadgeConfig interface and getAgentBadge() helper function
    verified: true
  - path: web/src/lib/components/work-graph-tree/work-graph-tree.svelte
    description: Agent badge rendering on tree node rows, agentsByBeadsId prop
    verified: true
  - path: web/src/routes/work-graph/+page.svelte
    description: agentsByBeadsId map built from agents store, passed as prop
    verified: true

build_verification:
  - command: "cd web && npm run build"
    result: "success - built in 16.59s"
  - command: "go build ./cmd/orch/"
    result: "success - no errors"
  - command: "go vet ./cmd/orch/"
    result: "success - no errors"
  - command: "cd web && npx svelte-check --threshold error"
    result: "no new errors introduced (pre-existing errors in unrelated files)"

manual_verification:
  - step: "Open http://localhost:5188 work graph page"
    expected: "Tree nodes with associated agents show small colored badges"
    note: "Requires running agents with beads_id matching open issues"

design_notes: |
  - Agent badges appear before the attention badge and type badge on each tree node row
  - Badge shows icon + label (e.g., "◉ implementing", "✓ completed", "✕ dead")
  - Colors match agent status: blue (active/running), green (completed/cleanup), red (dead), amber (stalled)
  - Processing agents get animate-pulse on the icon
  - When multiple agents have the same beads_id, the highest-priority one is shown (active > completed > dead)
  - Uses inline structural type for getAgentBadge() parameter to avoid import issues with linter
