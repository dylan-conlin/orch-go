verification:
  automated:
    - command: "go test ./pkg/spawn/gates/ -run TestCheckHotspot -count=1 -v"
      expect: "PASS"
      description: "All hotspot gate tests pass including new architect-ref verification tests"
    - command: "go test ./pkg/orch/ -run TestIsArchitectIssue -count=1 -v"
      expect: "PASS"
      description: "isArchitectIssue correctly identifies architect issues by label and title"
    - command: "go build ./cmd/orch/"
      expect: "exit 0"
      description: "Project builds cleanly with all signature changes"
    - command: "go vet ./pkg/spawn/gates/ ./pkg/orch/ ./cmd/orch/"
      expect: "exit 0"
      description: "No vet warnings"

  behavioral:
    - scenario: "orch spawn --bypass-triage --force-hotspot feature-impl 'task targeting large file'"
      expect: "Error: --force-hotspot requires --architect-ref <issue-id>"
      description: "--force-hotspot without --architect-ref is blocked"
    - scenario: "orch spawn --bypass-triage --force-hotspot --architect-ref orch-go-1184 feature-impl 'task'"
      expect: "Success (if orch-go-1184 is closed architect issue)"
      description: "--force-hotspot with valid closed architect ref proceeds"
    - scenario: "orch spawn --bypass-triage --force-hotspot --architect-ref orch-go-1182 feature-impl 'task'"
      expect: "Error: not an architect issue"
      description: "Non-architect issue ref is rejected"

  files_changed:
    - pkg/spawn/gates/hotspot.go
    - pkg/spawn/gates/hotspot_test.go
    - pkg/orch/extraction.go
    - pkg/orch/extraction_test.go
    - cmd/orch/spawn_cmd.go
    - cmd/orch/rework_cmd.go
