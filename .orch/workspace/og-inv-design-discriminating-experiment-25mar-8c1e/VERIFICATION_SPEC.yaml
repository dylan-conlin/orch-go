verification:
  type: design
  description: "Discriminating experiment design for gate/attractor failure mechanisms"

  automated_checks:
    - name: "run-mechanism.sh dry-run Phase 1"
      command: "./experiments/coordination-demo/redesign/run-mechanism.sh --dry-run --trials 2 --phase 1 2>&1 | tail -5"
      expected: "Contains 'EXPERIMENT COMPLETE' and produced 16 trial prompts"
      result: PASS

    - name: "run-mechanism.sh dry-run Phase 2"
      command: "./experiments/coordination-demo/redesign/run-mechanism.sh --dry-run --trials 2 --phase 2 --critical-n 10 2>&1 | tail -5"
      expected: "Contains 'EXPERIMENT COMPLETE' and produced 6 trial prompts"
      result: PASS

    - name: "Constraint pool completeness"
      command: "grep -c 'CONSTRAINT_TEXT\\[C' experiments/coordination-demo/redesign/run-mechanism.sh"
      expected: "20 constraint definitions"
      result: PASS

    - name: "Detector completeness"
      command: "grep -c 'C[0-9][0-9])' experiments/coordination-demo/redesign/run-mechanism.sh | head -1"
      expected: "20+ case clauses in check_constraint function"
      result: PASS

  manual_checks:
    - name: "Investigation file complete"
      description: "D.E.K.N. summary filled, prior work table populated, findings documented"
      result: PASS

    - name: "Three mechanisms have falsifiable predictions"
      description: "Resource competition, interference, and threshold collapse each predict different curve shapes, variance patterns, and removal effects"
      result: PASS

  artifacts:
    - path: "experiments/coordination-demo/redesign/run-mechanism.sh"
      type: "experiment runner"
    - path: "experiments/coordination-demo/redesign/score-mechanism.sh"
      type: "scoring/analysis"
    - path: "experiments/coordination-demo/redesign/prompts/mechanism/base-task.md"
      type: "prompt template"
    - path: ".kb/investigations/2026-03-25-inv-design-discriminating-experiment-gate-attractor.md"
      type: "investigation"

  next_steps:
    - "Run Phase 1: ./run-mechanism.sh --phase 1"
    - "Analyze: ./score-mechanism.sh results/mechanism-p1-TIMESTAMP"
    - "Run Phase 2/3 based on Phase 1 critical N"
    - "Update coordination model.md with mechanism findings"
