verification:
  type: automated
  commands:
    - name: "Unit tests - classify tmux windows with process liveness"
      command: "go test ./cmd/orch/ -run TestClassifyTmuxWindows -v"
      expected: "14 subtests PASS, 0 failures"
    - name: "Unit test - idle shell command detection"
      command: "go test ./cmd/orch/ -run TestIdleShellCommands -v"
      expected: "PASS"
    - name: "All clean tests pass"
      command: "go test ./cmd/orch/ -run TestClean -v"
      expected: "All tests PASS (1 integration test skipped)"
    - name: "Build succeeds"
      command: "go build ./cmd/orch/"
      expected: "No errors"
    - name: "Go vet clean"
      command: "go vet ./cmd/orch/ ./pkg/tmux/"
      expected: "No issues"
  smoke_test:
    - name: "orch clean --sessions --dry-run protects active windows"
      command: "orch clean --sessions --dry-run"
      expected: "Protected N windows, no stale windows incorrectly classified"
  manual_steps:
    - "Confirm active Claude Code tmux agent survives orch clean --sessions"
    - "Confirm idle tmux window (shell only, no child processes) IS classified as stale"
  reproduction:
    original_bug: "orch clean --sessions kills active Claude Code tmux agents when OpenCode has 0 sessions"
    fix_verified: "Process liveness check prevents killing windows with running agent processes"
    test_cases:
      - "TestClassifyTmuxWindows/active_process_protects_window_even_with_no_OpenCode_session_and_no_open_beads_issue"
      - "TestClassifyTmuxWindows/OpenCode_server_restart_scenario:_0_sessions,_active_process_protects_window"
      - "TestClassifyTmuxWindows/dead_process_with_no_OpenCode_session_and_no_open_beads_issue_is_stale"
