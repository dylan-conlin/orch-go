sub_findings:
  - id: worker-1
    subproblem: "Are the 84+ investigation-cluster hotspots real architectural signals or noise from broad keyword matching?"
    verdict: accepted
    grounding: high
    consistency: consistent
    coverage: covers-assigned
    relevance: on-target
    actionability: actionable
    key_claims:
      - claim: "56% of investigation-cluster keywords (48/85) are noise from single-word frequency matching"
        evidence: "Classified all 85 keywords against actual investigation filenames; traced algorithm to hotspot_analysis.go:193-247; ran orch hotspot --json"
        confidence: medium
        note: "Self-corrected to 35-56% range — acknowledged 'clean', 'complete', 'status', 'graph' are ambiguous domain words. The true noise rate depends on classification criteria."
      - claim: "Algorithm is single-word frequency on filenames with no content analysis or bigram matching"
        evidence: "Code trace of analyzeInvestigationClusters at hotspot_analysis.go:193-247"
        confidence: high
      - claim: "Stop word list has 33 entries, missing ~40+ generic terms"
        evidence: "Cross-referenced stop word map (hotspot_analysis.go:300-333) against output; enumerated specific missing words"
        confidence: high
      - claim: "Threshold 3→5 reduces hotspots from 85→34, retaining all score>=8 real signals"
        evidence: "Ran orch hotspot --inv-threshold N for N in {3,4,5,6,7,8,10}"
        confidence: high
      - claim: "Noise keywords cascade into spawn gate false positives via strings.Contains path matching"
        evidence: "Code trace of hotspot_spawn.go:113-120; observed in current spawn context (this very task's HOTSPOT AREA WARNING includes 'md', 'orch', 'kb')"
        confidence: high
        note: "Demonstrated in vivo — this task's own hotspot warning contains noise keywords like 'md' and 'kb'"
    notes: "Strong finding. The self-correction from '56% noise' to '35-56% depending on criteria' shows intellectual honesty. The observation that domain ambiguity is inherent (not just a stop-word gap) is the most valuable insight — it means no amount of stop-word tuning fully solves this."

  - id: worker-2
