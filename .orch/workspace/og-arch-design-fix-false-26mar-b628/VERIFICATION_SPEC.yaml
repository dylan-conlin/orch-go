verification_spec:
  version: "1.0"
  issue: orch-go-k6c0v
  type: design
  description: "Design fix for false 0/100 spawn context scores from KB context timeout"

  design_deliverables:
    investigation:
      path: ".kb/investigations/2026-03-26-design-fix-false-0-100-spawn-context-scores.md"
      required_sections:
        - "Summary (D.E.K.N.)"
        - "Findings"
        - "Synthesis"
        - "Structured Uncertainty"
        - "Implementation Recommendations"
      status: complete

    implementation_issue:
      id: "orch-go-paatt"
      title: "Implement timeout-aware gap analysis for KB context"
      status: created

  implementation_acceptance_criteria:
    - id: AC1
      description: "runKBContextQuery detects context.DeadlineExceeded and returns KBContextResult{TimedOut: true}"
      file: "pkg/spawn/kbcontext.go"
      verification: "Unit test: mock timeout → verify TimedOut=true on result"

    - id: AC2
      description: "Per-query timeout raised from 5s to 10s"
      file: "pkg/spawn/kbcontext.go"
      verification: "Constant value check"

    - id: AC3
      description: "GapTypeTimeout gap type exists with GapSeverityWarning"
      file: "pkg/spawn/gap.go"
      verification: "Unit test: AnalyzeGaps with TimedOut result → GapTypeTimeout, severity=warning"

    - id: AC4
      description: "ShouldBlockSpawn returns false when GapTypeTimeout present"
      file: "pkg/spawn/gap.go"
      verification: "Unit test: GapAnalysis with GapTypeTimeout, quality=0 → ShouldBlockSpawn=false"

    - id: AC5
      description: "Fallback search preserves timeout signal (doesn't overwrite with nil)"
      file: "pkg/orch/spawn_kb_context.go"
      verification: "Unit test or code review: primary timeout + fallback nil → result still has TimedOut"

    - id: AC6
      description: "kb.context.timeout event logged on timeout"
      file: "pkg/orch/spawn_kb_context.go"
      verification: "Event log inspection after timeout"

    - id: AC7
      description: "FormatGapSummary shows timeout message instead of 'No prior knowledge found'"
      file: "pkg/spawn/gap.go"
      verification: "Unit test: GapTypeTimeout → summary contains 'timed out'"

  defect_class_exposure:
    - class: 1
      name: "Filter Amnesia"
      exposure: "Fallback search overwrites timeout signal with nil"
      mitigation: "Use separate variable for fallback result; only overwrite if fallback has real matches"

    - class: 5
      name: "Contradictory Authority Signals"
      exposure: "Quality=0 + GapTypeTimeout could confuse consumers expecting 0=bad"
      mitigation: "Display text explicitly says 'timed out' not 'no context'; gate check uses gap type not quality"

  existing_tests_must_pass:
    - "go test ./pkg/spawn/..."
    - "go test ./cmd/orch/..."
