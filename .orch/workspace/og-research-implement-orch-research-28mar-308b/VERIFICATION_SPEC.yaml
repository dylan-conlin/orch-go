verification:
  issue: orch-go-scogn
  agent: og-research-implement-orch-research-28mar-308b
  skill: research

tests:
  - name: "Package tests pass"
    command: "go test ./pkg/research/... -v"
    expected: "PASS (19 tests)"
    result: "PASS — 19/19 tests pass (0.257s)"

  - name: "Build succeeds"
    command: "go build ./cmd/orch/"
    expected: "No errors"
    result: "BUILD OK"

  - name: "Summary mode shows all models"
    command: "go run ./cmd/orch/ research"
    expected: "Shows 12 models with claim counts and test status"
    result: "12 models displayed, 115 total claims, 83% tested"

  - name: "Detail mode shows claims"
    command: "go run ./cmd/orch/ research named-incompleteness"
    expected: "Shows 6 claims with probe details and test status"
    result: "6 claims, 3 tested, probes listed with dates and verdicts"

  - name: "Prefix matching works"
    command: "go run ./cmd/orch/ research smithy"
    expected: "Matches smithy-geometry-engine"
    result: "Shows 8 untested claims for smithy-geometry-engine"

  - name: "Missing claim error"
    command: "go run ./cmd/orch/ research named-incompleteness NI-99"
    expected: "Error: claim NI-99 not found"
    result: "Error: claim NI-99 not found in model named-incompleteness"

  - name: "Ambiguous prefix error"
    command: "go run ./cmd/orch/ research a"
    expected: "Error listing ambiguous matches"
    result: "ambiguous model name 'a' matches: agent-lifecycle-state-model, agent-trust-enforcement, ..."

manual_verification:
  - step: "Run orch research <model> <claim-id> to create an issue"
    note: "Not tested to avoid creating real beads issues"
    expected: "Creates triage:ready issue with skill:probe label"
