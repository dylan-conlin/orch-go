verification:
  type: bug-fix
  issue: orch-go-1118

  reproduction:
    description: "orch hotspot shows investigation clusters for generic words like 'comprehensive', 'document', 'integrate'"
    before:
      command: "kb reflect --type synthesis --format json"
      expected_bad_topics: ["comprehensive", "document", "integrate"]
    after:
      command: "./build/orch hotspot --json | python3 -c \"import json,sys; d=json.load(sys.stdin); bad=['comprehensive','document','integrate']; found=[h['path'] for h in d['hotspots'] if h['type']=='investigation-cluster' and h['path'] in bad]; print('PASS: no false positives' if not found else f'FAIL: {found}')\""
      expected: "PASS: no false positives"

  tests:
    unit:
      command: "go test ./cmd/orch/ -run TestHotspot -count=1"
      result: "PASS (0.011s)"
    full_suite:
      command: "go test ./cmd/orch/ -count=1"
      result: "PASS (13.515s)"
    build:
      command: "go build ./cmd/orch/"
      result: "success"

  smoke_test:
    command: "./build/orch hotspot --json 2>&1 | python3 -c \"import json,sys; d=json.load(sys.stdin); clusters=[h for h in d['hotspots'] if h['type']=='investigation-cluster']; bad=['comprehensive','document','integrate','design','audit']; found=[c['path'] for c in clusters if c['path'] in bad]; print(f'Clusters: {len(clusters)}, False positives: {found}')\""
    expected_output: "Clusters: 306, False positives: []"
    verified: true

  files_changed:
    - cmd/orch/hotspot.go
    - cmd/orch/hotspot_test.go
