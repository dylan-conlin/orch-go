verification_spec:
  version: 1
  issue: orch-go-k8sle
  type: architect-design

  design_verification:
    investigation_produced: true
    investigation_path: .kb/investigations/2026-03-25-design-composed-liveness-detection-claude.md
    forks_identified: 5
    forks_navigated: 5
    blocking_questions: 0
    recommendations_produced: true

  key_findings:
    - finding: "IsProcessing IS set for Claude agents from status mapping (active→true), not absent as jhluq investigation claimed"
      evidence: "status_cmd.go:462 maps active→IsProcessing=true; no override for Claude unlike OpenCode at line 234"
      impact: "Dead Claude agents with stale phase comments are permanently masked as processing"
    - finding: "IsPaneActive() in pkg/tmux/pane.go:68 is the natural live IsProcessing equivalent"
      evidence: "Already used by orch clean (lifecycle_impl.go:435), dual-signal detection, ~10ms cost"
    - finding: "Discovery Claude backend has Class 5 defect — phase comments mask dead agents"
      evidence: "discovery.go:404 gives phase_reported priority over tmux window check at line 416"

  implementation_components:
    - component: "Discovery signal refactor"
      file: pkg/discovery/discovery.go
      changes:
        - "Add TmuxWindowID and IsProcessing fields to AgentStatus"
        - "Replace CheckTmuxWindowAlive with FindTmuxWindowForAgent (returns WindowInfo)"
        - "Reorder Claude backend: check window alive first, then phase for categorization"
        - "Set IsProcessing from IsPaneActive when window found"
    - component: "status_cmd Claude override"
      file: cmd/orch/status_cmd.go
      changes:
        - "Add Claude-specific IsProcessing override loop after OpenCode enrichment (after line 242)"
        - "Use discovery's IsProcessing (from IsPaneActive) instead of static status mapping"
    - component: "serve_agents_handlers Claude override"
      file: cmd/orch/serve_agents_handlers.go
      changes:
        - "Add Claude IsProcessing override in agent conversion (after line 118)"
        - "Use tracked.IsProcessing for Claude agents"

  success_criteria:
    - "Active Claude agent: IsPaneActive=true → IsProcessing=true → UNRESPONSIVE suppressed"
    - "Dead Claude agent (crashed): window dead or IsPaneActive=false → IsProcessing=false → properly flagged"
    - "OpenCode agents: no change in behavior (session API still overrides)"
    - "Existing discovery tests pass"

  defect_classes_addressed:
    - "Class 2 (Multi-Backend Blindness): Claude agents now have live IsProcessing parity with OpenCode"
    - "Class 5 (Contradictory Authority Signals): Signal priority reorder resolves phase vs tmux contradiction"
    - "Class 7 (Premature Destruction): Live signal prevents premature UNRESPONSIVE flagging"

  manual_verification_needed:
    - "Run orch status with active Claude agent — confirm IsProcessing=true"
    - "Kill a Claude agent process — confirm status changes to dead on next orch status"
    - "Verify dashboard shows same behavior via orch serve API"
