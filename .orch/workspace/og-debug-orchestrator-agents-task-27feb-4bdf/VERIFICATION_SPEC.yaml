verification:
  automated:
    - name: "Go tests pass for --disallowedTools"
      command: "go test -run TestBuildClaudeLaunchCommand ./pkg/spawn/ -count=1 -v"
      expected: "PASS"
      result: "PASS - 14/14 tests"

    - name: "Hook denies Task for orchestrator context"
      command: "echo '{\"tool_name\": \"Task\", \"tool_input\": {}}' | CLAUDE_CONTEXT=orchestrator python3 ~/.orch/hooks/gate-orchestrator-task-tool.py"
      expected: "JSON output with permissionDecision: deny"
      result: "PASS - deny with ORCHESTRATOR SPAWN GUARD message"

    - name: "Hook denies Task for meta-orchestrator context"
      command: "echo '{\"tool_name\": \"Task\", \"tool_input\": {}}' | CLAUDE_CONTEXT=meta-orchestrator python3 ~/.orch/hooks/gate-orchestrator-task-tool.py"
      expected: "JSON output with permissionDecision: deny"
      result: "PASS - deny with ORCHESTRATOR SPAWN GUARD message"

    - name: "Hook allows Task for worker context"
      command: "echo '{\"tool_name\": \"Task\", \"tool_input\": {}}' | CLAUDE_CONTEXT=worker python3 ~/.orch/hooks/gate-orchestrator-task-tool.py"
      expected: "No output (exit 0, tool allowed)"
      result: "PASS - no output"

    - name: "Hook allows Task with no CLAUDE_CONTEXT"
      command: "echo '{\"tool_name\": \"Task\", \"tool_input\": {}}' | python3 ~/.orch/hooks/gate-orchestrator-task-tool.py"
      expected: "No output (exit 0, tool allowed)"
      result: "PASS - no output"

    - name: "Hook allows non-Task tools for orchestrators"
      command: "echo '{\"tool_name\": \"Bash\", \"tool_input\": {}}' | CLAUDE_CONTEXT=orchestrator python3 ~/.orch/hooks/gate-orchestrator-task-tool.py"
      expected: "No output (exit 0, tool allowed)"
      result: "PASS - no output"

    - name: "settings.json is valid JSON"
      command: "python3 -c \"import json; json.load(open('~/.claude/settings.json'.replace('~', __import__('os').path.expanduser('~')))); print('Valid')\""
      expected: "Valid"
      result: "PASS"

    - name: "orch-go builds successfully"
      command: "go build ./cmd/orch/"
      expected: "No errors"
      result: "PASS"

  manual:
    - description: "Spawn an orchestrator and verify Task tool is blocked"
      steps:
        - "orch spawn orchestrator 'test task tool blocking'"
        - "In the orchestrator session, attempt to use Task tool"
        - "Verify the hook blocks it with ORCHESTRATOR SPAWN GUARD message"
      result: "Not performed in this session (requires spawning orchestrator)"

  reproduction:
    original_bug: "Orchestrator agents use Task tool instead of orch spawn"
    fix_verification: "Two-layer enforcement: (1) --disallowedTools removes Task from toolset at spawn time, (2) PreToolUse hook blocks Task at runtime for CLAUDE_CONTEXT=orchestrator"
    layers:
      - layer: "spawn-time (--disallowedTools)"
        file: "pkg/spawn/claude.go:92-96"
        status: "Already implemented, tests pass"
      - layer: "runtime (PreToolUse hook)"
        file: "~/.orch/hooks/gate-orchestrator-task-tool.py"
        status: "NEW - implemented and tested"
      - layer: "settings registration"
        file: "~/.claude/settings.json"
        status: "Updated with Task matcher"

deliverables:
  files_created:
    - path: "~/.orch/hooks/gate-orchestrator-task-tool.py"
      description: "PreToolUse hook blocking Task tool for orchestrator sessions"
  files_modified:
    - path: "~/.claude/settings.json"
      description: "Added PreToolUse matcher for Task tool"
