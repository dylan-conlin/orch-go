verification:
  type: bug-fix
  status: verified

  reproduction:
    original_bug: "orch review shows '(no beads tracking)' for agents with beads issues"
    reproduced_before_fix: true
    evidence: "14 non-untracked workspaces had .beads_id but no SPAWN_CONTEXT.md pattern"

  fix:
    commit: e166d3fe5
    description: "extractBeadsIDFromWorkspace() checks .beads_id and AGENT_MANIFEST.json before SPAWN_CONTEXT.md"
    applied_by: og-debug-orch-review-shows-27feb-6853 (parallel agent)

  tests:
    - name: TestExtractBeadsIDFromWorkspace
      command: "go test ./cmd/orch/ -run TestExtractBeadsIDFromWorkspace -v"
      result: "7/7 PASS"
      subtests:
        - "prefers .beads_id file"
        - "falls back to AGENT_MANIFEST.json"
        - "falls back to SPAWN_CONTEXT.md legacy format"
        - "returns empty when no sources exist"
        - "handles SPAWN_CONTEXT.md without beads issue line"
        - "beads issue with backticks in SPAWN_CONTEXT.md"
        - "empty .beads_id file falls through to manifest"
    - name: Review tests
      command: "go test ./cmd/orch/ -run TestReview -v"
      result: "4/4 PASS"

  smoke_test:
    command: "go run ./cmd/orch/ review --all"
    expected: "No false '(no beads tracking)' labels for tracked agents"
    result: "7 completions, 7 OK, 0 need review, all with correct beads IDs"

  manual_steps: none
