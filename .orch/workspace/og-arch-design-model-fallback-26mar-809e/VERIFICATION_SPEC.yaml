# Issue: orch-go-2mlhl
# Type: architect (design investigation, no code changes)

verification:
  type: design-review
  outcome: investigation-with-recommendations

deliverables:
  investigation:
    path: .kb/investigations/2026-03-26-inv-design-model-fallback-cascade-opus.md
    status: complete
    sections_filled:
      - DEKN summary
      - Prior work
      - 3 findings with evidence and source
      - Synthesis with routing priority order
      - Structured uncertainty
      - Recommendations with authority classification
      - References and investigation history

  synthesis:
    path: .orch/workspace/og-arch-design-model-fallback-26mar-809e/SYNTHESIS.md
    plain_language_summary: present
    architectural_choices: 3 documented

  brief:
    path: .orch/workspace/og-arch-design-model-fallback-26mar-809e/BRIEF.md
    sections: [Frame, Resolution, Tension]

  follow_up_issue:
    id: orch-go-4i9bs
    title: Implement Opus rate-limit fallback cascade
    status: open

design_forks_navigated:
  - fork: "Preserve Anthropic first vs jump straight to OpenAI"
    decision: "Preserve Anthropic first"
    rationale: "Matches current validated reasoning-heavy path and avoids premature cross-provider downgrade"
  - fork: "Treat all Opus failures the same vs distinguish Opus-specific exhaustion"
    decision: "Distinguish Opus-specific exhaustion"
    rationale: "seven_day_opus is the missing signal for choosing Sonnet correctly"
  - fork: "Universal GPT-5.4 fallback vs skill-scoped fallback"
    decision: "Skill-scoped fallback"
    rationale: "GPT-5.4 is only empirically validated for feature-impl overflow"

migration_status:
  designed: "Anthropic-first fallback cascade: alternate Opus account -> Sonnet -> GPT-5.4 for feature-impl only -> stop/escalate for reasoning-heavy skills"
  implemented: "none"
  deployed: "none"
  remaining: "Plumb seven_day_opus, add canonical fallback decision logic, update operator-visible routing guidance"

