verification_spec:
  version: 1
  type: experiment
  issue: orch-go-i77wx

  summary: >
    Decomposition quality experiment: 5 conditions x 10 trials x 2 agents = 100 invocations.
    Tests whether improving task description quality and file structure can eliminate
    merge conflicts for additive multi-agent tasks without coordination primitives.

  experiment:
    script: experiments/coordination-demo/redesign/run-decomposition.sh
    model: claude-haiku-4-5-20251001
    trials_per_condition: 10
    total_agents: 100
    results_dir: experiments/coordination-demo/redesign/results/decomp-20260324-113331

  results:
    bare_flat:
      trials: 10
      conflicts: 10
      successes: 0
      conflict_rate: "100%"
      predicted: "~100%"
      match: "confirmed"
    rich_flat:
      trials: 10
      conflicts: 10
      successes: 0
      conflict_rate: "100%"
      predicted: "~80-100%"
      match: "at upper bound"
    anchored_flat:
      trials: 10
      conflicts: 10
      successes: 0
      conflict_rate: "100%"
      predicted: "~50-80%"
      match: "WORSE than predicted"
    bare_sectioned:
      trials: 10
      conflicts: 8
      successes: 2
      conflict_rate: "80%"
      predicted: "~40-60%"
      match: "WORSE than predicted"
    anchored_sectioned:
      trials: 10
      conflicts: 6
      successes: 4
      conflict_rate: "60%"
      predicted: "~0-20%"
      match: "MUCH WORSE than predicted"

  agent_quality:
    total_agents: 100
    perfect_scores: 100
    score_rubric: "completion + build + tests + regression + file_discipline + spec_match"
    max_score: 6
    avg_score: "6.00/6 across all conditions"

  anchoring_analysis:
    flat_files:
      agent_a_mean_line: 92
      agent_a_variance: 0
      agent_b_mean_line: 92
      agent_b_variance: 0
      interpretation: "100% convergence to end-of-file, zero effect from task quality"
    sectioned_files:
      interpretation: "Agents respect section markers but git merge still fails 60-80%"

  key_finding: >
    Decomposition quality alone CANNOT eliminate coordination need.
    Best condition (anchored-sectioned) still produces 60% conflict.
    Coordination primitives (Route, Sequence) are load-bearing.

  reproducibility:
    command: "bash experiments/coordination-demo/redesign/run-decomposition.sh"
    scoring: "bash experiments/coordination-demo/redesign/score-decomposition.sh RESULTS_DIR"
    analysis: "bash experiments/coordination-demo/redesign/analyze-decomposition.sh RESULTS_DIR"

  manual_steps: []
