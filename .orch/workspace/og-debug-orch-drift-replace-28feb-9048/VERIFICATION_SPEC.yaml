verification:
  type: behavioral

  reproduction:
    description: "orch drift should show alignment analysis, not raw agent ID dump"
    before: "orch drift output was 'Active: orch-go-untracked-1771686652, orch-go-untracked-1771686571, ...' — flat comma-separated list of 24 raw IDs"
    after: "orch drift groups agents by skill, shows titles and phases, filters untracked"
    verified: true
    verification_command: "go run ./cmd/orch/ drift"

  tests:
    - name: "Unit tests for buildDriftAnalysis"
      command: "go test ./cmd/orch/ -run TestBuildDrift -v"
      result: "5 passed, 0 failed (0.011s)"

    - name: "Focus package tests (regression)"
      command: "go test ./pkg/focus/ -v"
      result: "20 passed, 0 failed"

    - name: "Build verification"
      command: "go build ./cmd/orch/"
      result: "clean"

    - name: "Vet verification"
      command: "go vet ./cmd/orch/"
      result: "clean"

  smoke_test:
    description: "Run orch drift and verify grouped output"
    command: "go run ./cmd/orch/ drift"
    expected: |
      - Shows verdict header (ON TRACK / DRIFT DETECTED / ALIGNMENT UNVERIFIED)
      - Groups agents by skill type with counts
      - Shows task titles and phases per agent
      - Shows untracked session count (not individual untracked IDs)
    verified: true

  manual_steps:
    - "Run 'orch drift' — should show skill-grouped agent list, not raw IDs"
    - "Run 'orch drift --json' — should include groups array with skill/agents"
