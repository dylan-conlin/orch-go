verification:
  automated:
    - name: "classifyTmuxWindows unit tests"
      command: "go test ./cmd/orch/ -run TestClassifyTmuxWindows -v"
      expectation: "8/8 tests pass"
      covers:
        - "Windows with active OpenCode sessions are not stale"
        - "Windows with open beads issues but no OpenCode session are protected"
        - "Windows with closed/missing beads issues and no OpenCode session are stale"
        - "Mixed scenarios (some protected, some stale)"
        - "Known non-agent windows (servers, zsh) are always skipped"
        - "Daemon-spawned Claude CLI agent scenario"

    - name: "Full cmd/orch test suite"
      command: "go test ./cmd/orch/ -v -count=1"
      expectation: "All tests pass, no regressions"

    - name: "Go vet"
      command: "go vet ./cmd/orch/"
      expectation: "No issues"

  smoke_test:
    - name: "Dry-run with active daemon-spawned agents"
      command: "go run ./cmd/orch/ clean --sessions --dry-run"
      expectation: "Shows 'Protected N windows with open beads issues' for windows with in_progress beads issues, does NOT show those windows in stale list"
      verified: true
      result: "Protected 5 windows with open beads issues (no OpenCode session). No stale tmux windows found."

  reproduction:
    original_bug: "orch clean --sessions kills active daemon-spawned Claude CLI tmux windows"
    steps:
      - "Daemon spawns agent via Claude CLI in tmux (window has [beads-id] in name)"
      - "Run orch clean --sessions --dry-run"
      - "Observe: window is NOT listed as stale (protected by beads check)"
    verified: true
    pre_fix_behavior: "All 5 tmux windows listed as stale (would be killed)"
    post_fix_behavior: "All 5 windows protected by open beads issues"
