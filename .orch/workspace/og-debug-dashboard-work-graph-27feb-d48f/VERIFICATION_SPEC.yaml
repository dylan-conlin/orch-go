verification:
  issue: orch-go-l1jp
  type: bug-fix

  reproduction:
    original: "Network tab shows attention?project_dir= requests taking 2-10+ seconds each. Graph requests similarly slow."
    verified_fixed: true
    verification_method: "curl timing against live endpoints after restart"

  outcomes:
    - name: "Attention endpoint returns in <100ms on cache hit"
      command: "curl -sk 'https://localhost:3348/api/attention?project=/Users/dylanconlin/Documents/personal/orch-go' -o /dev/null -w '%{time_total}s'"
      expected: "< 0.1 seconds"
      actual: "0.007s"
      status: pass

    - name: "Graph endpoint returns in <100ms on cache hit"
      command: "curl -sk 'https://localhost:3348/api/beads/graph?project_dir=/Users/dylanconlin/Documents/personal/orch-go' -o /dev/null -w '%{time_total}s'"
      expected: "< 0.1 seconds (after initial cold call)"
      actual: "0.007s"
      status: pass

    - name: "WIP store console warnings silenced"
      description: "wip.ts no longer emits console.warn for fetchQueued and setRunningAgents"
      verification: "grep for console.warn in wip.ts - only computeAgentHealth remains (not in hot path)"
      status: pass

    - name: "All tests pass"
      command: "go test ./cmd/orch/... ./pkg/attention/..."
      expected: "ok (no failures)"
      actual: "ok github.com/dylan-conlin/orch-go/cmd/orch 7.718s; ok pkg/attention (cached)"
      status: pass

    - name: "go vet clean"
      command: "go vet ./cmd/orch/"
      expected: "no output (clean)"
      actual: "no output"
      status: pass

  manual_steps:
    - "Open dashboard at https://localhost:5188/work-graph"
    - "Open browser Network tab"
    - "Observe attention and graph requests completing in <100ms"
    - "Verify no 'fetchQueued not implemented' or 'setRunningAgents not implemented' warnings in console"
