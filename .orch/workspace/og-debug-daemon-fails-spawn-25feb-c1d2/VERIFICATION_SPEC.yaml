issue: orch-go-1230
title: "fix: daemon cross-project spawn failure (beads.DefaultDir for --workdir)"
tier: 1
type: bug-fix

automated_checks:
  - name: "Build succeeds"
    command: "go build ./cmd/orch/"
    expected: "exit 0, no errors"
    result: PASS

  - name: "All cmd/orch tests pass"
    command: "go test ./cmd/orch/ -count=1 -timeout 60s"
    expected: "ok (all tests pass)"
    result: PASS

  - name: "All daemon tests pass"
    command: "go test ./pkg/daemon/ -count=1 -timeout 60s"
    expected: "ok (all tests pass)"
    result: PASS

  - name: "Go vet clean"
    command: "go vet ./cmd/orch/"
    expected: "no output (clean)"
    result: PASS

  - name: "Daemon preview shows cross-project issues"
    command: "go run ./cmd/orch/ daemon preview"
    expected: "Shows toolshed-*, specs-platform-*, bd-* issues in rejected list"
    result: PASS

manual_checks:
  - name: "Reproduction: bd show fails for cross-project issue"
    command: "bd show toolshed-164 --json"
    expected: "Error: no issue found (confirms bug exists when running from orch-go)"
    result: VERIFIED

  - name: "Fix validation: orch work --workdir resolves cross-project issue"
    description: >
      When daemon calls SpawnWork with workdir, orch work now sets beads.DefaultDir
      before calling verify.GetIssue(), which makes FindSocketPath use the target
      project's .beads/ database. Verified by confirming:
      1. FindSocketPath("") uses DefaultDir when set (code review: client.go:147)
      2. FallbackShow uses DefaultDir for cmd.Dir (code review: client.go:755)
      3. verify.GetIssue uses FindSocketPath("") which respects DefaultDir
    result: VERIFIED

root_cause: >
  runWork() in spawn_cmd.go called verify.GetIssue(beadsID) at line 396 BEFORE
  using the --workdir flag value. verify.GetIssue uses beads.FindSocketPath("")
  which defaults to os.Getwd() (orch-go directory). For cross-project issues like
  toolshed-164, the issue doesn't exist in orch-go's .beads/ database, causing
  "failed to get beads issue" error. The daemon's SpawnWork received this error and
  recorded a spawn failure. The issue was retried on every poll cycle (103 failures).

fix_description: >
  Set beads.DefaultDir from spawnWorkdir at the start of runWork(), before any
  beads lookups. This redirects FindSocketPath(""), FallbackShow, and all other
  beads calls to use the target project's .beads/ database. The DefaultDir is
  restored via defer when runWork() returns. Additionally, added ProjectRegistry
  initialization to daemon preview and dry-run commands for cross-project visibility.
