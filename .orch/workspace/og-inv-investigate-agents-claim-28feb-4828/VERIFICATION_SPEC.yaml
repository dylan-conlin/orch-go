verification_spec:
  type: investigation
  beads_id: orch-go-4czz

  evidence:
    - description: "All 3 agent manifests show tier=light + verify_level=V2"
      command: "cat .orch/workspace/archived/og-feat-*/AGENT_MANIFEST.json | jq '{tier, verify_level}'"
      expected: "tier: light, verify_level: V2 for all three"
      result: "CONFIRMED"

    - description: "SPAWN_CONTEXT told agents SYNTHESIS.md is NOT required"
      command: "grep -c SYNTHESIS .orch/workspace/archived/og-feat-*/SPAWN_CONTEXT.md"
      expected: "All mentions say NOT required"
      result: "CONFIRMED - 5-6 mentions per file, all negative"

    - description: "Agents reported legitimate Phase: Complete"
      command: "bd show orch-go-i9qr orch-go-vem4 orch-go-amty"
      expected: "Detailed Phase: Complete with work evidence"
      result: "CONFIRMED - all three have detailed completion summaries"

    - description: "No SYNTHESIS.md in any workspace"
      command: "ls .orch/workspace/archived/og-feat-*/SYNTHESIS.md"
      expected: "File not found"
      result: "CONFIRMED - no SYNTHESIS.md in any of the three workspaces"

    - description: "Verify code ignores tier for synthesis gate"
      command: "grep -A5 'V1 gate: Synthesis' pkg/verify/check.go"
      expected: "ShouldRunGate uses verifyLevel, no tier check"
      result: "CONFIRMED - line 551 uses ShouldRunGate(verifyLevel, GateSynthesis), no tier != light check"

    - description: "Feb 27 probe identified same issue"
      command: "cat .kb/models/completion-verification/probes/2026-02-27-probe-light-tier-v2-verification-conflict.md"
      expected: "Documents tier/V2 conflict"
      result: "CONFIRMED - Status: Complete, no fix applied"

  outcome:
    verdict: "Root cause confirmed: tier/verify_level disagreement"
    recommendation: "Architect should decide fix approach (add tier check to synthesis gate OR change feature-impl to TierFull)"
    probe_file: ".kb/models/completion-verification/probes/2026-02-28-probe-synthesis-gate-light-tier-empirical-failures.md"
