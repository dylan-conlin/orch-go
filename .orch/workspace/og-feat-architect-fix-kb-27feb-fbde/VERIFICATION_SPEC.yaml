verification:
  automated:
    - name: "ExtractKeywordsWithContext unit tests"
      command: "go test ./pkg/spawn/ -run TestExtractKeywordsWithContext -count=1 -v"
      expected: "PASS - 6 test cases covering frame enrichment, dedup, fallback, maxWords"
      result: "PASS"

    - name: "Existing ExtractKeywords tests unbroken"
      command: "go test ./pkg/spawn/ -run TestExtractKeywords -count=1"
      expected: "PASS - 10 existing test cases unchanged"
      result: "PASS"

    - name: "Full spawn package tests"
      command: "go test ./pkg/spawn/ -count=1"
      expected: "PASS"
      result: "PASS"

    - name: "Build verification"
      command: "go build ./cmd/orch/"
      expected: "Compiles cleanly"
      result: "PASS"

    - name: "Vet passes"
      command: "go vet ./cmd/orch/"
      expected: "No issues"
      result: "PASS"

    - name: "Full test suite"
      command: "go test ./... -count=1"
      expected: "All packages pass (known flaky: TestPerfInvariance_JoinLinearScaling)"
      result: "PASS (all packages ok)"

  manual:
    - name: "Cross-domain spawn produces richer query"
      description: |
        Spawn an architect agent with a cross-domain task (e.g., toolshed pricing work
        from orch-go). Verify that the kb context query includes domain terms from the
        orientation frame, not just generic title terms.
      status: "not-tested (requires live spawn with beads issue)"

  changes:
    - file: "pkg/spawn/kbcontext.go"
      description: |
        - Added ExtractKeywordsWithContext() function that combines title + orientation frame keywords
        - Raised MinMatchesForLocalSearch from 3 to 5

    - file: "pkg/spawn/kbcontext_test.go"
      description: "Added TestExtractKeywordsWithContext with 6 test cases"

    - file: "pkg/orch/extraction.go"
      description: |
        - Added orientationFrame parameter to GatherSpawnContext and runPreSpawnKBCheckFull
        - Uses ExtractKeywordsWithContext (5 keywords) when frame available, falls back to ExtractKeywords (3)

    - file: "cmd/orch/spawn_cmd.go"
      description: "Passes spawnOrientationFrame to GatherSpawnContext"

    - file: "cmd/orch/rework_cmd.go"
      description: "Extracts issue.Description as reworkOrientationFrame, passes to GatherSpawnContext"

  discovered_work:
    - issue: "orch-go-amty"
      description: "kb-cli: add minimum score threshold for stemmed matching (cross-repo)"
