verification:
  type: bug-fix
  issue: orch-go-1115

  build:
    command: "go build ./cmd/orch/"
    expected: "exit 0, no errors"
    result: PASS

  vet:
    command: "go vet ./cmd/orch/ && go vet ./pkg/beads/ && go vet ./pkg/daemon/"
    expected: "exit 0, no warnings"
    result: PASS

  tests:
    - command: "go test ./pkg/daemon/ -run ModelDrift -v"
      expected: "all ModelDrift tests pass"
      result: "PASS - 3/3 tests"
    - command: "go test ./pkg/daemon/ -v"
      expected: "all daemon tests pass"
      result: "PASS - all tests in 6.368s"
    - command: "go test ./pkg/beads/ -v"
      expected: "all beads tests pass"
      result: "PASS - all tests in 0.009s"

  root_cause:
    description: "createBeadsIssue called beads.FindSocketPath(\"\") which resolved to daemon process cwd instead of the model's project directory"
    location: "pkg/daemon/model_drift_reflection.go:345"

  fix:
    description: "Thread ProjectDir from model metadata through candidate/group/create-args to createBeadsIssue, which now uses FindSocketPath(dir) and FallbackCreateInDir for correct project targeting"
    files_changed:
      - pkg/daemon/model_drift_reflection.go
      - pkg/beads/client.go

  smoke_test:
    note: "Cannot smoke-test end-to-end without running daemon from wrong directory and triggering model drift reflection. Verified by code inspection that ProjectDir is correctly threaded from projectDirFromModelPath through all struct layers to FindSocketPath(dir)."
