# Verification Spec for orch-go-e3oi
# Architect skill 20% abandonment rate investigation

verification:
  type: bug-fix
  original_bug: "orch stats reports architect skill at 20% abandonment (12/63 spawns)"
  root_cause: "Duplicate agent.abandoned event emission + missing deduplication in stats"

  automated_checks:
    - name: "Abandonment deduplication test"
      command: "go test ./cmd/orch/ -run TestAggregateStatsAbandonmentDeduplication -v"
      expected: "PASS"

    - name: "Abandonment retry deduplication test"
      command: "go test ./cmd/orch/ -run TestAggregateStatsAbandonmentRetries -v"
      expected: "PASS"

    - name: "Full stats test suite"
      command: "go test ./cmd/orch/ -run Stats -v"
      expected: "All tests PASS"

    - name: "Events package tests"
      command: "go test ./pkg/events/ -v"
      expected: "All tests PASS"

    - name: "Build succeeds"
      command: "go build ./cmd/orch/"
      expected: "No errors"

    - name: "Vet passes"
      command: "go vet ./cmd/orch/"
      expected: "No errors"

  smoke_test:
    command: "orch stats 2>&1 | grep architect"
    before_fix: "architect  63  40  12  63.5%"
    after_fix: "architect  63  42   4  66.7%"
    verification: "Abandonment count dropped from 12 to 4 (deduplicated)"

  behavioral_verification:
    - "orch stats shows deduplicated abandonments (~27 total, not ~72)"
    - "Architect abandonment rate is 6.3% (not 19%)"
    - "New abandonments via orch abandon emit agent.abandoned.telemetry (not agent.abandoned) for telemetry"
    - "Historical duplicate events in events.jsonl are handled by stats-side dedup"
