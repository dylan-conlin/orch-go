verification:
  automated:
    - name: "OrientationFrame template rendering"
      command: "go test ./pkg/spawn/ -run TestGenerateContext_OrientationFrame -v"
      expected: "3/3 PASS"
      status: passed

    - name: "Full spawn package tests"
      command: "go test ./pkg/spawn/ -count=1"
      expected: "ok"
      status: passed

    - name: "Full cmd/orch tests"
      command: "go test ./cmd/orch/ -count=1"
      expected: "ok"
      status: passed

    - name: "Go vet clean"
      command: "go vet ./cmd/orch/ ./pkg/spawn/ ./pkg/orch/"
      expected: "no output (clean)"
      status: passed

    - name: "Build succeeds"
      command: "go build ./cmd/orch/"
      expected: "no errors"
      status: passed

  manual:
    - name: "Daemon spawn produces workspace with title-derived name"
      description: |
        Run `orch work <beads-id>` on an issue that has a long description.
        Verify the workspace name is derived from the issue title (not description).
        Verify SPAWN_CONTEXT.md has TASK: <title> and ORIENTATION_FRAME: <description>.
      status: not-tested
      reason: "Requires running orch daemon or orch work with a real beads issue"

  reproduction:
    original_bug: |
      Daemon-spawned agents get workspace names starting with 'orientation-frame...'
      because the FRAME beads comment (or issue description) is used as the TASK field.
    fix_verification: |
      Task field now uses issue title only. Issue description goes to separate
      ORIENTATION_FRAME: section. Workspace name slug derived from title words.
    status: verified-via-unit-tests
