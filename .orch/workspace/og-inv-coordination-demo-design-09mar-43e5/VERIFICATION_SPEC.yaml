verification:
  type: experiment
  commands_run:
    - command: "bash experiments/coordination-demo/run-complex.sh"
      expected: "Both agents complete within timeout, produce 4 files each"
      actual: "Haiku 65s 10/10, Opus 88s 10/10 — both complete, all files created"
    - command: "Manual merge test via git worktree + file copy + git merge"
      expected: "Merge conflicts in at least some files"
      actual: "CONFLICT in all 4 files: 2 content + 2 add/add"
    - command: "Code comparison of VisualWidth implementations"
      expected: "Some implementation differences"
      actual: "Opus uses rune counting (Unicode-correct), Haiku uses len() (byte count, incorrect for non-ASCII)"

  key_outcomes:
    - outcome: "Both models achieve 10/10 on automated compliance scoring"
      verified: true
      evidence: "scores.csv in results directory"
    - outcome: "Merge produces conflict in all 4 files (100% rate)"
      verified: true
      evidence: "Manual merge test output: 2 content conflicts + 2 add/add conflicts"
    - outcome: "Capability differences emerge in ambiguity resolution (Unicode, test rigor)"
      verified: true
      evidence: "Code comparison: Opus rune counting vs Haiku byte length; Opus position-based alignment test vs Haiku existence check"
    - outcome: "Coordination failure is structural, not capability-based"
      verified: true
      evidence: "100% conflict rate for both models across all file types"

  manual_steps_required:
    - "Review RESULTS.md for qualitative analysis of design divergence"
    - "Consider fixing runner bug (git diff HEAD misses untracked files) before N>1 trials"

  deliverables:
    - path: "experiments/coordination-demo/task-prompt-complex.md"
      description: "Complex/ambiguous task prompt"
    - path: "experiments/coordination-demo/run-complex.sh"
      description: "Runner script"
    - path: "experiments/coordination-demo/score-complex.sh"
      description: "10-dimension scorer"
    - path: "experiments/coordination-demo/merge-check-complex.sh"
      description: "Merge conflict analyzer"
    - path: "experiments/coordination-demo/results/complex-20260309-172325/RESULTS.md"
      description: "Results analysis"
    - path: ".kb/investigations/2026-03-09-inv-coordination-demo-complex-ambiguous.md"
      description: "Investigation file"
