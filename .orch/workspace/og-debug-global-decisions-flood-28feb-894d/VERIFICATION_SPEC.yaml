verification:
  type: behavioral
  automated: true

  preconditions:
    - "kb-cli binary rebuilt with fix (build/kb updated)"
    - "~/.kb/decisions/ contains 10+ global decision files"

  tests:
    - name: "Unit tests pass"
      command: "cd ~/Documents/personal/kb-cli && go test ./cmd/kb/ -run 'TestContext|TestGetGlobalStore|TestFilterArtifacts|TestMinGlobalScore|TestSortArtifacts'"
      expected: "22 tests PASS"
      actual: "22 tests PASS"

    - name: "Global noise filtered for common word query"
      command: "cd ~/Documents/personal/kb-cli && kb context 'fix' --format json | python3 -c 'import json,sys; d=json.load(sys.stdin); g=sum(1 for c in [\"kb_decisions\",\"investigations\",\"guides\",\"models\"] for i in (d.get(c) or []) if i.get(\"project\")==\"global\"); print(g)'"
      expected: "1-3 global results (was 15 before fix)"
      actual: "1 global result"

    - name: "Genuinely relevant global results still appear"
      command: "cd ~/Documents/personal/kb-cli && kb context 'premise before solution' --format json | python3 -c 'import json,sys; d=json.load(sys.stdin); print(len([i for i in (d.get(\"kb_decisions\") or []) if i.get(\"project\")==\"global\" and i.get(\"score\",0)>10]))'"
      expected: "1 (the Premise Before Solution decision with score > 10)"
      actual: "1"

    - name: "Multi-word query filtering effective"
      command: "cd ~/Documents/personal/kb-cli && kb context 'rate limiting api' --format json | python3 -c 'import json,sys; d=json.load(sys.stdin); g=sum(1 for c in [\"kb_decisions\",\"investigations\",\"guides\",\"models\"] for i in (d.get(c) or []) if i.get(\"project\")==\"global\"); print(g)'"
      expected: "1-2 global results (was 17 before fix)"
      actual: "1 global result"

  manual_verification: null
