verification:
  type: behavioral
  issue: orch-go-1255

  reproduction:
    description: "skillc deploy exits 0 on partial failure"
    steps:
      - "Create source tree with one valid and one invalid .skillc dir"
      - "Run: skillc deploy --target <dir> <source>"
      - "Observe exit code"
    expected_before: "Exit code 0 regardless of failures"
    expected_after: "Exit code 1 when any skill fails to compile/deploy"

  tests_run:
    - command: "./build/skillc deploy --target $TMPDIR/target $TMPDIR/src (1 bad + 1 good)"
      result: "Deployed 1/2, EXIT CODE: 1"
      status: pass
    - command: "./build/skillc deploy --target $TMPDIR/target $TMPDIR/src (2 good)"
      result: "Deployed 2/2, EXIT CODE: 0"
      status: pass
    - command: "./build/skillc deploy --target /tmp/test ~/orch-knowledge/skills/src (real 11 skills)"
      result: "Deployed 11/11, EXIT CODE: 0"
      status: pass
    - command: "./build/skillc deploy --target $TMPDIR/target --agent-dir $TMPDIR/agents $TMPDIR/src (mixed)"
      result: "Deployed 1/2 + 1/2 agents, EXIT CODE: 1"
      status: pass

  build:
    command: "go build -o build/skillc ./cmd/skillc/"
    result: "Clean build, no errors"

  files_changed:
    - path: "cmd/skillc/main.go"
      repo: "~/Documents/personal/skillc"
      description: "Added failCount/agentFailCount tracking and os.Exit(1) on failure"
