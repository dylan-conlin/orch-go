        Before fix: all 5 scanning functions read all 1438 entries.
        After fix: all scanning functions skip the 'archived' directory,
        processing only ~124 active workspace entries.
      evidence: "Code review of 5 modified functions + 1 existing (getActiveWorkspaces already had the skip)"

  files_changed:
