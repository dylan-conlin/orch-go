## Manual Testing Required

The following require manual verification in the running dashboard:
1. Start dashboard: `orch serve` and navigate to work-graph
2. Select "By Dependency Chain" from dropdown
3. Verify connected issues are grouped together under root issue title
4. Verify isolated issues appear in "Independent" section
5. Press 'G' (shift+g) to cycle through modes and verify dep-chain is in cycle
6. Verify within clusters, issues are sorted by dependency order

## Notes

- Algorithm uses BFS for connected component detection
- Clusters are named by root node title (node with no blockers in cluster, or alphabetically first)
- Single-node clusters are merged into "Independent" section
- Multi-node clusters are sorted by size (largest first)
- Within clusters, nodes are sorted by dependency count (leaves first), then priority, then ID
