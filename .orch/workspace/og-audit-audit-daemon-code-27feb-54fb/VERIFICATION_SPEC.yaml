verification:
  type: audit
  tier: full

  deliverables:
    - name: "Code health report with metrics"
      path: ".kb/investigations/2026-02-27-audit-daemon-code-health-complexity.md"
      verified: true
      evidence: "Investigation file contains line counts, function counts, responsibility inventory per file"

    - name: "Coupling map"
      path: ".kb/investigations/2026-02-27-audit-daemon-code-health-complexity.md#finding-5"
      verified: true
      evidence: "Finding 5 maps 7 internal dependencies and 10 consumers with purpose annotations"

    - name: "Ranked extraction opportunities"
      path: ".kb/investigations/2026-02-27-audit-daemon-code-health-complexity.md#ranked-extraction-opportunities"
      verified: true
      evidence: "5 extraction opportunities ranked by priority with effort/impact/risk ratings"

    - name: "Test coverage assessment"
      path: ".kb/investigations/2026-02-27-audit-daemon-code-health-complexity.md#finding-4"
      verified: true
      evidence: "go test ./pkg/daemon/ passes in 8s; 10,368 test lines across 29 files"

    - name: "Risk assessment for 1500-line threshold"
      path: ".kb/investigations/2026-02-27-audit-daemon-code-health-complexity.md#risk-assessment"
      verified: true
      evidence: "4-point risk analysis covering accretion boundary, cognitive load, merge conflicts, test fragility"

  tests_run:
    - command: "go test ./pkg/daemon/ -count=1 -short"
      result: "ok  github.com/dylan-conlin/orch-go/pkg/daemon  8.024s"
      passed: true

  manual_verification:
    - step: "Review investigation findings against actual code"
      status: "Completed during audit - all findings backed by file:line references"
    - step: "Verify extraction recommendations don't create circular dependencies"
      status: "Analyzed - no cycles detected in proposed extractions"

  scope:
    in_scope:
      - "cmd/orch/daemon.go"
      - "pkg/daemon/*"
      - "pkg/daemonconfig/*"
      - "Coupling analysis to adjacent packages"
    out_of_scope:
      - "Implementing any extractions"
      - "Non-daemon code (except as coupling targets)"
      - "Dashboard/UI code"
