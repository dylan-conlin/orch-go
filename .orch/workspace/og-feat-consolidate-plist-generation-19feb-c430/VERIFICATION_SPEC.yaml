verification:
  commands:
    - name: build
      command: go build ./cmd/orch/
      expect: exit 0
    - name: vet
      command: go vet ./cmd/orch/
      expect: exit 0
    - name: test_daemonconfig
      command: go test ./pkg/daemonconfig/
      expect: exit 0, 8 tests pass
    - name: test_cmd_orch_plist
      command: go test ./cmd/orch/ -run "TestParsePlist|TestConfigDrift"
      expect: exit 0, all pass

  assertions:
    - no_duplicated_symbols:
        grep: "PlistDataAPI|buildPlistDataForAPI|findOrchPathForAPI|plistTemplateAPI"
        path: cmd/orch/
        expect: no matches
    - consolidated_package_exists:
        file: pkg/daemonconfig/plist.go
        exports: [PlistData, PlistTemplate, GeneratePlistXML, GetPlistPath, FindOrchPath, BuildPATH, ParsePlistValues]
    - callers_use_package:
        grep: "daemonconfig\\."
        files: [cmd/orch/config_cmd.go, cmd/orch/serve_system.go, cmd/orch/doctor.go]
        expect: matches in all files
