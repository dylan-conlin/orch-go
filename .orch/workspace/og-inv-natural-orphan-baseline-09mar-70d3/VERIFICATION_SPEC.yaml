verification:
  type: investigation-probe
  issue: orch-go-80rg8

  commands_run:
    - description: "Count total investigations (all, active, archived)"
      command: "find .kb/investigations -name '*.md' | wc -l"
      expected: "1166 total"
      observed: "1166 total (276 active, 890 archived)"

    - description: "Measure era-adjusted orphan rates"
      command: "grep-based connection analysis across pre-model and model eras"
      expected: "Orphan rates differ by era"
      observed: "Pre-model: 94.7% (918/969), Model-era: 52.0% (102/196)"

    - description: "Sample and categorize 35 orphan investigations"
      command: "Read first 40 lines of 35 orphan files, classify into 6 categories"
      expected: "Multiple orphan types exist"
      observed: "6 categories identified; ~80% natural, ~20% genuinely lost"

    - description: "Track knowledge production evolution by month"
      command: "Count investigations, probes, models per month"
      expected: "Probe system changed production patterns"
      observed: "Investigations dropped 76% (548→129) when probes activated in Feb 2026"

    - description: "Analyze probe verdict distribution"
      command: "grep for confirms/contradicts/extends in probe files"
      expected: "Mixed verdicts"
      observed: "122 confirms, 165 extends, 57 contradicts across 189 probes"

  deliverables:
    - path: ".kb/models/knowledge-physics/probes/2026-03-09-probe-natural-orphan-baseline-categorization.md"
      description: "Probe with full orphan taxonomy, era-adjusted rates, and natural baseline"
      status: complete

    - path: ".kb/models/knowledge-physics/model.md"
      description: "Model updated with probe findings: invariant #4 refined, open question #1 answered, attractor invariant updated"
      status: complete

    - path: ".orch/workspace/og-inv-natural-orphan-baseline-09mar-70d3/SYNTHESIS.md"
      description: "Session synthesis"
      status: complete

  model_updates:
    - invariant: "#4 (orphan rate)"
      change: "Refined from '85.5% signals under-synthesis' to '6 categories, 40-50% natural baseline, 10% genuinely lost is actionable'"
    - invariant: "#3 (attention-primed attractors)"
      change: "Updated to reflect probe system as structural coupling mechanism (not just attention priming)"
    - invariant: "#2 (models as organization)"
      change: "Updated with era-adjusted data showing model/probe effectiveness"
    - open_question: "#1"
      change: "Marked ANSWERED with orphan taxonomy and natural baseline"
    - open_question: "#3"
      change: "Partially answered with probe displacement evidence"

  manual_verification:
    - "Review orphan taxonomy categories for completeness"
    - "Confirm 35-file sample is representative of the full corpus"
