verification:
  automated:
    - command: "go build ./cmd/orch/"
      expectation: "Compiles without errors"
    - command: "go vet ./cmd/orch/ ./pkg/spawn/gates/ ./pkg/daemon/ ./pkg/orch/"
      expectation: "No vet issues"
    - command: "go test ./pkg/spawn/gates/ -run TestCheckHotspot_AutoDetect"
      expectation: "All 5 auto-detection tests pass"
    - command: "go test ./pkg/spawn/gates/ -run TestCheckHotspot_ForceHotspotTakesPrecedenceOverAutoDetect"
      expectation: "Explicit --force-hotspot still works and takes precedence"
    - command: "go test ./pkg/daemon/ -run TestCheckArchitectEscalation_SkipsWhenPriorArchitectExists"
      expectation: "Daemon escalation skipped when prior architect found"
    - command: "go test ./pkg/daemon/ -run TestCheckArchitectEscalation_EscalatesWhenFinderReturnsEmpty"
      expectation: "Daemon still escalates when no prior architect found"
    - command: "go test ./pkg/orch/ -run TestExtractSearchTerms"
      expectation: "Search term extraction handles all patterns"
    - command: "go test ./pkg/spawn/gates/ ./pkg/daemon/ ./pkg/orch/ ./cmd/orch/"
      expectation: "All tests pass across all affected packages"
  behavioral:
    - scenario: "Spawn feature-impl targeting a CRITICAL hotspot file when a closed architect issue exists for that file"
      expectation: "Gate auto-detects the prior architect review and prints '✓ Auto-detected prior architect review: <id> — bypassing CRITICAL hotspot block'"
    - scenario: "Spawn feature-impl targeting a CRITICAL hotspot file when NO architect review exists"
      expectation: "Gate blocks with 'CRITICAL hotspot' error message and suggests --force-hotspot --architect-ref"
    - scenario: "Use --force-hotspot --architect-ref explicitly"
      expectation: "Explicit bypass still works as before"
    - scenario: "Daemon encounters hotspot area where architect already reviewed"
      expectation: "Daemon skips architect escalation and proceeds with original skill"
  reproduction:
    original_bug: "Hotspot gate blocks feature-impl on files >1500 lines, requiring architect review first. But when an architect HAS already reviewed (completed workspace exists, closed issue exists), the gate can't recognize it."
    verified: true
    verification_method: "TestCheckHotspot_AutoDetectPriorArchitect demonstrates the gate auto-bypasses when a finder returns a valid closed architect issue. TestCheckHotspot_AutoDetectNoMatchStillBlocks confirms the gate still blocks when no prior architect exists."
