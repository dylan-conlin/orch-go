verification:
  automated:
    - name: "Frontend build succeeds"
      command: "cd web && npx vite build"
      expected: "built in"

    - name: "Go build succeeds"
      command: "go build ./cmd/orch/"
      expected: "no errors"

  manual:
    - name: "Ready to Complete appears within 30s of Phase: Complete"
      steps:
        - "Open http://localhost:5188/work-graph"
        - "Have an agent report Phase: Complete via bd comment"
        - "Wait up to 30 seconds (one polling cycle)"
        - "Verify the Ready to Complete section appears without manual page refresh"
      expected: "Section appears within ~30 seconds"

    - name: "Ready to Complete includes agents with 'completed' status"
      steps:
        - "Agent reports Phase: Complete while session is still alive"
        - "Backend returns agent with status='completed' and phase='Complete'"
        - "Verify agent appears in Ready to Complete section"
      expected: "Agent shown in Ready to Complete even with 'completed' status"

    - name: "Closed issues not shown in Ready to Complete"
      steps:
        - "Run orch complete on an agent (closes beads issue)"
        - "Verify the agent disappears from Ready to Complete"
      expected: "Agent removed after issue closure"
