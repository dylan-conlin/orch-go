verification:
  automated:
    - command: "go test ./pkg/spawn/ -run TestExtractCodeRefs -v -count=1"
      expect: "PASS"
      description: "code_refs extraction respects close marker, excludes cross-project refs"
    - command: "go test ./pkg/spawn/ -count=1"
      expect: "PASS"
      description: "Full spawn package tests pass"
    - command: "go build ./cmd/orch/"
      expect: "exit 0"
      description: "Binary builds cleanly"
    - command: "go vet ./pkg/spawn/"
      expect: "exit 0"
      description: "No vet issues"
    - command: "kb context 'drift taxonomy' 2>&1 | grep -c 'Drift Taxonomy'"
      expect: "1"
      description: "drift-taxonomy model is discoverable by kb context"
  manual:
    - description: "Verify drift-taxonomy model code_refs all exist on disk"
      result: "All 5 code_refs files verified present"
    - description: "Verify model sections (Summary, Critical Invariants, Why This Fails) match extraction patterns"
      result: "All three headings use HasPrefix matching correctly"

changes:
  - file: pkg/spawn/kbcontext.go
    description: "extractCodeRefs now stops at <!-- /code_refs --> end marker"
  - file: pkg/spawn/kbcontext_test.go
    description: "Added test case for cross-project refs exclusion after close marker"

summary: |
  The drift-taxonomy model was already discoverable by kb context (filesystem-based discovery).
  Fixed extractCodeRefs to respect the <!-- /code_refs --> end marker, preventing cross-project
  file references (kb-cli/*) from being treated as local code_refs and triggering false staleness
  warnings about "deleted files."
