    - claim: "Daemon loop calls Once() sequentially, not concurrently"
      evidence: "daemon_loop.go:355 - sequential for loop calling d.OnceExcluding()"
      verified: true

    - claim: "PID lock prevents multiple daemon instances"
      evidence: "daemon_loop.go:63 - daemon.AcquirePIDLock() called before loop starts"
      verified: true

    - claim: "Manual spawn path has TOCTOU in SetupBeadsTracking"
      evidence: "Code analysis of spawn_beads.go:38-61 - GetIssue then UpdateIssueStatus not atomic"
      verified: true

