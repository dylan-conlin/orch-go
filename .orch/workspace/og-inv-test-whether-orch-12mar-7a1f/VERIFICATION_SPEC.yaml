      evidence: "TestSequentialOnce_PreventsDuplicate + TestSpawnIssue_SequentialBlocksSecondCall both pass"
      verified: true

    - claim: "SpawnTrackerGate has TOCTOU between Check and MarkSpawnedWithTitle"
      evidence: "TestSpawnTrackerGate_TOCTOU_Window: 2/100 goroutines passed before first mark"
      verified: true

    - claim: "FreshStatusGate (beads status) serializes concurrent access when status reflects state changes"
      evidence: "TestConcurrentSpawnIssue_FreshStatusSerializes: 1/10 goroutines succeeded"
      verified: true

    - claim: "session_dedup.go had data race in initDefaultSessionDedupChecker"
      evidence: "go test -race detected DATA RACE; fixed with sync.Once; tests pass cleanly after fix"
