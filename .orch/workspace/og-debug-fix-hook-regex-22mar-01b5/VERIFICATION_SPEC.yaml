verification:
  type: automated
  command: "SKIP_GIT_ADD_ALL_GATE=1 python3 .orch/workspace/og-debug-fix-hook-regex-22mar-01b5/test_hook_fix.py"
  expected_output: "Results: 10 passed, 0 failed"

  tests:
    - name: "block real git add -A"
      input: "git add -A"
      expected: blocked
      result: PASS

    - name: "block real git add ."
      input: "git add ."
      expected: blocked
      result: PASS

    - name: "block real git add --all"
      input: "git add --all"
      expected: blocked
      result: PASS

    - name: "block git add -A after quotes"
      input: 'echo "hello" && git add -A'
      expected: blocked
      result: PASS

    - name: "allow double-quoted git add -A"
      input: 'bd create "do not use git add -A"'
      expected: allowed
      result: PASS

    - name: "allow double-quoted git add ."
      input: 'bd comments add x "git add . is blocked"'
      expected: allowed
      result: PASS

    - name: "allow double-quoted git add --all"
      input: 'echo "git add --all is bad"'
      expected: allowed
      result: PASS

    - name: "allow single-quoted git add -A"
      input: "bd create 'do not use git add -A'"
      expected: allowed
      result: PASS

    - name: "allow explicit file staging"
      input: "git add src/file.go"
      expected: allowed
      result: PASS

    - name: "allow heredoc content"
      input: "git commit with heredoc containing git add -A"
      expected: allowed
      result: PASS

  reproduction:
    original_bug: "bd create 'description mentioning git add -A' triggers false-positive deny"
    verified_fixed: true
    note: "Project-level hook fixed. Global worker hook requires orchestrator to apply same fix."

  incomplete:
    - file: "~/.orch/hooks/gate-worker-git-add-all.py"
      reason: "Governance file protection hook blocked worker edit"
      action: "Orchestrator must apply identical fix directly"
