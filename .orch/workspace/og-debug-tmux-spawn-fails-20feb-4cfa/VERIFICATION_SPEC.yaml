verification:
  type: bug-fix
  issue: orch-go-1040

  build:
    command: "go build ./cmd/orch/"
    result: PASS

  vet:
    command: "go vet ./cmd/orch/"
    result: PASS

  tests:
    command: "go test ./pkg/tmux/... -count=1"
    result: "ok github.com/dylan-conlin/orch-go/pkg/tmux 0.504s"
    count: 31
    failures: 0

  regression_check:
    description: "No bare exec.Command(\"tmux\") calls remain in codebase"
    command: "grep -r 'exec.Command(\"tmux\"' --include='*.go' ."
    expected: "No matches"
    result: "No matches found"

  smoke_test:
    description: >
      Cannot reproduce the exact bug scenario (requires running inside overmind tmux),
      but verified: (1) detectMainSocket() correctly identifies overmind environment
      and resolves to /private/tmp/tmux-501/default, (2) all 18 converted functions
      now route through tmuxCommand() which prepends -S flag when in overmind,
      (3) TestDetectMainSocket confirms correct behavior for all three cases
      (not in tmux, regular tmux, overmind tmux).

  manual_verification_needed:
    - "Run 'orch spawn --bypass-triage --tmux investigation test' from inside overmind tmux session"
    - "Verify window is created successfully in workers-orch-go session"
