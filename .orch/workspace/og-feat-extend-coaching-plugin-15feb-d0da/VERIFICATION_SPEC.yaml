observable_behaviors:
  - behavior: "Workers editing files >800 lines receive accretion warnings in real-time"
    acceptance_criteria:
      - criterion: "AC-001: First edit to file >800 lines triggers soft warning"
        test_procedure: |
          1. Spawn a worker session via `orch spawn feature-impl "test task" --backend claude`
          2. Have worker edit a file >800 lines (e.g., plugins/coaching.ts)
          3. Verify coaching message appears with "📏 File Size Warning" header
        expected_output: "Warning message injected into worker session context via noReply:true"
      
      - criterion: "AC-002: Third edit to same large file triggers strong warning"
        test_procedure: |
          1. Continue worker session from AC-001
          2. Have worker edit the same large file 2 more times
          3. Verify coaching message appears with "🚨 Accretion Alert" header
        expected_output: "Strong warning message with extraction directive and link to code-extraction-patterns.md"
      
      - criterion: "AC-003: Metrics written to coaching-metrics.jsonl"
        test_procedure: |
          1. After worker edits large file
          2. Run: cat ~/.orch/coaching-metrics.jsonl | grep accretion_warning | tail -1 | jq .
        expected_output: "JSON metric with metric_type='accretion_warning', value=<line_count>, details.severity='warning' or 'critical'"
  
  - behavior: "Orchestrators do NOT receive accretion warnings (only frame collapse warnings)"
    acceptance_criteria:
      - criterion: "AC-004: Orchestrator edits to large files do not trigger accretion warnings"
        test_procedure: |
          1. In orchestrator session (not worker)
          2. Edit a file >800 lines directly
          3. Verify NO accretion warning appears
          4. Verify frame_collapse warning DOES appear instead
        expected_output: "Frame collapse warning only, no accretion warning (accretion is worker-only)"

  - behavior: "Thresholds match completion gate (800 warning, 1500 critical)"
    acceptance_criteria:
      - criterion: "AC-005: 800-line threshold triggers warning severity"
        test_procedure: |
          1. Worker edits file with exactly 850 lines
          2. Check metric details.severity field
        expected_output: "severity='warning', threshold=800"
      
      - criterion: "AC-006: 1500-line threshold triggers critical severity"
        test_procedure: |
          1. Worker edits file with >1500 lines
          2. Check metric details.severity field
        expected_output: "severity='critical', threshold=1500"

failure_modes:
  - symptom: "Accretion warnings appear for orchestrators"
    root_cause: "Worker detection not working - isWorker check failing"
    fix: "Verify session.metadata.role is set correctly by OpenCode when ORCH_WORKER=1 env var is present"
  
  - symptom: "Accretion warnings never appear"
    root_cause: "getFileLineCount returns null (file path resolution issue)"
    fix: "Check that file_path/filePath args are absolute paths, not relative"
  
  - symptom: "Plugin crashes on startup"
    root_cause: "TypeScript compilation error or missing imports"
    fix: "Check OpenCode logs for plugin load errors, verify @opencode-ai/plugin peer dependency"

evidence_requirements:
  manual_steps:
    - step: "Restart OpenCode server to load updated plugin"
      command: "pkill -f opencode-serve && orch servers start orch-go"
    
    - step: "Spawn worker session that will edit large file"
      command: "orch spawn feature-impl 'test accretion detection' --backend claude"
    
    - step: "In worker session, edit coaching.ts (1743 lines)"
      expected: "Coaching message injected: '📏 File Size Warning'"
    
    - step: "Check metrics file"
      command: "cat ~/.orch/coaching-metrics.jsonl | grep accretion_warning | tail -1 | jq ."
      expected: "JSON with metric_type='accretion_warning', value=1743, severity='critical'"
  
  automated_verification:
    - check: "TypeScript compilation (no new errors)"
      command: "cd plugins && npx tsc --noEmit coaching.ts 2>&1 | grep -v node_modules | wc -l"
      expected: "4 errors (all pre-existing: module import, RegExp flag, 2x iterator)"
    
    - check: "File line count (implementation size)"
      command: "wc -l plugins/coaching.ts"
      expected: "~1740 lines (added ~170 lines for accretion detection)"
    
    - check: "Accretion constants defined"
      command: "grep AccretionWarningThreshold plugins/coaching.ts"
      expected: "const AccretionWarningThreshold = 800"

implementation_notes:
  - "Accretion detection only runs for worker sessions (isWorker=true)"
  - "Uses session.metadata.role='worker' detection (set by OpenCode from x-opencode-env-ORCH_WORKER header)"
  - "Per-file edit tracking via Map<string, number> in AccretionState"
  - "Tiered warnings: 1st edit triggers soft warning, 3+ edits trigger strong warning"
  - "Thresholds (800/1500) match pkg/verify/accretion.go completion gate"
  - "Metrics written to ~/.orch/coaching-metrics.jsonl for dashboard integration"
  - "Implementation follows existing frame_collapse pattern for consistency"

architecture_decisions:
  - decision: "Use getFileLineCount() instead of shell-out to wc -l"
    rationale: "fs.readFileSync is faster and more reliable than exec for TypeScript plugins"
  
  - decision: "Separate session state for workers vs orchestrators"
    rationale: "Workers need different tracking (per-file edit counts) than orchestrators (total code edits)"
  
  - decision: "Per-file warning flags (not global)"
    rationale: "Agent might legitimately edit multiple large files; each file gets its own warning escalation"

test_status:
  unit_tests: "N/A - TypeScript plugin requires OpenCode framework mocking (out of scope for light tier)"
  integration_tests: "Manual verification required - spawn worker, edit large file, verify warning injection"
  smoke_tests: "Plugin loads without errors (verified via TypeScript compilation check)"
