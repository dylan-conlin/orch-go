verification:
  type: task
  gate1_explain: "Integration verification for effective priority + topological ordering with real orch-go beads data."
  gate2_behavioral: false

  commands_run:
    - command: "bd create \"TEMP effective priority test P1\" --type task --priority 1 --labels \"temp,area:dashboard\" --silent"
      expected: "Create a temporary P1 issue for effective priority verification."
      observed: "Created orch-go-1075."
    - command: "bd create \"TEMP effective priority test P2 blocker\" --type task --priority 2 --labels \"temp,area:dashboard\" --silent"
      expected: "Create a temporary P2 blocker issue."
      observed: "Created orch-go-1076."
    - command: "bd dep add orch-go-1075 orch-go-1076 --type blocks"
      expected: "Make P2 issue block the P1 issue."
      observed: "Dependency added: orch-go-1075 depends on orch-go-1076 (blocks)."
    - command: "curl -sk \"https://localhost:3348/api/beads/graph?scope=all\" -o /tmp/beads-graph-all.json"
      expected: "Fetch graph JSON with nodes (priority, effective_priority, layer) and edges."
      observed: "Graph JSON saved to /tmp/beads-graph-all.json."
    - command: "jq -r '.nodes[] | select(.id==\"orch-go-1075\" or .id==\"orch-go-1076\") | \"\\(.id) priority=P\\(.priority) eff=P\\(.effective_priority) layer=\\(.layer)\"' /tmp/beads-graph-all.json"
      expected: "P2 blocker inherits effective priority P1 from the blocked P1 issue."
      observed: "orch-go-1075 priority=P1 eff=P1 layer=1; orch-go-1076 priority=P2 eff=P1 layer=0."
    - command: "jq -r '.edges[] | select(.from==\"orch-go-1075\" or .to==\"orch-go-1075\" or .from==\"orch-go-1076\" or .to==\"orch-go-1076\")' /tmp/beads-graph-all.json"
      expected: "Graph includes a blocks edge connecting the temp issues."
      observed: "{\"from\":\"orch-go-1075\",\"to\":\"orch-go-1076\",\"type\":\"blocks\"}"
    - command: "bd comments add orch-go-1075 \"Phase: Complete - Temporary test issue for effective priority verification\" && bd comments add orch-go-1076 \"Phase: Complete - Temporary test issue for effective priority verification\""
      expected: "Allow temp issues to be closed cleanly."
      observed: "Phase comments added for orch-go-1075 and orch-go-1076."
    - command: "bd close orch-go-1075 orch-go-1076"
      expected: "Close temporary test issues after verification."
      observed: "Both issues closed successfully."

  manual_verification:
    - "Skipped per instruction: UI verification not required for this task."

  deliverables:
    - path: ".orch/workspace/og-feat-integration-test-effective-18feb-2778/VERIFICATION_SPEC.yaml"
      description: "Verification plan and evidence for effective priority + topological ordering integration."
      exists: true
