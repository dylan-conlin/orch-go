version: "1.0"
issue: orch-go-1147
title: Model-aware backend routing in spawn command

behaviors:
  - name: "Anthropic models auto-route to claude backend"
    test_command: "go test ./pkg/spawn/ -run 'BugClass15.*explicit_anthropic_model' -v"
    expected: "PASS - opus/sonnet/haiku all route to claude backend via model-provider-routing"
    status: verified

  - name: "Non-Anthropic models auto-route to opencode backend"
    test_command: "go test ./pkg/spawn/ -run 'BugClass15.*explicit_(openai|codex|deepseek)' -v"
    expected: "PASS - gpt-4o/codex/deepseek all route to opencode backend via model-provider-routing"
    status: verified

  - name: "CLI --backend remains as override"
    test_command: "go test ./pkg/spawn/ -run 'BugClass15.*explicit_CLI_backend' -v"
    expected: "PASS - --backend flag overrides model-aware routing"
    status: verified

  - name: "User config backend auto-routes based on model"
    test_command: "go test ./pkg/spawn/ -run 'BugClass15.*user_config' -v"
    expected: "PASS - user config opencode backend auto-routes to claude for anthropic model; user config codex model auto-routes to opencode"
    status: verified

  - name: "Daemon path: headless + claude backend resolves to tmux"
    test_command: "go test ./pkg/spawn/ -run 'BugClass15.*daemon_path' -v"
    expected: "PASS - headless spawn mode overridden to tmux when backend is claude"
    status: verified

  - name: "Project config backend yields to model-aware routing"
    test_command: "go test ./pkg/spawn/ -run 'BugClass15.*project_config_claude' -v"
    expected: "PASS - project config claude backend auto-routes to opencode for openai model"
    status: verified

  - name: "No regressions in existing BugClass tests"
    test_command: "go test ./pkg/spawn/ -run TestResolve -count=1"
    expected: "PASS - all 30 tests pass"
    status: verified

  - name: "Build and vet clean"
    test_command: "go build ./cmd/orch/ && go vet ./cmd/orch/"
    expected: "No errors"
    status: verified

manual_verification:
  - step: "orch spawn --model opus (without --backend) auto-routes to claude backend"
    description: "Verify console output shows 'Backend: claude (source: derived)'"
  - step: "orch spawn --model codex (without --backend) auto-routes to opencode backend"
    description: "Verify console output shows 'Backend: opencode (source: derived)'"
  - step: "orch daemon once spawns via claude backend"
    description: "Create a triage:ready issue, run orch daemon once, verify agent spawns in tmux (not headless failure)"
