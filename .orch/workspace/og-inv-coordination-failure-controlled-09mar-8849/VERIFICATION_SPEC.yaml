deliverables:
  - path: .kb/guides/kb-getting-started.md
    description: "Getting started tutorial for solo technical researcher running the investigation/probe/model cycle"
    verification:
      - "File exists and is well-structured markdown"
      - "Covers: problem statement, prerequisites, step-by-step cycle walkthrough, AI agent integration, health metrics"
      - "References actual kb CLI commands (kb init, kb create investigation, kb context, kb reflect)"
      - "Includes concrete examples with realistic content (auth system domain)"
      - "Covers all three artifact types: investigation, model, probe"
      - "Documents the probe-to-model merge step as required"
      - "Quick reference table at end for fast lookup"

manual_verification:
  - "Review tutorial flow for clarity from a new user's perspective"
  - "Verify kb CLI commands match current kb-cli implementation"

notes: |
  Tutorial is standalone — does not require orch, beads, or daemon.
  Focuses on the minimal substrate: kb CLI + Claude Code + Git + .kb/ directory.
  Draws from knowledge-physics model findings and first-external-user-profile probe.
  Does not create new model or probe files (content task, not investigation).
