verification:
  automated:
    - name: "Build succeeds"
      command: "go build ./cmd/orch/"
      expected: "exit 0, no errors"
      result: "PASS"

    - name: "Vet passes"
      command: "go vet ./cmd/orch/ ./pkg/daemon/"
      expected: "exit 0, no warnings"
      result: "PASS"

    - name: "Regression test passes"
      command: "go test ./pkg/daemon/ -run TestDaemon_Preview_NilListIssuesFunc -v"
      expected: "PASS - no panic when listIssuesFunc is nil"
      result: "PASS (error returned from bd CLI, but no panic)"

    - name: "All preview tests pass"
      command: "go test ./pkg/daemon/ -run 'TestDaemon_Preview|TestPreview' -v"
      expected: "13/13 tests pass"
      result: "PASS - 13 passed, 0 failed (0.193s)"

  smoke_test:
    - name: "orch daemon preview runs without crash"
      command: "go run ./cmd/orch/ daemon preview"
      expected: "Output listing spawnable/rejected issues, no panic"
      result: "PASS - listed orch-go-1218 as spawnable, 43 rejected issues shown"

  manual: []
