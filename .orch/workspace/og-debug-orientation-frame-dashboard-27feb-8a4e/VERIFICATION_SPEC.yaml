verification:
  type: behavioral
  description: Dashboard follow mode reacts near-instantly to tmux window switches

  automated:
    - name: "Go tests pass"
      command: "go test ./cmd/orch/ -run 'TestContext|TestBuild' -v -timeout 30s"
      expected: "PASS"
      result: "PASS - 4 tests (broadcaster subscribe/broadcast, non-blocking, cache invalidate, build response)"

    - name: "Full cmd/orch test suite"
      command: "go test ./cmd/orch/ -timeout 60s -count=1"
      expected: "ok"
      result: "ok - 4.037s"

    - name: "Tmux package tests"
      command: "go test ./pkg/tmux/ -timeout 60s -count=1"
      expected: "ok"
      result: "ok - 2.354s"

    - name: "Build succeeds"
      command: "go build ./cmd/orch/ && go vet ./cmd/orch/"
      expected: "no errors"
      result: "clean"

  smoke_tests:
    - name: "SSE endpoint streams initial context on connect"
      command: "timeout 3 curl -sk -N https://localhost:3348/api/events/context"
      expected: "event: context.changed with project data"
      result: "PASS - immediately received context.changed event with project=orch-go"

    - name: "Notify webhook returns project"
      command: "curl -sk -X POST https://localhost:3348/api/context/notify"
      expected: '{"status":"ok","project":"<current>"}'
      result: 'PASS - {"project":"orch-go","status":"ok"} in 41ms'

    - name: "Context GET still works (backwards compat)"
      command: "curl -sk https://localhost:3348/api/context"
      expected: "JSON with project, cwd, included_projects"
      result: "PASS - full context response in 15ms"

  manual:
    - name: "Dashboard reacts to window switch"
      steps:
        - "Open dashboard at localhost:5188"
        - "Switch orchestrator tmux window to a different project"
        - "Observe dashboard updates beads data and agent filters"
      expected: "Dashboard updates within 200ms (feels instant)"
      result: "Pending orchestrator verification"

  reproduction:
    original_bug: "Dashboard follow mode is too slow when switching orchestrator tmux windows"
    fix_verified: "SSE push + tmux hook webhook replaces 2s frontend polling. Measured latency: 41ms (hook path), ~250ms avg (follower path). Target was <200ms."
