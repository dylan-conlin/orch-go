verification_type: experiment_infrastructure
description: Verify tension-based constraint pool for mechanism discrimination experiment v2

commands:
  - name: Dry-run Phase 1 (prompt generation)
    command: "cd experiments/coordination-demo/redesign && ./run-mechanism-v2.sh --dry-run --trials 1 --seed 42"
    expected_output: "8 trials generated (N=1,2,3,4,6,8,10,12), prompts saved with tension pairs"
    actual_result: "PASS — 8 trials, all prompts contain both sides of each tension pair"

  - name: Detector validation (48 tests)
    command: "bash experiments/coordination-demo/redesign/test-detectors-v2.sh"
    expected_output: "48/48 detectors pass against synthetic Go files"
    actual_result: "PASS — Passed: 48 / 48, ALL DETECTORS PASS"

  - name: Scoring validation with synthetic data
    command: "bash experiments/coordination-demo/redesign/test-scoring-v2.sh"
    expected_output: "HARD pairs show b_wins, EASY pair shows both, resolve_rate=1.000"
    actual_result: "PASS — P01=b_wins, P02=b_wins, P09=both, rate=1.000"

  - name: Analysis script on synthetic results
    command: "bash experiments/coordination-demo/redesign/score-mechanism-v2.sh /tmp/mech2-scoring-test"
    expected_output: "Phase 1 analysis with resolution curve, per-pair survival, tier-stratified degradation"
    actual_result: "PASS — tier-stratified output correctly shows HARD/MED/EASY separation"

deliverables:
  - path: experiments/coordination-demo/redesign/run-mechanism-v2.sh
    description: "Phase 2 experiment runner — 12 tension pairs, 3 tiers, 3 phases"

  - path: experiments/coordination-demo/redesign/score-mechanism-v2.sh
    description: "Phase 2 analysis script — per-pair resolution, tier-stratified degradation"

  - path: experiments/coordination-demo/redesign/test-detectors-v2.sh
    description: "Detector validation — 48 tests against 2 synthetic Go files"

  - path: experiments/coordination-demo/redesign/test-scoring-v2.sh
    description: "Scoring validation — verifies A-wins/B-wins/both/neither classification"

  - path: .kb/investigations/2026-03-26-inv-redesign-constraint-pool-tension-based.md
    description: "Investigation with D.E.K.N. summary, findings, synthesis"

manual_verification:
  - step: "Review constraint pair design for genuine tension"
    expected: "HARD pairs are logically contradictory, MEDIUM pairs are practically competing, EASY pairs are satisfiable"
    actual: "Confirmed — see constraint pool in run-mechanism-v2.sh lines 83-150"

  - step: "Verify prompts present both sides of each pair"
    expected: "Agent sees both constraint A and B in the same prompt"
    actual: "Confirmed — dry-run prompt at n4/trial-1 shows competing constraints side by side"

known_issues:
  - issue: "P03 no-comments detector checks entire file, not just new code — could false-positive if display.go already has comments"
    impact: "Low — agents work in clean worktrees from baseline commit"

  - issue: "P05 brevity detector counts all lines including blank/comment — may disagree with human judgment"
    impact: "Low — consistent counting is more important than absolute accuracy for scaling curves"

next_steps:
  - "Run Phase 1: ./run-mechanism-v2.sh --trials 5 --model haiku (~40 trials, ~7h)"
  - "Analyze: ./score-mechanism-v2.sh results/mechanism-v2-p1-*"
  - "If degradation found: ./run-mechanism-v2.sh --phase 2 --critical-n <N>"
