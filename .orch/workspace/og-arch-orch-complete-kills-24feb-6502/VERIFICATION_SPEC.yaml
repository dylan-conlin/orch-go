files_changed:
  - path: cmd/orch/complete_cleanup.go
    change: "KillWindow(window.Target) → KillWindowByID(window.ID)"
  - path: cmd/orch/clean_cmd.go
    change: "KillWindow(pw.window.Target) → KillWindowByID(pw.window.ID)"
  - path: cmd/orch/abandon_cmd.go
    change: "KillWindow(windowInfo.Target) → KillWindowByID(windowInfo.ID)"
  - path: cmd/orch/review.go
    change: "KillWindow(window.Target) → KillWindowByID(window.ID)"

manual_verification:
  - "With renumber-windows enabled in tmux, spawn 3+ agents, complete the middle one, then complete another — verify correct window is killed"

reproduction_status: "Bug is structural (code analysis). TOCTOU race window is small but real. Fix eliminates the race entirely by using stable IDs."
