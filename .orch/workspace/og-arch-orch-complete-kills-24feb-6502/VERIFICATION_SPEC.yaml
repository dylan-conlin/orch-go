    result: PASS

  - id: AC2
    behavior: OB1
    condition: "go build ./cmd/orch/ succeeds"
    result: PASS

  - id: AC3
    behavior: OB1
    condition: "go vet ./cmd/orch/ succeeds"
    result: PASS

  - id: AC4
    behavior: OB1
    condition: "go test ./cmd/orch/ passes all tests"
    result: PASS

  - id: AC5
    behavior: OB1
    condition: "go test ./pkg/tmux/ passes all tests"
