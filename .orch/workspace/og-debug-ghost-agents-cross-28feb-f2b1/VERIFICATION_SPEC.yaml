verification:
  type: bug-fix
  issue: orch-go-xptz

  reproduction:
    description: "Ghost agents from other projects appear in orch status --all"
    steps:
      - "orch status --all"
    expected_before: "Shows 5 cross-project agents (ok-wn64, scs-sp-45z, toolshed-3fn, toolshed-blx, toolshed-anr)"
    expected_after: "Only shows local orch-go agents"
    verified: true

  automated:
    - command: "go test ./cmd/orch/ -count=1 -timeout 60s"
      expected: "ok"
      result: "ok  github.com/dylan-conlin/orch-go/cmd/orch  3.059s"

    - command: "go test ./pkg/beads/... -count=1"
      expected: "ok"
      result: "ok  github.com/dylan-conlin/orch-go/pkg/beads  0.015s"

    - command: "go vet ./cmd/orch/"
      expected: "no errors"
      result: "clean"

  smoke_tests:
    - description: "orch abandon auto-resolves cross-project issue"
      command: "orch abandon toolshed-3fn"
      expected: "Auto-resolved cross-project issue"
      result: "Auto-resolved, removed label, killed window, deleted session"

    - description: "orch clean --ghosts finds stale labels"
      command: "orch clean --ghosts --dry-run"
      expected: "Lists ghost agents with project names"
      result: "Found 5 ghosts across 3 projects"

    - description: "orch clean --ghosts removes stale labels"
      command: "orch clean --ghosts"
      expected: "Removes orch:agent labels"
      result: "Cleaned 4 remaining ghosts"

    - description: "orch status --all no longer shows ghosts"
      command: "orch status --all | grep -E 'ok-wn64|scs-sp-45z|toolshed'"
      expected: "No matches"
      result: "No ghost agents found"

  manual:
    - description: "Verify --all flag includes --ghosts"
      status: "verified via TestCleanAllFlagIncludesOrphans test"
