verification:
  automated:
    - name: "Build passes"
      command: "go build ./cmd/orch/"
      expect: "exit code 0"
      verified: true

    - name: "Vet passes (cmd/orch)"
      command: "go vet ./cmd/orch/"
      expect: "exit code 0"
      verified: true

    - name: "Vet passes (pkg/opencode)"
      command: "go vet ./pkg/opencode/"
      expect: "exit code 0"
      verified: true

    - name: "WaitForSessionIdle unit tests"
      command: "go test ./pkg/opencode/ -run TestWaitForSession -v -timeout 30s"
      expect: "3 tests PASS"
      verified: true

    - name: "Full opencode package tests"
      command: "go test ./pkg/opencode/ -v -timeout 60s"
      expect: "all tests PASS"
      verified: true

  manual:
    - name: "End-to-end inline spawn with --workdir"
      description: "Run orch spawn --inline --workdir /other/project investigation 'test' and verify session directory matches target"
      verified: false
      reason: "Requires running OpenCode server and target project"

  smoke_test:
    description: "Cannot smoke-test inline spawn without running OpenCode server"
    performed: false
    reason: "Inline spawn requires OpenCode server at localhost:4096. Unit tests verify the WaitForSessionIdle SSE watching logic. The HTTP API path (CreateSession + SendMessageInDirectory) was already verified by the headless fix."
