verification:
  type: bug-fix
  issue: orch-go-bx3p

  reproduction:
    description: "Review queue panel shows 0 (or wrong count) while header shows N completions to review"
    steps:
      - "Open dashboard at http://localhost:5188"
      - "Check header badge shows N to review (from daemon verification counter)"
      - "Check review queue panel count matches header count"
    verified_after_fix: true
    notes: "Both now read from verify.ListUnverifiedWork() — the canonical checkpoint-based source"

  tests:
    unit:
      - command: "go test ./cmd/orch/ -run Review -v -count=1"
        result: "7 tests passed"
      - command: "go test ./pkg/verify/ -run TestListUnverifiedWork -v -count=1"
        result: "2 tests passed"
    build:
      - command: "go build ./cmd/orch/"
        result: "Build succeeds (pre-existing errors in pkg/orch and pkg/agent are unrelated)"
    frontend:
      - command: "npx svelte-check --threshold error (in web/)"
        result: "No errors in changed files (pre-existing errors in work-graph/+page.svelte are unrelated)"

  smoke_test:
    description: "API endpoint returns unverified items from canonical source"
    command: "curl -sk https://localhost:3348/api/beads/review-queue | python3 -m json.tool"
    expected: "Response contains issues array with tier/gate1/gate2 fields, count matches daemon verification counter"
    notes: "Requires server restart with rebuilt binary to test live"

  files_changed:
    - path: cmd/orch/serve_beads.go
      changes: "Changed getReviewQueueIssues→getReviewQueueItems to use verify.ListUnverifiedWorkWithDir(), updated ReviewQueueIssueResponse with tier/gate fields"
    - path: web/src/lib/stores/beads.ts
      changes: "Updated ReviewQueueIssue interface with tier/gate1/gate2 fields"
    - path: web/src/lib/components/review-queue-section/review-queue-section.svelte
      changes: "Updated to display tier labels and gate status"

  manual_steps_required:
    - "Restart orch serve with rebuilt binary to verify live API response"
    - "Rebuild web frontend to verify UI displays correctly"
