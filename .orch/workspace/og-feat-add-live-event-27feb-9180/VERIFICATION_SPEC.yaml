verification:
  description: "Live event strip on work graph showing last 5 agent lifecycle events"

  automated:
    - name: "Vite build succeeds"
      command: "cd web && npx vite build"
      expected: "build completes without errors"
      result: "PASS - built in 24.03s"

    - name: "Go vet passes"
      command: "go vet ./cmd/orch/"
      expected: "no errors"
      result: "PASS - clean"

  manual:
    - name: "Event strip visible below daemon status"
      steps:
        - "Open http://localhost:5188/work-graph"
        - "Verify 'events' label appears below daemon status line"
        - "Verify up to 5 recent events shown with icons, labels, and relative timestamps"
      expected: "Compact ticker strip with color-coded events"

    - name: "Real-time event updates"
      steps:
        - "Spawn an agent via orch spawn"
        - "Watch event strip update with spawn event"
      expected: "New spawn event appears with blue + icon"

    - name: "Strip hidden when no events"
      steps:
        - "Clear events.jsonl and refresh page"
      expected: "No event strip shown (conditionally rendered)"

  files_changed:
    - web/src/routes/work-graph/+page.svelte
