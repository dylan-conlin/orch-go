verification:
  type: research
  question: "Does 1M context on Claude Code Max subscription cost extra?"

  sources_checked:
    - url: "platform.claude.com/docs/en/docs/about-claude/models"
      finding: "Opus 4.6 context window is 1M tokens (native)"
    - url: "platform.claude.com/docs/en/about-claude/pricing"
      finding: "Opus 4.6 and Sonnet 4.6 include 1M at standard pricing, no premium"
    - url: "platform.claude.com/docs/en/build-with-claude/context-windows"
      finding: "1M is standard for 4.6 models, beta header only for legacy"
    - url: "code.claude.com/docs/en/changelog.md"
      finding: "v2.1.75 enabled 1M by default for Max/Team/Enterprise"

  answer:
    costs_extra: false
    explanation: >
      1M context is the native context window for Opus 4.6 and Sonnet 4.6
      at standard pricing. Anthropic pricing page explicitly states no premium.
      Max subscription flat rate covers it entirely.
    control: "CLAUDE_CODE_DISABLE_1M_CONTEXT=1 to disable"
    when_changed: "v2.1.75 (March 13, 2026) — enabled by default for Max"

  deliverables:
    - path: ".kb/models/orchestration-cost-economics/probes/2026-03-13-probe-1m-context-max-plan-pricing.md"
      type: probe
      status: complete
    - path: ".kb/models/orchestration-cost-economics/model.md"
      type: model-update
      status: complete
      changes: "Added 1M Context Window section, updated date and probe references"

  manual_verification:
    - step: "Check Anthropic billing dashboard for any unexpected charges"
      expected: "No extra charges beyond $200/mo Max subscription"
