verification:
  automated:
    - command: "go test ./pkg/spawn/ -run TestEnsureProbeTemplate -count=1 -v"
      expect: "PASS"
      description: "EnsureProbeTemplate creates template when missing and preserves existing"

    - command: "go test ./pkg/spawn/ -run TestWriteContext_CreatesProbeTemplate -count=1 -v"
      expect: "PASS"
      description: "WriteContext auto-creates PROBE.md template when HasInjectedModels=true"

    - command: "go test ./pkg/spawn/ -run TestValidateBeadsIDConsistency -count=1 -v"
      expect: "PASS"
      description: "Beads ID consistency check detects same-project ID mismatches, ignores cross-project refs"

    - command: "go build ./pkg/spawn/"
      expect: "exit 0"
      description: "spawn package compiles cleanly"

  manual:
    - description: "Verify EnsureProbeTemplate uses DefaultProbeTemplate from probes.go (4 required sections)"
    - description: "Verify ValidateBeadsIDConsistency is called in ValidateAndWriteContext (pkg/orch/extraction.go)"

  evidence:
    tests_run: "go test ./pkg/spawn/ -count=1 - all passed (0.5s)"
    build: "go build ./pkg/spawn/ - clean"
    vet: "go vet ./pkg/spawn/ - clean"
