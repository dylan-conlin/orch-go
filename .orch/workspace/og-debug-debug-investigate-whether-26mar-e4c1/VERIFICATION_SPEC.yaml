summary: Verify whether stall tracking distinguishes slow token progress from true stalls.
checks:
  - name: Existing stall tracker tests pass
    command: go test ./pkg/daemon -run 'TestStallTracker_'
    expectation: Existing package tests pass; current coverage does not exercise repeated unchanged polls below the threshold.
    result: pass
  - name: Reproduce repeated unchanged-poll behavior
    command: |
      python3 - <<'PY'
      threshold = 180
      polls = [0, 30, 60, 90, 120, 150, 180, 210]
      last_total = None
      last_timestamp = None
      for t in polls:
          total = 1500
          if last_total is None:
              stalled = False
          elif total > last_total:
              stalled = False
          else:
              stalled = (t - last_timestamp) >= threshold
          print(f't={t}s stalled={stalled}')
          last_total = total
          last_timestamp = t
      PY
    expectation: A truly stalled agent polled every 30s should become stalled after 180s.
    result: fail_observed
    observed: Every poll remains `stalled=False`, showing the implementation measures time since the previous poll rather than time since the last token increase.
  - name: Reproduce slow-token scenario
    command: |
      python3 - <<'PY'
      threshold = 180
      polls = [0, 30, 60, 90, 120, 150, 180, 210, 240]
      series = {t: 1500 for t in polls}
      series[240] = 1600
      last_total = None
      last_timestamp = None
      for t in polls:
          total = series[t]
          if last_total is None:
              stalled = False
          elif total > last_total:
              stalled = False
          else:
              stalled = (t - last_timestamp) >= threshold
          print(f't={t}s total={total} stalled={stalled}')
          last_total = total
          last_timestamp = t
      PY
    expectation: The system should reason about elapsed no-progress time explicitly, not infer liveness from short poll gaps.
    result: fail_observed
    observed: The tracker never flags the agent even after 4 minutes without new tokens; it only clears because tokens eventually increase.
manual_verification:
  - Review `pkg/daemon/stall_tracker.go:54` through `pkg/daemon/stall_tracker.go:75` to confirm that `Timestamp` is overwritten before stalled duration is evaluated.
  - Review `cmd/orch/status_cmd.go:361` and `cmd/orch/serve_agents_handlers.go:444` with `cmd/orch/serve_agents_cache.go:166` to confirm the tracker is fed by frequent dashboard/status polling.
