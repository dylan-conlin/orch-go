verification:
  type: bug-fix
  reproduction:
    command: |
      cd ~/tmp/kb-test-project && kb context "sync pool"
    expected_before: "Models section missing from output"
    expected_after: "Models section present with go-sync-pool model"

  tests:
    - name: "tokenizer splits compound tokens"
      command: "cd ~/Documents/personal/kb-cli && go test ./internal/search/ -run TestTokenize -v"
      expected: "PASS"
    - name: "compound token matching works"
      command: "cd ~/Documents/personal/kb-cli && go test ./internal/search/ -run 'TestMatch|TestCountMatched' -v"
      expected: "PASS"
    - name: "model extraction tests pass"
      command: "cd ~/Documents/personal/kb-cli && go test ./cmd/kb/ -run 'TestExtractModelSections|TestModelSections' -v"
      expected: "PASS"
    - name: "full kb-cli test suite passes"
      command: "cd ~/Documents/personal/kb-cli && go test ./..."
      expected: "PASS"

  manual_verification:
    - step: "Run kb context 'sync pool' in test project"
      command: "cd ~/tmp/kb-test-project && kb context 'sync pool'"
      verify: "MODELS section appears with 'Go sync.Pool Under Contention'"
    - step: "Run kb context 'sync pool' --extract-models in test project"
      command: "cd ~/tmp/kb-test-project && kb context 'sync pool' --extract-models"
      verify: "MODELS section appears WITH inlined Summary, Critical Invariants, Why This Fails"
