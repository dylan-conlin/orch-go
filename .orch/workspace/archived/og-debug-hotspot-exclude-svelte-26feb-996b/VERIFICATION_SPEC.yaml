verification:
  type: automated
  commands:
    - name: "Unit tests - hotspot exclusion"
      command: "go test ./cmd/orch/ -run 'TestShouldCountFile|TestContainsSkippedDir|TestAdditionalSkipPrefixes|TestAnalyzeBloatFiles_SkipsBuildOutputDirs|TestSkipBloatDirs' -v"
      expect: "PASS"
    - name: "Build check"
      command: "go build ./cmd/orch/"
      expect: "exit 0"
    - name: "Vet check"
      command: "go vet github.com/dylan-conlin/orch-go/cmd/orch"
      expect: "exit 0"
    - name: "Smoke test - no svelte-kit in bloat"
      command: "orch hotspot --json 2>/dev/null | jq '[.hotspots[] | select(.path | contains(\"svelte-kit\"))]'"
      expect: "[]"

  key_outcomes:
    - "web/.svelte-kit/ files excluded from bloat detection at any nesting level"
    - "containsSkippedDir() uses path-segment matching, not prefix matching"
    - "buildOutputPrefixes replaced with containsSkippedDir + additionalSkipPrefixes"
    - "No regression in existing hotspot tests"
