issue: orch-go-1066
title: "Fix dashboard not showing newly spawned OpenCode agents"
skill: systematic-debugging

verification:
  build:
    - command: "go build ./cmd/orch/"
      expect: success
    - command: "go vet ./cmd/orch/"
      expect: success

  tests:
    - command: "go test ./cmd/orch/ -run TestListActiveIssues -v"
      expect: success
    - command: "go test ./cmd/orch/ -run TestHandleAgentsOpenStatusIssueVisible -v"
      expect: success
    - command: "go test ./cmd/orch/ -run TestHandleAgents -v"
      expect: success
    - command: "go test ./... -count=1"
      expect: success

  manual_verification:
    - step: "Spawn an agent without --issue flag"
      expect: "Agent appears in dashboard at /api/agents"
    - step: "Check beads issue status after auto-create spawn"
      expect: "Issue status is in_progress (not stuck at open)"

files_changed:
  - path: cmd/orch/serve_agents_discovery.go
    change: "Renamed listInProgressIssues to listActiveIssues, expanded filter to include open+in_progress"
  - path: cmd/orch/serve_agents_handlers.go
    change: "Updated call site from listInProgressIssues to listActiveIssues"
  - path: pkg/orch/extraction.go
    change: "Fixed SetupBeadsTracking to update status for auto-created issues (beadsID != empty)"
  - path: cmd/orch/serve_agents_test.go
    change: "Updated test names/expectations, added regression test TestHandleAgentsOpenStatusIssueVisible"
