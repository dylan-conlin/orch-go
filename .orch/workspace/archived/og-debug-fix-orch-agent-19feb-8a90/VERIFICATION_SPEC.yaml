verification:
  type: bug-fix
  issue: orch-go-1096

  reproduction:
    description: "orch:agent label never removed on close — bd list -l orch:agent returns historical agents"
    before:
      command: "bd list -l orch:agent | wc -l"
      expected: "13 (11 closed + 2 active)"
    after:
      command: "bd list -l orch:agent | wc -l"
      expected: "2 (only active agents)"
    verified: true

  build:
    command: "go build ./cmd/orch/"
    result: "clean (no errors)"

  vet:
    command: "go vet ./cmd/orch/"
    result: "clean (no issues)"

  tests:
    - command: "go test ./pkg/verify/"
      result: "PASS (5.762s)"
    - command: "go test ./cmd/orch/"
      result: "PASS (2.552s)"

  smoke_test:
    description: "Removed orch:agent from 11 closed issues via bd label remove, verified count dropped from 13 to 2"
    verified: true

  coverage:
    orch_complete_path: "verify.RemoveOrchAgentLabel() called after verify.CloseIssue()"
    bd_close_path: "bd label remove in .beads/hooks/on_close before orch emit"

  manual_steps_required: []
