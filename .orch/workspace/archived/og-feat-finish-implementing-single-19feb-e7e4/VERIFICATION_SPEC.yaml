verification:
  commands_run:
    - command: "go build ./cmd/orch/"
      result: "success (no output)"
    - command: "go vet ./cmd/orch/"
      result: "success (no output)"
    - command: "go test -run 'TestJoin|TestUnknown|TestExtractSession|TestLatestPhase|TestFilterActive' ./cmd/orch/ -v -count=1"
      result: "16 passed, 0 failed (0.013s)"

  acceptance_criteria:
    - criterion: "AgentStatus struct matches ADR spec"
      verified: true
      evidence: "Struct has all fields: BeadsID, SessionID, Status, Phase, ProjectDir, MissingBinding, MissingSession, SessionDead, MissingPhase, Reason"

    - criterion: "queryTrackedAgents implements 5-step pipeline"
      verified: true
      evidence: "Steps: (1) beads list orch:agent, (2) workspace manifest lookup, (3) phase extraction from comments, (4) OpenCode liveness, (5) join with reason codes"

    - criterion: "Degraded modes produce explicit reason codes"
      verified: true
      evidence: "Tests cover: missing_binding, missing_session, session_idle, session_retrying, opencode_unreachable, missing_phase"

    - criterion: "Never returns silent empty metadata"
      verified: true
      evidence: "Every AgentStatus has either populated fields or a reason code explaining why data is missing"

    - criterion: "All dependencies verified (beads.FallbackListWithLabel, spawn.LookupManifestsByBeadsIDs, opencode.GetAllSessionStatus)"
      verified: true
      evidence: "Explore agent verified all 9 dependency types/functions exist with correct signatures"

  files_changed:
    - cmd/orch/query_tracked.go (new - 335 lines)
    - cmd/orch/query_tracked_test.go (new - 364 lines)
    - pkg/beads/client.go (modified - added FallbackListWithLabel)

  not_in_scope:
    - "Wiring to orch status or dashboard (orch-go-1086)"
