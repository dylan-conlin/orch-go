## Runtime Verification (Manual Steps Required)

The following verifications require OpenCode server to be running and cannot be automated:

### 1. Worker Session TTL Verification
**Steps:**
1. Spawn a worker session: `orch spawn --headless --skill feature-impl "test task"`
2. Check OpenCode database for time_ttl field:
   ```bash
   sqlite3 ~/.local/share/opencode/opencode.db "SELECT id, title, time_ttl FROM sessions ORDER BY created DESC LIMIT 1;"
   ```
3. Verify time_ttl is set to 14400 (4 hours in seconds)

**Expected:** Worker session has time_ttl = 14400

### 2. Orchestrator Session TTL Verification
**Steps:**
1. Spawn an orchestrator session: `orch spawn --skill orchestrator --goal "test goal"`
2. Check OpenCode database for time_ttl field:
   ```bash
   sqlite3 ~/.local/share/opencode/opencode.db "SELECT id, title, time_ttl FROM sessions ORDER BY created DESC LIMIT 1;"
   ```
3. Verify time_ttl is NULL or 0

**Expected:** Orchestrator session has time_ttl = 0 or NULL (no expiration)

### 3. Automatic Cleanup Verification
**Steps:**
1. Create a test worker session with short TTL (modify code temporarily to use 60 seconds)
2. Wait 5-10 minutes (OpenCode cleanup runs every 5 minutes)
3. Query sessions to verify expired session was deleted
4. Verify active sessions (last updated within TTL) are not deleted

**Expected:** Expired sessions are automatically cleaned up by OpenCode

## Integration Points

The implementation integrates with OpenCode fork's session TTL feature (commit f3c3865b8):
- OpenCode accepts time_ttl field during session creation
- Periodic cleanup job runs every 5 minutes
- Respects active prompts (won't delete sessions with status = "busy")
- TTL is calculated from last update time, not creation time

## Notes

- The implementation follows the specification: worker sessions get 4-hour TTL, orchestrator sessions persist indefinitely
- All code paths that create sessions have been updated to pass TTL
- Tests verify that TTL is correctly included in CreateSession API requests
- Runtime verification requires manual testing with OpenCode server running
