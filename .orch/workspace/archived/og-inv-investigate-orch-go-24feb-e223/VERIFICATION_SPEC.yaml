deliverables:
  - type: code_fix
    path: pkg/daemon/skill_inference.go
    description: InferModelFromSkill returns empty for non-mapped skills (respects user config default_model)
  - type: code_fix
    path: pkg/orch/spawn_modes.go
    description: runSpawnClaude calls AtomicSpawnPhase2 with window ID for lifecycle tracking
  - type: test_update
    path: pkg/daemon/skill_inference_test.go
    description: Updated expectations for non-mapped skills returning empty string
  - type: test_update
    path: pkg/daemon/architect_escalation_test.go
    description: Updated escalation test expectation for empty model string
  - type: probe
    path: .kb/models/model-access-spawn-paths/probes/2026-02-24-probe-daemon-spawn-model-bypass-and-claude-visibility.md
    description: Evidence and analysis documenting both bugs

verification:
  build: go build ./cmd/orch/
  tests:
    - go test ./pkg/daemon/ -run TestInferModelFromSkill
    - go test ./pkg/daemon/ -run TestOnceExcluding_ArchitectEscalation_SkipsNonHotspotIssues
  vet: go vet ./cmd/orch/
