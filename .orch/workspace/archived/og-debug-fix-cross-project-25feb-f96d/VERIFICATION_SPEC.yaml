verification_spec:
  version: 1
  issue: orch-go-1257
  outcome: duplicate_of_orch-go-1234

  automated_checks:
    - name: "Go spawn tests pass"
      command: "go test ./pkg/spawn/ -run TestBuildClaude -v"
      expected: "PASS: 11/11 subtests"
      result: "PASS"

    - name: "Build succeeds"
      command: "go build ./cmd/orch/"
      expected: "no errors"
      result: "PASS"

    - name: "Vet passes"
      command: "go vet ./cmd/orch/"
      expected: "no errors"
      result: "PASS"

    - name: "Interactive orchestrator gets skill content"
      command: "cd /tmp && echo '{\"source\":\"startup\"}' | env -u ORCH_SPAWNED -u ORCH_WORKER CLAUDE_CONTEXT=orchestrator python3 ~/.orch/hooks/load-orchestration-context.py"
      expected: "JSON output with ~20KB additionalContext containing orchestrator skill"
      result: "PASS - 19,970 chars of context injected"

    - name: "Spawned agent skips injection"
      command: "cd /tmp && echo '{\"source\":\"startup\"}' | env ORCH_SPAWNED=1 CLAUDE_CONTEXT=worker python3 ~/.orch/hooks/load-orchestration-context.py"
      expected: "No output (sys.exit(0))"
      result: "PASS - no output"

  reproduction_verification:
    original_bug: "Interactive orchestrator sessions outside orch-go get NO skill content"
    reproduction_steps:
      - "Launch Claude Code with CLAUDE_CONTEXT=orchestrator but without ORCH_SPAWNED in a non-orch-go project"
      - "Verify load-orchestration-context.py hook fires and injects skill content"
    verified: true
    notes: "End-to-end test in /tmp (no .orch/ directory) confirms skill content is injected"

  prior_commit: "9024d9fac - fix: orchestrator skill loads in non-orch-go projects via ORCH_SPAWNED env var (orch-go-1234)"
