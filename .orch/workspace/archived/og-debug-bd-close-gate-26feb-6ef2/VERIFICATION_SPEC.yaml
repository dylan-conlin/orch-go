verification:
  automated:
    - name: "Unit tests pass"
      command: "cd ~/.orch/hooks && python3 -m pytest tests/test_gate_bd_close.py -v"
      expected: "25 passed"
      evidence: "25 passed in 0.09s"

    - name: "Agent-worked issue blocked in orchestrator context"
      command: "echo '{\"tool_name\": \"Bash\", \"tool_input\": {\"command\": \"bd close orch-go-sdjg\"}}' | CLAUDE_CONTEXT=orchestrator python3 ~/.orch/hooks/gate-bd-close.py"
      expected: "permissionDecision: deny"
      evidence: "Output contains deny with orch complete guidance and lists orch-go-sdjg as agent-worked"

    - name: "Unworked triage item allowed in orchestrator context"
      command: "Create temp issue without orch:agent label, test with CLAUDE_CONTEXT=orchestrator"
      expected: "No output (allowed)"
      evidence: "Verified with orch-go-wzke (status:open, no orch:agent label) - no deny output"

    - name: "Worker session passes through orchestrator gate"
      command: "echo '{\"tool_name\": \"Bash\", \"tool_input\": {\"command\": \"bd close orch-go-sdjg\"}}' | CLAUDE_CONTEXT=worker python3 ~/.orch/hooks/gate-bd-close.py"
      expected: "No output from orchestrator gate (may still hit worker gate)"
      evidence: "No output - orchestrator gate correctly returns None for worker context"

    - name: "Interactive session not gated"
      command: "echo '{\"tool_name\": \"Bash\", \"tool_input\": {\"command\": \"bd close orch-go-sdjg\"}}' | python3 ~/.orch/hooks/gate-bd-close.py"
      expected: "No output (allowed)"
      evidence: "No output - no CLAUDE_CONTEXT means no gating"

  manual:
    - name: "End-to-end orchestrator close of unworked issue"
      steps:
        - "In an orchestrator session, create a triage issue"
        - "Run bd close on it"
        - "Verify it closes without being blocked by the gate"
      status: "verified via smoke test"
