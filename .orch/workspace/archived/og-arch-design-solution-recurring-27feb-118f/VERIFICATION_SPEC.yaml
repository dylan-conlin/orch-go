---
# Verification Specification: Claude Config Dir Drift Elimination
# Design Document: .kb/investigations/2026-02-27-design-claude-config-dir-drift-elimination.md

observable_behaviors:
  primary: "Both Claude Code config directories share identical configuration via symlinks"
  secondary:
    - "Adding a hook to ~/.claude/settings.json automatically appears for personal account"
    - "Personal sessions have access to global CLAUDE.md and user-level skills"
    - "Validation script detects broken symlinks"

acceptance_criteria:
  AC-001:
    behavior: "settings.json is symlinked"
    condition: "ls -la ~/.claude-personal/settings.json shows symlink to ~/.claude/settings.json"
    threshold: "Boolean pass/fail"
  AC-002:
    behavior: "CLAUDE.md is symlinked"
    condition: "ls -la ~/.claude-personal/CLAUDE.md shows symlink to ~/.claude/CLAUDE.md"
    threshold: "Boolean pass/fail"
  AC-003:
    behavior: "skills/ is symlinked"
    condition: "ls -la ~/.claude-personal/skills shows symlink to ~/.claude/skills"
    threshold: "Boolean pass/fail"
  AC-004:
    behavior: "hooks/ is symlinked"
    condition: "ls -la ~/.claude-personal/hooks shows symlink to ~/.claude/hooks"
    threshold: "Boolean pass/fail"
  AC-005:
    behavior: "statusline.sh is symlinked"
    condition: "ls -la ~/.claude-personal/statusline.sh shows symlink to ~/.claude/statusline.sh"
    threshold: "Boolean pass/fail"
  AC-006:
    behavior: "No settings drift"
    condition: "diff ~/.claude/settings.json ~/.claude-personal/settings.json produces no output"
    threshold: "Boolean pass/fail"

failure_modes:
  FM-001:
    name: "Claude Code overwrites symlink"
    symptom: "settings.json is a regular file instead of symlink after Claude Code update"
    diagnostic: "ls -la ~/.claude-personal/settings.json — check if symlink or regular file"
    fix: "Re-create symlink: ln -sf ~/.claude/settings.json ~/.claude-personal/settings.json"
  FM-002:
    name: "New config file not symlinked"
    symptom: "New config file added to ~/.claude/ doesn't appear in ~/.claude-personal/"
    diagnostic: "Run check-config-symlinks.sh validation script"
    fix: "Add new symlink: ln -sf ~/.claude/<file> ~/.claude-personal/<file>"

evidence_requirements:
  AC-001: "ls -la output showing symlink"
  AC-006: "diff output (empty = pass)"

implementation_status: "design-only — implementation is 5 symlink commands (manual or spawned)"
