verification_spec:
  feature: "Atomic Spawn Architecture Design"
  design_document: ".kb/investigations/2026-02-19-design-atomic-spawn-workspace-manifest-orch-agent.md"

  observable_behaviors:
    primary: "Architecture investigation produced with 5 decision forks navigated using substrate reasoning"
    secondary:
      - "Probe confirms existing infrastructure readiness and identifies gaps"
      - "Implementation plan specifies 4 phases with file-level targets"
      - "Discovered work tracked as beads issues (orch-go-1089, orch-go-1090)"

  acceptance_criteria:
    - id: AC-001
      name: "All ADR requirements addressed"
      behavior: "Design covers atomic spawn, workspace manifest, orch:agent tagging, session metadata"
      condition: "Investigation has sections for each of the 4 ADR components"
      threshold: "Boolean pass/fail"
      evidence: "Investigation file at .kb/investigations/2026-02-19-design-atomic-spawn-workspace-manifest-orch-agent.md"

    - id: AC-002
      name: "Decision forks navigated with substrate"
      behavior: "Each fork cites principles, models, or prior decisions"
      condition: "5 forks have Substrate says and Recommendation sections"
      threshold: "Boolean pass/fail"
      evidence: "Investigation file Fork 1-5 sections"

    - id: AC-003
      name: "Implementation-ready output"
      behavior: "Plan has file targets, estimated lines, phase ordering"
      condition: "Implementation Plan section includes file impact summary table"
      threshold: "Boolean pass/fail"
      evidence: "Investigation file Implementation Plan section"

    - id: AC-004
      name: "Spawn_cmd.go line check performed"
      behavior: "Checked whether extraction needed before adding atomic spawn"
      condition: "spawn_cmd.go < 1500 lines (actual: 798)"
      threshold: "Boolean pass/fail"
      evidence: "Probe file observation section"

    - id: AC-005
      name: "Probe extends spawn architecture model"
      behavior: "Probe documents backend-specific challenges and new constraints"
      condition: "Probe has Model Impact section with confirms/extends findings"
      threshold: "Boolean pass/fail"
      evidence: "Probe at .kb/models/spawn-architecture/probes/2026-02-19-atomic-spawn-architecture-readiness.md"

  failure_modes:
    - id: FM-001
      symptom: "Implementation diverges from design"
      root_cause: "Backend-specific details not captured in design"
      diagnostic: "Compare implementation PR with investigation file"
      fix: "Update investigation if implementation reveals new constraints"

  manual_verification:
    - step: "Review investigation covers all 4 ADR components (atomic spawn, workspace manifest, orch:agent, session metadata)"
    - step: "Verify each fork recommendation cites substrate (principles, models, decisions)"
    - step: "Confirm implementation plan addresses all 4 backends (headless, inline, tmux, claude)"
    - step: "Check discovered work issues created and linked"
