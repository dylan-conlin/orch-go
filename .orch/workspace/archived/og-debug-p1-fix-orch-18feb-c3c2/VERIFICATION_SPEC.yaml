verification:
  type: bug-fix
  issue: orch-go-1028

  automated:
    - name: "Build passes"
      command: "go build ./cmd/orch/"
      expected: "exit 0, no errors"
      result: "PASS"

    - name: "Vet passes"
      command: "go vet ./cmd/orch/"
      expected: "exit 0, no warnings"
      result: "PASS"

    - name: "cmd/orch tests pass"
      command: "go test ./cmd/orch/ -v"
      expected: "PASS, all tests green"
      result: "PASS - 2.178s"

    - name: "model package tests pass"
      command: "go test ./pkg/model/ -v"
      expected: "PASS"
      result: "PASS"

    - name: "userconfig package tests pass"
      command: "go test ./pkg/userconfig/ -v"
      expected: "PASS"
      result: "PASS"

  behavioral:
    - name: "orch work reads default_model from config"
      description: >
        Run `orch work <beads-id>` with ~/.orch/config.yaml containing
        default_model: codex. Output should show "Model: codex" in the
        startup info, confirming the config was loaded.
      manual: true
      expected: "Model line shows 'codex' (or configured default_model value)"

    - name: "orch work with no config falls back gracefully"
      description: >
        If ~/.orch/config.yaml has no default_model field, orch work should
        not crash and should fall back to ResolveAndValidateModel's own
        default handling (sonnet).
      manual: true
      expected: "No crash, no Model line printed, default model used"

  root_cause:
    description: >
      runWork() in cmd/orch/spawn_cmd.go never set the spawnModel package
      variable from user config. The spawn pipeline's ResolveAndValidateModel
      has its own config check, but DetermineSpawnBackend uses raw spawnModel
      for the explicitModel flag, and the model choice was invisible in
      work command output.
    fix: >
      Load userconfig.Load() in runWork() and set spawnModel from
      cfg.DefaultModel when spawnModel is empty. Also print Model in
      work command output for visibility.
