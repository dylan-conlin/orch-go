verification:
  type: bug-fix
  issue: orch-go-4mw8

  reproduction:
    original_bug: >
      Daemon verification pause message shows only total count
      (e.g., "10 unverified completions") without per-project breakdown.
      When running cross-project, no way to know which projects have pending work.

    steps:
      - Run daemon with unverified completions spanning multiple projects
      - Observe verification pause log line

    expected_after_fix: >
      Pause message includes per-project counts, e.g.,
      "Verification pause: 10 unverified completions, threshold is 3 (orch-go: 4, toolshed: 3, opencode: 3)"

  automated:
    build:
      command: "go build ./cmd/orch/"
      result: "PASS"

    vet:
      command: "go vet ./cmd/orch/ && go vet ./pkg/verify/"
      result: "PASS"

    unit_tests:
      command: "go test ./pkg/verify/ -run 'TestProjectFromBeadsID|TestFormatProjectBreakdown|TestProjectBreakdown' -v"
      result: "PASS - 10 tests"

    full_package_tests:
      command: "go test ./pkg/verify/"
      result: "PASS"

  manual:
    smoke_test: >
      Cannot directly smoke-test the daemon pause in this session because
      it requires running the daemon with real unverified cross-project completions.
      The code path is verified through: (1) unit tests proving the formatting works,
      (2) the daemon helper function is a thin wrapper calling the tested pure function,
      (3) build succeeds confirming integration.

    visual_check: "N/A - CLI log output only, no UI changes"

  files_changed:
    - pkg/verify/unverified.go
    - pkg/verify/unverified_test.go
    - cmd/orch/daemon.go
