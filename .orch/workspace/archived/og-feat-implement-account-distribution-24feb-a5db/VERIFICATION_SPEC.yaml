verification:
  automated:
    - name: cache_tests
      command: "go test ./pkg/account/ -run TestCapacityCache -count=1 -v"
      expected: "8 tests PASS (NewCapacityCache, GetAndSet, TTLExpiry, Invalidate, MultipleAccounts, Overwrite, ConcurrentAccess)"

    - name: routing_tests
      command: "go test ./pkg/spawn/ -run TestResolve_AccountHeuristic -count=1 -v"
      expected: "8 tests PASS (WorkFirstWhenHealthy, SpilloverWhenWorkLow, BothExhaustedUsesPrimary, CapacityFetchFailsUsesPrimary, CLIOverridesHeuristic, NoCapacityFetcherUsesDefault, WorkLowOn7Day, CapacityError)"

    - name: existing_tests_pass
      command: "go test ./pkg/account/ ./pkg/spawn/ ./cmd/orch/ -count=1"
      expected: "All packages PASS (no regressions)"

    - name: vet_clean
      command: "go vet ./cmd/orch/ ./pkg/account/ ./pkg/spawn/"
      expected: "No vet issues"

    - name: build_succeeds
      command: "go build ./cmd/orch/"
      expected: "Build succeeds without errors"

  manual:
    - name: smoke_test_account_routing
      description: "Run 'orch spawn --account personal architect test' to verify --account flag still works after Phase 2 changes"
      status: "Deferred to orchestrator (requires live accounts.yaml with roles configured)"
