verification:
  type: behavioral
  description: "SessionProcessor stops retrying after MAX_RETRIES instead of looping forever"

  preconditions:
    - "OpenCode server rebuilt with fix (bun run build)"
    - "Anthropic API returns persistent 500 on large tool results"

  assertions:
    - name: "Retry loop terminates"
      check: "After MAX_RETRIES (5) failed attempts, processor exits retry loop"
      evidence: "Code path: retry !== undefined && attempt < MAX_RETRIES evaluates false when attempt >= 5"

    - name: "Error surfaces to user"
      check: "Session status transitions from retry to idle with error"
      evidence: "Fall-through to error handling: sets assistantMessage.error, publishes Session.Event.Error, sets status idle"

    - name: "Max retries logged"
      check: "log.error('max retries exceeded') emitted when retry exhausted"
      evidence: "Conditional at line 398: if (retry !== undefined && attempt >= MAX_RETRIES)"

    - name: "Normal retries unaffected"
      check: "Transient errors still retry up to 5 times before failing"
      evidence: "retry !== undefined && attempt < MAX_RETRIES allows attempts 0-4"

  structural_verification:
    file: "packages/opencode/src/session/processor.ts"
    changes:
      - "Line 21: Added MAX_RETRIES = 5 constant"
      - "Line 386: Changed 'if (retry !== undefined)' to 'if (retry !== undefined && attempt < MAX_RETRIES)'"
      - "Lines 398-400: Added exhaustion log when attempt >= MAX_RETRIES"

  build_verification:
    command: "cd ~/Documents/personal/opencode/packages/opencode && bun run build"
    result: "Success (all platforms)"
