verification:
  automated:
    - name: "BuildClaudeLaunchCommand includes --disallowedTools for orchestrators"
      command: "go test -run TestBuildClaudeLaunchCommand/orchestrator_context_includes_disallowedTools ./pkg/spawn/ -count=1 -v"
      expect: "PASS"

    - name: "BuildClaudeLaunchCommand includes --disallowedTools for meta-orchestrators"
      command: "go test -run TestBuildClaudeLaunchCommand/meta-orchestrator_context_includes_disallowedTools ./pkg/spawn/ -count=1 -v"
      expect: "PASS"

    - name: "BuildClaudeLaunchCommand excludes --disallowedTools for workers"
      command: "go test -run 'TestBuildClaudeLaunchCommand/worker_context_does_NOT' ./pkg/spawn/ -count=1 -v"
      expect: "PASS"

    - name: "BuildClaudeLaunchCommand handles both MCP and disallowedTools"
      command: "go test -run 'TestBuildClaudeLaunchCommand/orchestrator_with_MCP' ./pkg/spawn/ -count=1 -v"
      expect: "PASS"

    - name: "Hook blocks orchestrator bd close"
      command: "echo '{\"tool_name\": \"Bash\", \"tool_input\": {\"command\": \"bd close orch-go-1234\"}}' | CLAUDE_CONTEXT=orchestrator python3 ~/.orch/hooks/gate-bd-close.py"
      expect: "contains 'permissionDecision' and 'deny'"

    - name: "Hook blocks meta-orchestrator bd close"
      command: "echo '{\"tool_name\": \"Bash\", \"tool_input\": {\"command\": \"bd close orch-go-1234\"}}' | CLAUDE_CONTEXT=meta-orchestrator python3 ~/.orch/hooks/gate-bd-close.py"
      expect: "contains 'permissionDecision' and 'deny'"

    - name: "Hook allows worker bd close (non-gated skill)"
      command: "echo '{\"tool_name\": \"Bash\", \"tool_input\": {\"command\": \"bd close orch-go-1234\"}}' | CLAUDE_CONTEXT=worker python3 ~/.orch/hooks/gate-bd-close.py"
      expect: "no output (passthrough)"

    - name: "Hook allows orchestrator non-bd-close commands"
      command: "echo '{\"tool_name\": \"Bash\", \"tool_input\": {\"command\": \"orch spawn investigation task\"}}' | CLAUDE_CONTEXT=orchestrator python3 ~/.orch/hooks/gate-bd-close.py"
      expect: "no output (passthrough)"

    - name: "Go build succeeds"
      command: "go build ./cmd/orch/"
      expect: "exit 0"

    - name: "Go vet succeeds"
      command: "go vet ./cmd/orch/"
      expect: "exit 0"

  manual:
    - step: "Spawn an orchestrator session and verify Task/Edit/Write/NotebookEdit are absent from its toolset"
    - step: "Attempt bd close from orchestrator session and verify denial message redirects to orch complete"

  files_changed:
    - path: "pkg/spawn/claude.go"
      description: "Added --disallowedTools flag to BuildClaudeLaunchCommand for orchestrator/meta-orchestrator contexts"
    - path: "pkg/spawn/claude_test.go"
      description: "Added 4 test cases for disallowedTools behavior (orchestrator, meta-orchestrator, worker exclusion, MCP combo)"
    - path: "~/.orch/hooks/gate-bd-close.py"
      description: "Extended with orchestrator bd close gating (unconditional deny → redirect to orch complete)"
