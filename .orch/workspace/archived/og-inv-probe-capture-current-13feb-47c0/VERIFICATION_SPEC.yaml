verification:
  type: probe
  model: macos-click-freeze

  artifacts:
    - path: .kb/models/macos-click-freeze/probes/2026-02-13-service-state-freeze-recurrence.md
      type: probe
      exists: true
      required_sections:
        - Question
        - What I Tested
        - What I Observed
        - Model Impact
    - path: .kb/investigations/2026-02-13-inv-probe-capture-current-macos-service.md
      type: investigation
      exists: true
      required_sections:
        - Summary (D.E.K.N.)
        - Findings
        - Structured Uncertainty

  commands_run:
    - command: "launchctl print-disabled user/501"
      purpose: "Capture user LaunchAgent enabled/disabled state"
      verified: true
    - command: "launchctl print-disabled system/"
      purpose: "Capture system LaunchDaemon enabled/disabled state"
      verified: true
    - command: "ps aux"
      purpose: "Capture all running processes"
      verified: true
    - command: "pgrep -fl 'skhd|yabai|...'"
      purpose: "Check specific suspect processes"
      verified: true
    - command: "memory_pressure"
      purpose: "Check memory state for H4 hypothesis"
      verified: true
    - command: "vm_stat"
      purpose: "Check VM statistics for swap activity"
      verified: true
    - command: "systemextensionsctl list"
      purpose: "Check Karabiner DriverKit status"
      verified: true

  model_impact:
    contradicts:
      - claim: "skhd re-enabled in Phase 2"
        actual: "skhd is DISABLED and not running"
      - claim: "yabai disabled via launchctl, not running"
        actual: "yabai is ENABLED and RUNNING (PID 1055)"
      - claim: "H5 (NI) is STRONG SUSPECT (sole culprit)"
        actual: "NI fully uninstalled yet freeze recurred — H5 weakened"
    extends:
      - finding: "Complete service inventory with actual states"
      - finding: "H4 further weakened — 78% memory free with zero swap"
      - finding: "True suspect set identified from re-enablement delta"

  manual_steps: []

  no_code_changes: true
  scope: "state capture and analysis only — no services modified"
