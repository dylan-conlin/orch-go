verification:
  type: automated
  status: passed

  reproduction:
    description: "Gap analysis gives high quality score on wrong-project kb context"
    steps:
      - "Create KBContextResult with 5 matches, 4 having paths under /orch-go/.kb/"
      - "Call AnalyzeGaps with projectDir=/toolshed"
      - "Before fix: ContextQuality=90, HasGaps=false"
      - "After fix: ContextQuality<=20, WrongProjectCount=4, GapTypeWrongProject=critical"
    test: "go test ./pkg/spawn/ -run TestAnalyzeGaps_WrongProject -v"
    result: PASS

  tests:
    - name: "Wrong-project detection (majority wrong)"
      command: "go test ./pkg/spawn/ -run TestAnalyzeGaps_WrongProject -v"
      expectation: "WrongProjectCount=4, severity=critical, quality<=20"
      result: PASS

    - name: "All wrong-project → quality 0"
      command: "go test ./pkg/spawn/ -run TestAnalyzeGaps_AllWrongProject -v"
      expectation: "ContextQuality=0, WrongProjectCount=3"
      result: PASS

    - name: "Mixed correct/wrong → proportional"
      command: "go test ./pkg/spawn/ -run TestAnalyzeGaps_MixedCorrectAndWrong -v"
      expectation: "WrongProjectCount=1, severity=warning, quality>=40"
      result: PASS

    - name: "Empty projectDir → no detection (backward compatible)"
      command: "go test ./pkg/spawn/ -run TestAnalyzeGaps_NoProjectDir -v"
      expectation: "WrongProjectCount=0"
      result: PASS

    - name: "isWrongProjectMatch unit tests"
      command: "go test ./pkg/spawn/ -run TestIsWrongProjectMatch -v"
      expectation: "All 5 subtests pass (no path, correct, wrong, global, non-kb)"
      result: PASS

    - name: "calculateContextQuality with wrong-project stats"
      command: "go test ./pkg/spawn/ -run TestCalculateContextQuality_Wrong -v"
      expectation: "All 3 subtests pass (all wrong=0, half wrong=20-55, none wrong=80-100)"
      result: PASS

    - name: "Full pkg/spawn test suite"
      command: "go test ./pkg/spawn/ -count=1"
      expectation: "All tests pass"
      result: "PASS (0.468s)"

    - name: "Full build"
      command: "go build ./cmd/orch/"
      expectation: "Clean build"
      result: PASS

  manual_steps: []
