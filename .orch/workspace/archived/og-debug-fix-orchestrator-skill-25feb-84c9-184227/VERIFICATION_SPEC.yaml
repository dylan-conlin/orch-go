verification:
  automated:
    - name: "Go unit tests pass"
      command: "go test ./pkg/spawn/ -v -run TestBuildClaudeLaunchCommand"
      expected: "PASS"

    - name: "ORCH_SPAWNED=1 present in launch command"
      command: "go test ./pkg/spawn/ -v -run TestBuildClaudeLaunchCommand/no_MCP"
      expected: "PASS (asserts export ORCH_SPAWNED=1 in command)"

  behavioral:
    - name: "Interactive orchestrator in non-orch-go project loads skill"
      command: "cd ~/Documents/personal/skillc && echo '{\"source\":\"startup\"}' | CLAUDE_CONTEXT=orchestrator python3 ~/.orch/hooks/load-orchestration-context.py | python3 -c \"import json,sys; d=json.load(sys.stdin); print('OK' if 'Orchestrator Skill' in d['hookSpecificOutput']['additionalContext'] else 'FAIL')\""
      expected: "OK"

    - name: "Spawned agent (ORCH_SPAWNED=1) exits silently"
      command: "echo '{\"source\":\"startup\"}' | ORCH_SPAWNED=1 CLAUDE_CONTEXT=worker python3 ~/.orch/hooks/load-orchestration-context.py; echo exit=$?"
      expected: "exit=0 with no output"

    - name: "OpenCode-backend agent (ORCH_WORKER=1) exits silently"
      command: "echo '{\"source\":\"startup\"}' | ORCH_WORKER=1 python3 ~/.orch/hooks/load-orchestration-context.py; echo exit=$?"
      expected: "exit=0 with no output"

    - name: "orch-go project still loads full context (skill + dynamic state)"
      command: "cd ~/Documents/personal/orch-go && echo '{\"source\":\"startup\"}' | CLAUDE_CONTEXT=orchestrator python3 ~/.orch/hooks/load-orchestration-context.py | python3 -c \"import json,sys; d=json.load(sys.stdin); ctx=d['hookSpecificOutput']['additionalContext']; print('skill:', 'Orchestrator Skill' in ctx, 'dynamic:', 'Dynamic State' in ctx)\""
      expected: "skill: True dynamic: True"

  manual:
    - name: "Full E2E: cc personal in non-orch-go project"
      steps:
        - "cd ~/Documents/personal/skillc"
        - "cc personal"
        - "Verify orchestrator skill content appears in session context"
      note: "Requires interactive Claude Code session"
