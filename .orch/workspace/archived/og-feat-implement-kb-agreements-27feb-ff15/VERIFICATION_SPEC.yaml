verification:
  type: behavioral
  tier: light

  tests:
    command: "go test ./pkg/spawn/gates/ -run 'TestCheckAgreements|TestAgreementsResult' -count=1 -v"
    expected: "13 tests pass (PASS)"
    actual: "All 13 tests pass"

  build:
    command: "go build ./cmd/orch/"
    expected: "No errors"
    actual: "Clean build"

  vet:
    command: "go vet ./cmd/orch/ ./pkg/spawn/gates/"
    expected: "No errors"
    actual: "Clean"

  smoke_test:
    command: "orch spawn --bypass-triage investigation 'test task' 2>&1 | grep -A5 'KB Agreements'"
    expected: "KB Agreements warning appears in spawn output with failing checks"
    actual: "⚠️  KB Agreements: 1/5 checks failing — kb-agr-002 shown with details"

  files_created:
    - pkg/spawn/gates/agreements.go: "AgreementsResult type, AgreementFailure type, CheckAgreements gate function (warning-only)"
    - pkg/spawn/gates/agreements_test.go: "13 tests covering nil checker, empty dir, all pass, warning failures, error failures, daemon-silent, checker errors, multiple failures, HasFailures/HasErrors/WarningCount/ErrorCount methods"

  files_modified:
    - pkg/orch/extraction.go: "Added agreementsCheckFunc parameter to RunPreFlightChecks, added agreements gate call after hotspot check, updated return signature to include *gates.AgreementsResult"
    - cmd/orch/spawn_cmd.go: "Wire buildAgreementsChecker() into RunPreFlightChecks call"
    - cmd/orch/rework_cmd.go: "Wire buildAgreementsChecker() into RunPreFlightChecks call"
    - cmd/orch/kb.go: "Added buildAgreementsChecker() function that runs kb agreements check --json and parses output"

  design_decisions:
    - "Warning-only gate (non-blocking) per issue requirements — CheckAgreements never returns an error that blocks spawn"
    - "Daemon-driven spawns suppress output but return result for telemetry (same pattern as hotspot gate)"
    - "Checker errors (kb not installed, timeout) gracefully return nil — no spawn blocking on infrastructure failures"
    - "Injected checker function pattern (same as hotspot) to avoid circular dependencies between cmd/orch and pkg/spawn/gates"
    - "kb agreements check --json output parsed with exit code awareness — exit 1/2 still has valid JSON output"
