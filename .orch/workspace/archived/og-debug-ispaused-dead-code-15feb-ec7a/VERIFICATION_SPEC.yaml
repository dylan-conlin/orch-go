verification:
  automated:
    - name: "Build succeeds"
      command: "go build ./cmd/orch/"
      expected: "exit code 0"
      result: "PASS"

    - name: "Vet passes"
      command: "go vet ./cmd/orch/"
      expected: "exit code 0"
      result: "PASS"

    - name: "Verification tracker unit tests pass"
      command: "go test ./pkg/daemon/ -run TestVerification -v -count=1"
      expected: "10 tests PASS"
      result: "PASS (10/10, 0.011s)"

  smoke_tests:
    - name: "Startup shows verify threshold"
      command: "timeout 3 orch daemon run --poll-interval 1"
      expected: "Output includes 'Verify threshold:  3'"
      result: "PASS - 'Verify threshold:  3 (pause after N unverified completions)'"

    - name: "Proceeding log appears when not paused"
      command: "timeout 3 orch daemon run --poll-interval 1"
      expected: "Output includes 'Verification check: 0/3 unverified completions, proceeding'"
      result: "PASS"

    - name: "Pause log appears after threshold reached"
      command: "timeout 8 orch daemon run --poll-interval 2"
      expected: "Output includes 'Verification pause: N unverified completions, threshold is M'"
      result: "PASS - 'Verification pause: 4 unverified completions, threshold is 3'"

  manual:
    - name: "No manual verification steps needed"
      notes: "All verification automated via smoke tests above"
