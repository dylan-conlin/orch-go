observable_behaviors:
  - behavior: "Behavioral health section displays in orch stats output"
    acceptance_criteria:
      - "AC-001: stats_cmd.go imports pkg/coaching"
      - "AC-002: StatsReport struct has CoachingStats field of type map[string]coaching.MetricSummary"
      - "AC-003: aggregateStats() reads coaching-metrics.jsonl using coaching.ReadMetricsSince()"
      - "AC-004: outputStatsText() displays BEHAVIORAL HEALTH section with orchestrator and worker metrics"
      - "AC-005: outputStatsJSON() includes coaching_stats field in JSON output"
    evidence:
      - "orch stats --days 7 shows '🧠 BEHAVIORAL HEALTH (coaching metrics)' section"
      - "orch stats --days 7 --json includes 'coaching_stats' field in JSON"
      - "go build ./cmd/orch succeeds without errors"

  - behavior: "Orchestrator and worker metrics are separated in output"
    acceptance_criteria:
      - "AC-006: Orchestrator metrics (frame_collapse, completion_backlog, behavioral_variation, circular_pattern) shown under 'Orchestrator:' label"
      - "AC-007: Worker metrics (tool_failure_rate, context_usage, session_timeout, spawn_depth_exceeded) shown under 'Workers:' label"
      - "AC-008: Timestamps formatted as relative time (e.g., '2h ago', '15m ago')"
      - "AC-009: Warning emoji (⚠️) shown for recent events (<30 minutes)"
    evidence:
      - "Test output shows correct metric categorization and formatting"
      - "Timestamps display correctly with relative time format"

failure_modes:
  - symptom: "Behavioral health section not showing in stats output"
    root_cause: "coaching-metrics.jsonl file doesn't exist or is empty"
    fix: "Check file exists at ~/.orch/coaching-metrics.jsonl"
    
  - symptom: "Compilation errors about coaching package"
    root_cause: "Incorrect module path in import"
    fix: "Use github.com/dylan-conlin/orch-go/pkg/coaching"
    
  - symptom: "JSON output missing coaching_stats"
    root_cause: "Field not added to StatsReport struct"
    fix: "Add CoachingStats field with json tag"

verification_commands:
  - command: "go build ./cmd/orch"
    expected_output: "No output (successful build)"
    actual_result: "✅ Build succeeds, binary created at /tmp/orch-test"
    
  - command: "/tmp/orch-test stats --days 7"
    expected_output: "Text output with BEHAVIORAL HEALTH section showing orchestrator and worker metrics"
    actual_result: "✅ Section displays with frame_collapse (13 events), behavioral_variation (173 events), circular_pattern (7 events), context_usage (3 events)"
    
  - command: "/tmp/orch-test stats --days 7 --json | grep coaching_stats"
    expected_output: "JSON field with coaching metrics aggregated by type"
    actual_result: "✅ coaching_stats field present with all metric types and their summaries"

manual_steps:
  - step: "Verify metric categorization"
    procedure: "Check that orchestrator metrics appear under Orchestrator label and worker metrics under Workers label"
    result: "✅ Correct categorization in output"
    
  - step: "Verify timestamp formatting"
    procedure: "Check that timestamps show relative time (Xm ago, Xh ago, Xd ago)"
    result: "✅ Timestamps formatted correctly"
    
  - step: "Verify warning emoji for recent events"
    procedure: "Check that events <30 minutes old show ⚠️ emoji"
    result: "✅ Warning emoji displays for behavioral_variation (15m ago)"

deliverables:
  - name: "Updated stats_cmd.go"
    status: "complete"
    location: "cmd/orch/stats_cmd.go"

notes:
  - "Phase 2 of coaching metrics redesign (see .kb/investigations/2026-02-14-design-coaching-metrics-redesign.md)"
  - "Depends on Phase 1 (pkg/coaching shared reader - completed in prior work)"
  - "No regressions: builds successfully, existing stats output unchanged except for new section"
  - "Output format matches design specification with orchestrator/worker separation"
