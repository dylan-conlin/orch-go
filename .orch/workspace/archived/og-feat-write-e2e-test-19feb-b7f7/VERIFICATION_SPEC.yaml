behaviors:
  - name: "E2E test script validates two-lane agent discovery"
    acceptance_criteria:
      - id: AC-001
        description: "Script runs against live system and exits 0 when all tests pass"
        evidence: "bash tests/e2e_two_lane.sh → 31 passed, 0 failed, exit code 0"
      - id: AC-002
        description: "Lane 1 tests verify tracked agents have beads_id, required metadata, and don't appear in sessions lane"
        evidence: "Tests 1a-1f all PASS: agents have beads_id (1/1), required metadata, lane separation confirmed"
      - id: AC-003
        description: "Lane 2 tests verify untracked sessions have valid category and don't appear in status lane"
        evidence: "Tests 2a-2e all PASS: 7 sessions found with valid categories, lane separation confirmed"
      - id: AC-004
        description: "API parity tests verify /api/agents and /api/sessions match CLI output"
        evidence: "Tests 3a-3g all PASS: API session count (7) >= CLI count (7)"
      - id: AC-005
        description: "Regression guards catch 12h filter bug (orch-go-1094) and closed-issue filter (orch-go-1093)"
        evidence: "Tests 5a-5c all PASS: default sessions == ?since=all (7==7), filter works (12h:0 <= default:7)"
      - id: AC-006
        description: "Script supports --quick mode to skip API parity checks"
        evidence: "bash tests/e2e_two_lane.sh --quick → 24 passed, 1 skipped, exit code 0"

    failure_modes:
      - id: FM-001
        symptom: "Prerequisites fail"
        fix: "Start services with: orch-dashboard start"
      - id: FM-002
        symptom: "Lane separation test fails"
        fix: "Check classifyUntrackedSession() in untracked_sessions.go and queryTrackedAgents() in query_tracked.go"
      - id: FM-003
        symptom: "12h filter regression (test 5a)"
        fix: "Check parseSinceParamWithDefault() in serve_filter.go defaults to 0 for sessions"

commands_run:
  - "bash tests/e2e_two_lane.sh"
  - "bash tests/e2e_two_lane.sh --quick"

manual_steps: []
