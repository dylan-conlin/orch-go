verification:
  commands_run:
    - "go build ./cmd/orch/"
    - "orch stats --days 1 --json"
    - "diff plugins/coaching.ts .opencode/plugin/coaching.ts"

  expectations:
    - Go build passes (TypeScript plugin is not compiled by Go, but validates no Go regressions)
    - Both coaching.ts copies are byte-identical
    - orch stats --json returns valid JSON with summary, skill_stats, verification_stats, coaching_stats fields

  manual_verification:
    - "Start a new OpenCode session (non-worker) and check debug logs for health summary injection"
    - "Enable ORCH_PLUGIN_DEBUG=1 to see [coaching] log lines for the event hook"
    - "Verify worker sessions (spawned via orch spawn) do NOT receive health summary injection"

  deliverables:
    - plugins/coaching.ts: Added session.created event hook, execAsync/delay/formatHealthSummary helpers
    - .opencode/plugin/coaching.ts: Kept in sync (byte-identical copy)

  key_behaviors:
    - event hook fires on session.created, returns early for non-session.created events
    - Worker sessions skipped via metadata.role check AND 3s delayed workerSessions cache check
    - orch stats --days 1 --json called with 10s timeout
    - Health summary injected via client.session.prompt with noReply:true
    - Fire-and-forget pattern (doesn't block session creation)
    - Errors caught and logged only in DEBUG mode
