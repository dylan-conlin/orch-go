deliverable: Dashboard split-and-grow node transformation animations
type: feature
status: complete

verification_approach: visual-inspection

environment:
  required:
    - Dashboard running at http://localhost:5188
    - Tree API endpoint at http://localhost:3348/api/tree
    - Knowledge tree populated with issues and artifacts

verification_steps:
  - step: 1
    description: Verify pulsing animation for active agents
    command: |
      # 1. Navigate to http://localhost:5188/knowledge-tree
      # 2. Find an issue node with status "in_progress"
      # 3. Observe node icon pulsing (opacity 1 → 0.7 → 1, scale 1 → 1.02 → 1)
    expectation: Active agent nodes pulse smoothly with 2s cycle
    actual: Animation implemented - CSS keyframe `pulse-node` on `.pulsing` class
    evidence: web/src/lib/components/knowledge-tree/knowledge-tree.svelte lines 130-143

  - step: 2
    description: Verify status transition smoothness (triage → in_progress → complete)
    command: |
      # 1. Observe node as it changes status
      # 2. Check CSS transitions apply to background, border, opacity, transform
    expectation: Smooth 300ms transitions between status states
    actual: CSS transitions defined on `.node-button` for all state changes
    evidence: web/src/lib/components/knowledge-tree/knowledge-tree.svelte lines 164-170

  - step: 3
    description: Verify split-and-grow animation when issue produces artifact
    command: |
      # Scenario 1: Observe existing transformed node
      # 1. Navigate to knowledge tree
      # 2. Find issue node with status "complete" that has artifact children
      # 3. Issue node should be faded/small, artifact child visible
      #
      # Scenario 2: Live transformation (requires agent completing work)
      # 1. Start agent that produces investigation/decision/model
      # 2. Watch tree in real-time as agent completes
      # 3. Issue node fades/shrinks, artifact grows with scale-in animation
    expectation: |
      - Issue node fades to 30% opacity, shrinks to 80% scale, turns gray
      - Artifact node grows from 80% to 100% scale over 300ms
      - Both animations smooth and not jarring
    actual: |
      Split-and-grow implemented:
      - Transformation detection in reactive block (checks status change + artifact children)
      - Issue fade-shrink animation: `@keyframes fade-shrink` (800ms)
      - Artifact grow-in: Svelte's `scale` transition (300ms, start: 0.8)
    evidence: |
      - web/src/lib/components/knowledge-tree/knowledge-tree.svelte lines 16-29 (transformation detection)
      - web/src/lib/components/knowledge-tree/knowledge-tree.svelte lines 148-161 (CSS animation)
      - web/src/lib/components/knowledge-tree/knowledge-tree.svelte line 88 (scale transition)

  - step: 4
    description: Verify animation works for all artifact types
    command: |
      # Check transformation works for:
      # - investigation (◉)
      # - decision (★)
      # - model (◆)
    expectation: Split-and-grow animation triggers for all three artifact types
    actual: |
      Artifact type check implemented in lines 21-24:
      `const hasArtifact = node.Children.some(child => 
        ['investigation', 'decision', 'model'].includes(child.Type)
      );`
    evidence: web/src/lib/components/knowledge-tree/knowledge-tree.svelte lines 20-24

  - step: 5
    description: Build verification
    command: cd web && npm run build
    expectation: Build succeeds with no TypeScript or Svelte errors
    actual: |
      ✓ 4356 modules transformed
      ✓ built in 12.35s
    evidence: Build output (some a11y warnings pre-existing, not related to this change)

manual_steps:
  - description: Visual verification of animations in browser
    reason: Animation smoothness and aesthetic quality require human judgment
    checklist:
      - Navigate to http://localhost:5188/knowledge-tree
      - Verify pulsing animation on in_progress nodes is smooth, not jarring
      - Verify status transitions fade smoothly
      - Verify completed issue nodes with artifacts show faded/small issue + visible artifact
      - Confirm animation durations feel natural (not too fast/slow)

edge_cases:
  - case: Issue completes without producing artifact
    behavior: No split-and-grow animation triggers (status completes but no transformation)
  - case: Issue has multiple artifact children
    behavior: Animation triggers once when first artifact appears
  - case: Rapid status changes (triage → in_progress → complete)
    behavior: Transitions queue naturally via CSS, no jarring jumps

notes: |
  - Animation detection is frontend-only (no backend changes required)
  - Transformation tracked in component state via reactive block
  - SSE updates already push tree changes, animations apply automatically
  - localStorage expansion state preserved across animations
  - No performance impact expected (CSS animations GPU-accelerated)

limitations:
  - Live transformation testing requires:
    1. Agent spawned via `orch spawn`
    2. Agent produces .kb/ artifact (investigation/decision/model)
    3. Dashboard SSE connection active
    4. Tree refresh interval (2s polling) detects new artifact
  - If SSE disconnected, animations still work but updates require manual refresh

recommendations:
  - Test with real agent completion to verify live split-and-grow
  - Monitor animation performance with large trees (800+ nodes)
  - Consider adding custom easing curves for more organic feel
