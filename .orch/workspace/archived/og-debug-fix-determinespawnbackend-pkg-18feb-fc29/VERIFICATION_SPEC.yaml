verification:
  automated:
    - command: "go build ./cmd/orch/"
      expectation: "Clean build, no errors"
      result: "PASS"

    - command: "go vet ./cmd/orch/"
      expectation: "No vet warnings"
      result: "PASS"

    - command: "go test ./pkg/orch/ -run TestDetermineSpawnBackend -v"
      expectation: "All 7 tests pass"
      result: "PASS - 7/7 tests passing (0.007s)"

  manual:
    - description: "Verify user config backend is respected"
      steps:
        - "Check ~/.orch/config.yaml has backend: opencode"
        - "Run: go test ./pkg/orch/ -run TestDetermineSpawnBackend_UserConfigFallback -v"
        - "Confirm test passes - backend resolves to 'opencode' from user config"
      result: "PASS"

  reproduction:
    original_bug: "DetermineSpawnBackend ignores ~/.orch/config.yaml backend setting, falls through to hardcoded 'claude' default"
    fix_verification: "TestDetermineSpawnBackend_UserConfigFallback confirms user config backend is now used as fallback. TestDetermineSpawnBackend_HardcodedDefaultIsOpencode confirms default is no longer 'claude'."
    result: "Bug no longer reproduces"
