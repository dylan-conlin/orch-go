verification:
  commands:
    - name: "Full knowledge tree renders in <2s"
      command: "time orch tree >/dev/null"
      expectation: "Completes in under 2 seconds (actual: 0.093s)"
      result: "✓ PASS - 0.093 seconds"
    
    - name: "Knowledge tree with depth limit"
      command: "orch tree --depth 2"
      expectation: "Shows clusters and top-level artifacts only"
      result: "✓ PASS - Renders clusters with 2 levels of depth"
    
    - name: "Cluster filtering"
      command: "orch tree --cluster serve-performance --depth 2"
      expectation: "Shows only serve-performance cluster"
      result: "✓ PASS - Filtered to single cluster"
    
    - name: "JSON output format"
      command: "orch tree --format json --depth 1 | head -50"
      expectation: "Valid JSON with node structure"
      result: "✓ PASS - Valid JSON with Type, Title, Children fields"
    
    - name: "Work view (placeholder)"
      command: "orch tree --work"
      expectation: "Renders work tree header (empty for Phase 1)"
      result: "✓ PASS - Renders 'orch-go work tree' header"
    
    - name: "Build succeeds"
      command: "go build ./..."
      expectation: "No build errors"
      result: "✓ PASS - Build successful"
    
    - name: "Tests pass"
      command: "go test ./pkg/tree/..."
      expectation: "All tests pass"
      result: "✓ PASS - 4/4 tests passing"

  manual_verification:
    - step: "Visual inspection of tree output"
      expectation: "Unicode box-drawing characters render correctly"
      result: "✓ PASS - Characters render correctly: ├─ └─ │"
    
    - step: "Icon rendering"
      expectation: "Node icons display correctly: ◉ ◇ ● ★ ◆ ◈"
      result: "✓ PASS - All icons render correctly"
    
    - step: "Relationship extraction"
      expectation: "Prior-Work tables parsed correctly"
      result: "✓ PASS - Test shows relationships extracted from markdown tables"

scope:
  completed:
    - "pkg/tree/types.go - Core data structures"
    - "pkg/tree/parser.go - Parse investigations, decisions, models, guides, probes"
    - "pkg/tree/cluster.go - Filesystem-based cluster detection"
    - "pkg/tree/renderer.go - ASCII tree rendering with Unicode box-drawing"
    - "pkg/tree/tree.go - Main tree builder"
    - "pkg/tree/tree_test.go - Unit tests for core functionality"
    - "cmd/orch/tree_cmd.go - CLI command implementation"
  
  deferred_to_phase_2:
    - "Beads integration for work view (issues grouped by state)"
    - "Health smell detection (15+ investigations warning)"
    - "Color coding for node types"
    - "Dashboard web integration"
    - "Embedding-based clustering"

deliverables:
  - "✓ orch tree command (knowledge view)"
  - "✓ orch tree --work command (work view placeholder)"
  - "✓ --cluster, --depth, --format options"
  - "✓ ASCII renderer with Unicode box-drawing"
  - "✓ Performance: <2s (actual: 0.093s)"
  - "✓ Tests: 4/4 passing"
  - "✓ Build: successful"

notes:
  - "Work view is a placeholder for Phase 1 - full implementation requires beads integration"
  - "Performance is excellent: 0.093s vs 2s requirement"
  - "All parsing logic handles missing files gracefully with warnings"
  - "Cluster detection uses filesystem paths in .kb/investigations/synthesized/"
