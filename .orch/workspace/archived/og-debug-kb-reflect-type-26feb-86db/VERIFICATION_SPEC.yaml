verification:
  type: bug-fix
  issue: orch-go-9emh

  reproduction:
    before: "kb reflect --type skill-candidate shows 'beads (16 entries)' — all 16 are superseded in .kb/quick"
    after: "kb reflect --type skill-candidate shows 'beads (4 entries, 1 recent)' — only active entries"
    command: "kb reflect --type skill-candidate 2>&1 | grep 'beads ('"

  tests:
    command: "cd ~/Documents/personal/kb-cli && go test ./cmd/kb/ -run TestReflectSkillCandidate -v"
    expected: "6/6 PASS"
    new_tests:
      - TestReflectSkillCandidateFiltersSupersededEntries
      - TestReflectSkillCandidatePrefersQuickOverKn

  smoke_test:
    command: "kb reflect --type skill-candidate 2>&1 | grep 'beads ('"
    expected: "beads (4 entries, 1 recent)"
    verified: true

  files_changed:
    - path: ~/Documents/personal/kb-cli/cmd/kb/reflect.go
      change: "Updated Reflect() to prefer .kb/quick over .kn for skill-candidate entries; updated findSkillCandidates comment"
    - path: ~/Documents/personal/kb-cli/cmd/kb/reflect_test.go
      change: "Added 2 tests for superseded filtering and .kb/quick preference"

  no_regressions:
    command: "cd ~/Documents/personal/kb-cli && go test ./cmd/kb/ -timeout 120s"
    result: "3 pre-existing failures (TestCreateGuide, TestTruncateSummary, TestFindOpenCandidatesFiltersByAge) — all confirmed pre-existing via git stash test"
