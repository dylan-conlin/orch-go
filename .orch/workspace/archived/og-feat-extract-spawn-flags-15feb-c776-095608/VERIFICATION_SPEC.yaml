# Verification Spec: Extract --mode flag to pkg/orch/

## Summary
Pure structural extraction of --mode flag from cmd/orch/spawn_cmd.go into pkg/orch/flags.go.
No behavior changes.

## Changes Made
1. Created pkg/orch/flags.go with:
   - `Mode` variable (exported)
   - `RegisterModeFlag()` function for flag registration
2. Updated cmd/orch/spawn_cmd.go to:
   - Call `orch.RegisterModeFlag(spawnCmd)` in init() (line 208)
   - Use `orch.Mode` in buildSpawnConfig() (line 931)
3. Removed local spawnMode variable from spawn_cmd.go

## Verification Steps

### 1. Code Structure
**Command:**
```bash
# Verify flags.go exists
test -f pkg/orch/flags.go && echo "✓ flags.go exists"

# Verify spawn_cmd.go uses the extracted flag
grep -n "orch.RegisterModeFlag\|orch.Mode" cmd/orch/spawn_cmd.go
```

**Expected:**
- flags.go exists
- spawn_cmd.go line 208: `orch.RegisterModeFlag(spawnCmd)`
- spawn_cmd.go line 931: `Mode: orch.Mode,`

**Actual:**
