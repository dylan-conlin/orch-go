verification:
  automated:
    - name: Go build
      command: go build ./cmd/orch/
      expected: "no errors"
      result: PASS

    - name: Svelte type check (stats-bar.svelte)
      command: "npx svelte-check 2>&1 | grep stats-bar"
      expected: "no errors in stats-bar.svelte"
      result: PASS

  manual:
    - name: Stats bar verification indicator
      description: |
        Open dashboard at http://localhost:5188. The stats bar should show
        a shield icon with "N/T since verify" where N is completions_since_verification
        and T is threshold from the daemon API (/api/daemon). Previously showed
        "N unverified" from the verification API (/api/verification).
      verification: |
        Confirmed daemon API returns verification.completions_since_verification=10
        and verification.threshold=3. The stats bar now reads from $daemon.verification
        instead of $verification.unverified_count.

    - name: Work graph header verification display
      description: |
        Open work graph at http://localhost:5188/work-graph. The daemon status
        line in the header should now include "N/T since verify" after the queue
        summary, with amber coloring when daemon is paused.
      verification: |
        Added daemon.verification display to work-graph header line 649-651.
        Shows completions_since_verification/threshold with "(paused)" when is_paused=true.

    - name: Daemon API data availability
      command: "curl -sk https://localhost:3348/api/daemon | python3 -c \"import sys,json; d=json.load(sys.stdin); print(d['verification'])\""
      expected: "verification object with completions_since_verification and threshold fields"
      result: "PASS - {'is_paused': True, 'completions_since_verification': 10, 'threshold': 3, ...}"
