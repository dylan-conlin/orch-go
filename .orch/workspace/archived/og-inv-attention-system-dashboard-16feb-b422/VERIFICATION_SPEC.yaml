verification:
  type: investigation-audit
  description: "Full audit of attention pipeline: backend collectors through frontend badge rendering"

  checks:
    - name: "Live API returns real data from registered collectors"
      type: manual
      check: "curl -sk https://localhost:3348/api/attention returns items with valid signal types from real collector sources"
      evidence: "59 items returned: 33 issue-ready from BeadsCollector, 26 recently-closed from RecentlyClosedCollector. All 11 sources registered."
      result: pass

    - name: "All 11 collectors have real detection logic (not stubs)"
      type: code-review
      check: "Each collector in pkg/attention/ queries real data sources (beads CLI, git log, agents HTTP API, events.jsonl)"
      evidence: "Reviewed all 11 collector files. Each has working Collect() method reading real data. None return hardcoded values."
      result: pass

    - name: "mapSignalToBadge default fallback causes false badges"
      type: manual
      check: "attention.ts:138 default case returns 'verify' for unmapped signals"
      evidence: "33 issue-ready signals all map to 'verify' badge. 5 signal types (issue-ready, stale, duplicate-candidate, competing, epic-orphaned) have no explicit mapping."
      result: pass

    - name: "3 badge types have no backend collector"
      type: code-review
      check: "decide, escalate, crashed badge types exist in TypeScript types but no collector emits these signals"
      evidence: "Searched all collector files in pkg/attention/. No collector emits 'decide', 'escalate', or 'crashed' signals."
      result: pass

    - name: "Probe file created and complete"
      type: artifact
      check: "Probe at .kb/models/dashboard-architecture/probes/2026-02-16-attention-pipeline-full-audit.md has all 4 required sections"
      evidence: "File created with Question, What I Tested, What I Observed, Model Impact sections all populated"
      result: pass

  outcome: pass
  summary: "All 11 attention collectors are real implementations reading real data. The system is architecturally sound but functionally broken at the frontend mapping layer. Zero correct badges are currently displayed."
