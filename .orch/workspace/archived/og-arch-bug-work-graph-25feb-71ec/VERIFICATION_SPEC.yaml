---
# Verification Specification: Work Graph 'unassigned' Cross-Project Bug
# Issue: orch-go-1228
# Type: Bug investigation (root cause + recommended fix)

observable_behaviors:
  - name: "Cross-project in_progress issues show 'unassigned'"
    description: "Work-graph UI shows 'unassigned' text under cross-project issues that are in_progress, even when an active agent exists"
    current_state: "BROKEN - confirmed via live API"

acceptance_criteria:
  - id: AC-001
    description: "API returns active_agent data for cross-project in_progress issues"
    test_command: "curl -sk 'https://localhost:3348/api/beads/graph?project_dir=.../toolshed' | python3 -c \"import json,sys; [print(n['id'],n.get('active_agent','MISSING')) for n in json.load(sys.stdin)['nodes'] if n['status']=='in_progress']\""
    expected: "active_agent field populated with phase/model/runtime (not MISSING)"
    current_result: "active_agent: MISSING"

  - id: AC-002
    description: "Local in_progress issues continue to show active_agent data (no regression)"
    test_command: "curl -sk 'https://localhost:3348/api/beads/graph' | python3 -c \"...\""
    expected: "active_agent field populated for orch-go in_progress issues"
    current_result: "PASSING (already works)"

root_cause:
  primary_file: "cmd/orch/serve_beads.go"
  primary_line: 1069
  primary_function: "buildActiveAgentMap()"
  description: "Uses client.ListSessions('') which only returns default-project sessions"

  secondary_file: "cmd/orch/query_tracked.go"
  secondary_line: 104
  secondary_function: "listTrackedIssues()"
  description: "Uses beads.FindSocketPath('') which only queries local beads database"

recommended_fix:
  - file: "cmd/orch/serve_beads.go"
    line: 1069
    change: "Replace client.ListSessions('') with listSessionsAcrossProjects(client, sourceDir)"
  - file: "cmd/orch/query_tracked.go"
    line: 104
    change: "Accept projectDirs parameter and query each project's beads for orch:agent issues"

manual_verification:
  - step: "Open http://localhost:5188/work-graph with toolshed context"
    check: "In_progress toolshed issues show agent phase/runtime instead of 'unassigned'"
