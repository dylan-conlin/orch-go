verification:
  type: contract-tests
  issue: orch-go-1088
  adr: .kb/decisions/2026-02-18-two-lane-agent-discovery.md

  commands:
    primary:
      command: go test -v -run "TestContract_|TestArchitectureLint_" ./cmd/orch/
      expected: "PASS: 20 tests, 0 failures"
    build:
      command: go build ./cmd/orch/
      expected: "no errors"
    vet:
      command: go vet ./cmd/orch/
      expected: "no errors"

  acceptance_matrix:
    scenario_1_tracked_visible:
      test: TestContract_TrackedAgent_VisibleInStatus
      adr_row: "Tracked agent spawned"
      verifies: "Visible in orch status with full metadata"
      status: pass

    scenario_2_completed_gone:
      test: TestContract_TrackedAgent_CompletedGoneFromStatus
      adr_row: "Tracked agent completed"
      verifies: "Gone from orch status (issue closed)"
      status: pass

    scenario_3_notrack_excluded:
      tests:
        - TestContract_NoTrack_NotInOrcheStatus
        - TestContract_NoTrack_VisibleInSessions
      adr_row: "--no-track agent spawned"
      verifies: "Visible in orch sessions, NOT in orch status"
      status: pass

    scenario_4_orchestrator:
      tests:
        - TestContract_OrchestratorSession_VisibleInSessions
        - TestContract_OrchestratorSession_SkillInference
      adr_row: "Orchestrator session"
      verifies: "Visible in orch sessions"
      status: pass

    scenario_5_beads_down:
      test: TestContract_BeadsDown_AtomicSpawnRejectsNoTrackFalse
      adr_row: "Beads down during spawn"
      verifies: "Spawn fails with clear error"
      note: "Structural verification of NoTrack gate; beads RPC not mockable in unit test"
      status: pass

    scenario_6_opencode_down:
      test: TestContract_OpenCodeDown_StatusUnknown
      adr_row: "OpenCode down"
      verifies: "Agents shown with status=unknown, reason=opencode_unreachable"
      status: pass

    scenario_7_workspace_missing:
      test: TestContract_WorkspaceMissing_ReasonCode
      adr_row: "Workspace missing"
      verifies: "Agent shown with reason=missing_binding"
      status: pass

    scenario_8_cross_project:
      tests:
        - TestContract_CrossProject_CorrectProjectDir
        - TestContract_CrossProject_ManifestLookup
      adr_row: "Cross-project --workdir"
      verifies: "Correct project_dir in metadata"
      status: pass

    scenario_9_concurrent:
      test: TestContract_ConcurrentSpawns_NoDuplicates
      adr_row: "Concurrent spawns (5x)"
      verifies: "All 5 visible, no duplicates"
      status: pass

    scenario_10_restart:
      test: TestContract_ServerRestart_NoGhosts
      adr_row: "Server restart"
      verifies: "Agents survive (from beads), no ghosts, stale sessions get reason codes"
      status: pass

    scenario_11_lint:
      tests:
        - TestArchitectureLint_NoNewLifecycleStatePackages
        - TestArchitectureLint_NoNewLifecycleStateInDiff
        - TestArchitectureLint_NoPersistentLifecycleFiles
        - TestArchitectureLint_ForbiddenPackageImports
      adr_row: "New pkg/state/ file added"
      verifies: "Lint failure blocks forbidden packages, imports, and git additions"
      status: pass

    scenario_12_two_lane_comprehensive:
      tests:
        - TestContract_TrackedSessionExcludedFromSessions
        - TestContract_TwoLaneSplit_Comprehensive
      adr_row: "Two-lane split completeness"
      verifies: "Sessions partitioned into exactly one of tracked/orchestrator/no-track/ad-hoc"
      status: pass

  manual_steps: []

  files_created:
    - cmd/orch/contract_two_lane_test.go
    - cmd/orch/architecture_lint_test.go
