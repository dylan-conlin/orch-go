---
Observable Behavior: |
  VerificationTracker maintains thread-safe state under concurrent access,
  correctly pausing at threshold and resuming atomically.

Acceptance Criteria:
  AC-001:
    description: Concurrent RecordCompletion calls increment counter atomically
    test_command: go test -race -run TestVerificationTracker_ConcurrentRecordCompletion ./pkg/daemon
    expected: All 100 completions recorded, exactly one pause signal, no race conditions
    
  AC-002:
    description: Mixed concurrent operations (RecordCompletion, IsPaused, Status, Resume) maintain valid state
    test_command: go test -race -run TestVerificationTracker_ConcurrentMixedOperations ./pkg/daemon
    expected: No race conditions, final state has non-negative completion count
    
  AC-003:
    description: Rapid pause/resume cycles (100 iterations) maintain state consistency
    test_command: go test -race -run TestVerificationTracker_RapidPauseResumeCycles ./pkg/daemon
    expected: All 100 cycles pause at threshold=3, resume clears pause and resets counter
    
  AC-004:
    description: Concurrent pause/resume with ongoing completions maintains invariants
    test_command: go test -race -run TestVerificationTracker_ConcurrentPauseResume ./pkg/daemon
    expected: No race conditions, completion count never negative
    
  AC-005:
    description: Concurrent RecordHumanVerification and RecordCompletion maintain consistency
    test_command: go test -race -run TestVerificationTracker_ConcurrentVerificationAndCompletion ./pkg/daemon
    expected: No race conditions, final state has non-negative count
    
  AC-006:
    description: Threshold boundary concurrent access (50 goroutines crossing threshold simultaneously)
    test_command: go test -race -run TestVerificationTracker_ThresholdBoundaryConcurrent ./pkg/daemon
    expected: Tracker pauses, at least one pause signal, all completions recorded

Failure Modes:
  FM-001:
    symptom: Race condition detected during concurrent access
    fix: Verify all VerificationTracker methods use proper mutex locking
    
  FM-002:
    symptom: Pause signal returned to multiple goroutines when only one should
    fix: Check atomic threshold comparison logic in RecordCompletion
    
  FM-003:
    symptom: Counter becomes negative after concurrent resume operations
    fix: Verify Resume() atomically resets counter to 0

Evidence:
  - Test output: All 6 pressure tests pass with -race flag
  - Command: go test -race -run TestVerificationTracker ./pkg/daemon
  - Result: PASS - no race conditions detected
  - Added tests:
    * TestVerificationTracker_ConcurrentRecordCompletion
    * TestVerificationTracker_ConcurrentMixedOperations  
    * TestVerificationTracker_RapidPauseResumeCycles
    * TestVerificationTracker_ConcurrentPauseResume
    * TestVerificationTracker_ConcurrentVerificationAndCompletion
    * TestVerificationTracker_ThresholdBoundaryConcurrent

Manual Steps Required:
  - None - all verification is automated via tests

Notes:
  - Pre-existing test failures in pkg/daemon/extraction_test.go (TestInferTargetFilesFromIssue)
    are unrelated to these changes
  - All verification tracker tests pass with race detector
  - Tests cover: 100 concurrent goroutines, 1000 rapid operations, mixed operation patterns,
    threshold boundary races
