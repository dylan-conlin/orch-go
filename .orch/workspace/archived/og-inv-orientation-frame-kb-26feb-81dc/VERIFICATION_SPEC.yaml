    - command: "grep -A 20 'func findKBDir' kb-cli/cmd/kb/create.go"
      purpose: "Verify kb reflect's project scoping mechanism"
      result: "Strictly checks {projectDir}/.kb/ only"

    - command: "grep -A 30 'func discoverProjects' kb-cli/cmd/kb/search.go"
      purpose: "Verify --global project discovery mechanism"
