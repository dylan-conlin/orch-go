verification:
  commands_ran:
    - "go build ./cmd/orch/"
    - "go vet ./cmd/orch/ ./pkg/orch/"
    - "go test ./pkg/orch/ -run TestValidateMode -v"
    - "go test ./pkg/orch/ -run TestDetermineSpawnBackend -v"
    - "go test ./... (full suite, all pass)"

  acceptance_criteria:
    mode_validation:
      description: "--mode rejects backend names with helpful error"
      verified: true
      evidence: "TestValidateMode passes: 'claude' and 'opencode' produce errors containing '--backend' suggestion"

    infra_advisory:
      description: "Infrastructure detection is advisory when --backend explicit"
      verified: true
      evidence: "TestDetermineSpawnBackend_InfraAdvisory passes: explicit --backend opencode preserved despite infra detection"

    backend_wins:
      description: "Explicit --backend always wins over --opus flag"
      verified: true
      evidence: "TestDetermineSpawnBackend_ExplicitBackendWins passes: --backend opencode --opus → opencode"

  manual_verification_needed:
    - "orch spawn --mode claude → should error with helpful message pointing to --backend"
    - "orch spawn --backend opencode --opus → should warn but respect --backend opencode"

  files_changed:
    - "pkg/orch/flags.go: Added ValidateMode(), validModes list"
    - "pkg/orch/flags_test.go: New test file for ValidateMode"
    - "pkg/orch/extraction.go: Updated DetermineSpawnBackend for advisory infra + --backend wins"
    - "pkg/orch/extraction_test.go: New test file for DetermineSpawnBackend"
    - "cmd/orch/spawn_cmd.go: Added ValidateMode call early in spawn pipeline"
