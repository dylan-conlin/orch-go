verification:
  type: bug-fix
  issue: orch-go-eqjn
  priority: P0

  checks:
    - name: build_passes
      command: "go build ./cmd/orch/"
      expect: exit_code_0

    - name: daemon_tests_pass
      command: "go test ./pkg/daemon/ -run TestHasExisting -v -timeout 30s"
      expect: all_pass
      tests:
        - TestHasExistingSession (7 subtests — existing OpenCode dedup)
        - TestHasExistingSession_ServerError
        - TestHasExistingTmuxWindowForBeadsID_NoWindow
        - TestHasExistingTmuxWindowForBeadsID_WindowExists
        - TestHasExistingSessionForBeadsID_TmuxFallback

    - name: go_vet_clean
      command: "go vet ./pkg/daemon/"
      expect: no_output

    - name: no_regressions
      command: "go test ./pkg/daemon/ -timeout 60s"
      expect: all_pass

  root_cause:
    summary: >
      HasExistingSessionForBeadsID() only checked OpenCode API sessions.
      Claude CLI backend creates tmux windows without OpenCode sessions,
      bypassing the entire session dedup layer for 55% of daemon spawns.

  fix:
    summary: >
      Added tmux window check (Layer 2) to HasExistingSessionForBeadsID()
      using tmux.FindWindowByBeadsIDAllSessions(). The combined check now
      detects agents running in either OpenCode sessions or tmux windows.

  files_changed:
    - pkg/daemon/session_dedup.go
    - pkg/daemon/session_dedup_test.go
    - pkg/daemon/daemon.go

  discovered_work:
    - title: "Pool active count undercounting for Claude backend"
      file: pkg/daemon/active_count.go
      severity: medium
      description: >
        DefaultActiveCount() only counts OpenCode sessions, missing Claude
        backend tmux windows. May cause over-spawning beyond max_agents limit.

    - title: "Fresh status check fails-open on beads RPC errors"
      file: pkg/daemon/daemon.go
      severity: low
      description: >
        Lines 679-704 fail-open on beads errors, allowing spawns without
        dedup verification during transient connection issues.
