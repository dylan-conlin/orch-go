verification:
  automated:
    - name: "Go build succeeds"
      command: "go build ./cmd/orch/"
      expected: "exit code 0"

    - name: "Go vet passes"
      command: "go vet ./cmd/orch/ && go vet ./pkg/tree/"
      expected: "exit code 0"

    - name: "Tree package tests pass"
      command: "go test ./pkg/tree/... -v"
      expected: "6 tests pass, 0 failures"

    - name: "Alphabetical sort is correct"
      command: "curl -sk 'https://localhost:3348/api/tree?view=knowledge&sort=alphabetical' | python3 -c \"import json,sys; d=json.load(sys.stdin); titles=[c['Title'].lower() for c in d['Children']]; assert titles==sorted(titles), f'Not sorted: {titles}'; print('PASS')\""
      expected: "PASS"

    - name: "Sort modes produce different orderings"
      command: |
        alpha=$(curl -sk 'https://localhost:3348/api/tree?view=knowledge&sort=alphabetical' | python3 -c "import json,sys; d=json.load(sys.stdin); print([c['Title'] for c in d['Children']])")
        recency=$(curl -sk 'https://localhost:3348/api/tree?view=knowledge&sort=recency' | python3 -c "import json,sys; d=json.load(sys.stdin); print([c['Title'] for c in d['Children']])")
        [ "$alpha" != "$recency" ] && echo "PASS: Different orderings" || echo "FAIL: Same ordering"
      expected: "PASS: Different orderings"

  manual: []
