verification:
  commands_ran:
    - "go test ./cmd/orch -run TestSuggestPhantomAction"

  acceptance_criteria:
    open_reconcile_lists_phantoms:
      description: "orch reconcile --open lists open issues with no live tmux/OpenCode session"
      verified: false
      evidence: "Not run manually"

    suggestions_include_action:
      description: "Suggested action is orch complete --force when last phase is Complete, otherwise orch abandon"
      verified: true
      evidence: "TestSuggestPhantomAction covers Complete/Planning/empty phase behavior"

    json_output_includes_suggestions:
      description: "JSON output includes suggested_action and suggested_command for each phantom"
      verified: false
      evidence: "Not run manually"

  manual_verification_needed:
    - "orch reconcile --open (verify phantom list + suggested commands)"
    - "orch reconcile --open --json (verify suggested_action/suggested_command fields)"

  files_changed:
    - "cmd/orch/reconcile.go: add --open phantom reconciliation with suggestions"
    - "cmd/orch/reconcile_test.go: add suggestPhantomAction tests"
