verification:
  type: bug-fix
  issue: orch-go-ym0m

  reproduction:
    before:
      command: "go run ./cmd/orch/ review triage --non-interactive"
      expected: "No triage:review items found."
      actual: "Shows 28 items (all open issues, unfiltered)"

    after:
      command: "go run ./cmd/orch/ review triage --non-interactive"
      expected: "No triage:review items found."
      actual: "No triage:review items found."

  root_cause:
    file: pkg/beads/cli_client.go
    function: "CLIClient.List()"
    description: >
      Labels and LabelsAny fields from ListArgs were not passed as -l
      and --label-any flags to the bd list CLI command. When the beads
      daemon socket is absent, all List() calls with label filters
      silently returned unfiltered results.

  fix:
    files_changed:
      - pkg/beads/cli_client.go
      - pkg/beads/cli_client_test.go
    description: >
      Added Labels (-l) and LabelsAny (--label-any) flag passthrough
      in CLIClient.List() method.

  tests:
    unit:
      command: "go test ./pkg/beads/ -run TestCLIClient_ListArgsBuilding -v"
      result: "6/6 subtests passed"
    full_suite:
      command: "go test ./pkg/beads/ -v"
      result: "57 passed, 10 skipped, 0 failed"
    vet:
      command: "go vet ./pkg/beads/ ./cmd/orch/"
      result: "clean"

  smoke_test:
    command: "go run ./cmd/orch/ review triage --non-interactive"
    expected: "No triage:review items found."
    result: "PASS"

  manual_steps: []
