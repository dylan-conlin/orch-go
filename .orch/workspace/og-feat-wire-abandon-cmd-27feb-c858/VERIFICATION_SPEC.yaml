verification:
  type: behavioral
  tier: light

commands_run:
  - "go build ./cmd/orch/"
  - "go vet ./cmd/orch/"
  - "go test ./pkg/agent/ -v -count=1"
  - "go test ./cmd/orch/ -count=1"
  - "go test ./... -count=1 -timeout 120s"

expectations:
  - description: "abandon_cmd.go calls LifecycleManager.Abandon for tracked agents"
    verified: true
    evidence: "runAbandon() builds AgentRef and calls lm.Abandon() for !isUntracked path"

  - description: "orch:agent label removed on abandon (ghost agent fix)"
    verified: true
    evidence: "LifecycleManager.Abandon effect #1: beads.RemoveLabel(beadsID, 'orch:agent') — critical effect"

  - description: "Assignee cleared on abandon"
    verified: true
    evidence: "LifecycleManager.Abandon effect #2: beads.ClearAssignee(beadsID) — critical effect"

  - description: "Lifecycle adapters implement pkg/agent interfaces"
    verified: true
    evidence: "Compile-time interface checks in lifecycle_adapters.go + TestAdaptersImplementInterfaces passes"

  - description: "All existing tests pass"
    verified: true
    evidence: "go test ./... — all 41 packages pass, 0 failures"

  - description: "Session transcript exported before session deletion"
    verified: true
    evidence: "Phase 4 exports transcript, Phase 5 calls Abandon which deletes session"

  - description: "Untracked agents handled without lifecycle manager"
    verified: true
    evidence: "isUntracked path uses inline tmux/session/event cleanup, no beads ops"

manual_verification_needed: []

files_changed:
  - cmd/orch/abandon_cmd.go
  - cmd/orch/lifecycle_adapters.go
  - cmd/orch/lifecycle_adapters_test.go
