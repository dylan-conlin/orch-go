verification:
  type: bug-fix
  issue: orch-go-w1qt

  reproduction:
    original_bug: "orch send to tmux-backend agents: message text lands in pane but never gets submitted"
    root_causes:
      - "resolveSessionID returns tmux window IDs (e.g., @339) as if they're OpenCode session IDs, silently dropping messages via the API"
      - "No delay between SendKeysLiteral and SendEnter in tmux send-keys — Enter processed before TUI ingests pasted text"
    verified_fixed: true
    verification_method: "Smoke test: ran orch send orch-go-w1qt 'test message' and confirmed delivery via tmux path"

  tests:
    unit:
      command: "go test -count=1 -v ./pkg/tmux/"
      expected: "37 tests PASS including TestSendTextAndSubmit"
      result: "PASS (2.37s)"
    vet:
      command: "go vet ./cmd/orch/ ./pkg/tmux/ ./pkg/spawn/"
      expected: "No issues"
      result: "Clean"
    build:
      command: "go build -o /tmp/orch-test ./cmd/orch/"
      expected: "Success"
      result: "Success"

  smoke_tests:
    - name: "Claude-backend agent receives message via tmux"
      command: "orch send orch-go-w1qt 'test message'"
      before_fix: "Message routed via API with window ID @339 — silently dropped"
      after_fix: "Message routed via tmux with stable window ID @339 — delivered"
      verified: true

  behavioral:
    - "isOpenCodeSessionID correctly filters @-prefixed window IDs from OpenCode session resolution"
    - "sendViaTmux uses stable window ID (@xxx) instead of volatile session:index"
    - "SendTextAndSubmit includes 500ms delay between text and Enter"
    - "findTmuxWindowByIdentifier searches orchestrator and meta-orchestrator sessions"

  manual_steps_required: []
