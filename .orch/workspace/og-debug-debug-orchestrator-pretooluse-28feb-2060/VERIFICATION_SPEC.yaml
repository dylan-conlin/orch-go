verification:
  type: behavioral
  status: verified

  tests_run:
    - name: "Hook fires on orchestrator reading .go file"
      command: |
        echo '{"tool_name": "Read", "tool_input": {"file_path": "/test/main.go"}}' | CLAUDE_CONTEXT=orchestrator python3 ~/.orch/hooks/gate-orchestrator-code-access.py
      expected: "JSON with additionalContext containing coaching nudge"
      result: pass

    - name: "Hook silent on non-code file"
      command: |
        echo '{"tool_name": "Read", "tool_input": {"file_path": "/test/CLAUDE.md"}}' | CLAUDE_CONTEXT=orchestrator python3 ~/.orch/hooks/gate-orchestrator-code-access.py
      expected: "No output"
      result: pass

    - name: "Hook silent for non-orchestrator context"
      command: |
        echo '{"tool_name": "Read", "tool_input": {"file_path": "/test/main.go"}}' | CLAUDE_CONTEXT=worker python3 ~/.orch/hooks/gate-orchestrator-code-access.py
      expected: "No output"
      result: pass

    - name: "Live verification in Claude Code session"
      method: "Reading gate-orchestrator-task-tool.py (.py file) triggered system-reminder with coaching nudge text"
      result: pass

  smoke_test:
    description: "During this debugging session, reading .py files triggered the coaching nudge as a <system-reminder> injected into Claude's context"
    result: pass

  manual_verification:
    description: "Start a new Claude Code session in orch-go project, read any .go file. A system-reminder should appear with the coaching nudge text."
