verification:
  type: behavioral
  issue: orch-go-lvu0

  automated:
    - name: "IsActiveForConcurrency tests"
      command: "go test ./pkg/agent/ -run IsActiveForConcurrency -v"
      expect: "7 tests pass — idle agents never count, running agents always count, Phase:Complete excluded"

    - name: "GetMaxAgents tests"
      command: "go test ./pkg/spawn/gates/ -run GetMaxAgents -v"
      expect: "6 tests pass — -1=default, 0=unlimited, >0=specific limit, env var fallback"

    - name: "GetMaxAgents integration tests (cmd/orch)"
      command: "go test ./cmd/orch/ -run TestGetMaxAgents -v"
      expect: "4 tests pass — same behavior verified from cmd layer"

    - name: "Build succeeds"
      command: "go build ./cmd/orch/"
      expect: "No errors"

  manual:
    - name: "Bug 1 repro: idle agents don't block spawns"
      steps:
        - "Have idle agents (orch status shows idle agents)"
        - "Run: orch spawn --bypass-triage architect 'test' --reason 'testing fix'"
        - "Verify: spawn succeeds (no concurrency limit error)"
      expect: "Spawn proceeds — idle agents no longer counted"

    - name: "Bug 2 repro: --max-agents 0 means unlimited"
      steps:
        - "Run: orch spawn --bypass-triage --max-agents 0 architect 'test' --reason 'testing fix'"
        - "Verify: no concurrency limit error regardless of agent count"
      expect: "Spawn proceeds — 0 disables the limit"

  reproduction_verified: true
  reproduction_notes: >
    Bug 1: IsActiveForConcurrency("idle", recentTime, "") now returns false (was true).
    15 idle agents produce activeCount=0, well under limit of 5.
    Bug 2: GetMaxAgents(0) now returns 0 (was falling through to default 5).
    CheckConcurrency treats maxAgents==0 as unlimited (skips check).
