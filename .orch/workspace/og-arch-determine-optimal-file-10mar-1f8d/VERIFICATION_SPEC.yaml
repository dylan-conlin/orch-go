verification_spec:
  version: 1
  type: investigation

  assertions:
    - name: "Investigation file complete"
      check: "test -f .kb/investigations/2026-03-10-design-determine-optimal-file-size-targets.md"
      expected: "File exists with Status: Complete"

    - name: "Extract-patterns model updated"
      check: "grep -c 'Three-Number Framework' .kb/models/extract-patterns/model.md"
      expected: "At least 1 match — model updated with new framework"

    - name: "Phase 2 targets specified"
      check: "grep -c 'Target Residual' .kb/investigations/2026-03-10-design-determine-optimal-file-size-targets.md"
