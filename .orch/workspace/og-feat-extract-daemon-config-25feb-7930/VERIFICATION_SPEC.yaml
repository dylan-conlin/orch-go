verification:
  type: behavioral
  tier: 1

  commands:
    - name: "Build verification"
      command: "go build ./cmd/orch/"
      expected: "exits 0, no errors"

    - name: "Package tests"
      command: "go test ./pkg/daemonconfig/... -count=1"
      expected: "PASS — all 13 tests pass including new TestBuildPlistData and TestGeneratePlist"

    - name: "Integration tests"
      command: "go test ./cmd/orch/ -count=1"
      expected: "PASS — plist-related tests in doctor_test.go still pass"

  behavioral_checks:
    - description: "buildPlistData removed from config_cmd.go"
      command: "grep -c 'func buildPlistData' cmd/orch/config_cmd.go"
      expected: "exits 1 (no matches — function removed)"

    - description: "BuildPlistData exists in daemonconfig"
      command: "grep -c 'func BuildPlistData' pkg/daemonconfig/plist.go"
      expected: "1"

    - description: "GeneratePlist exists in daemonconfig"
      command: "grep -c 'func GeneratePlist' pkg/daemonconfig/plist.go"
      expected: "1"

    - description: "config_cmd.go uses daemonconfig.BuildPlistData"
      command: "grep -c 'daemonconfig.BuildPlistData' cmd/orch/config_cmd.go"
      expected: "1"

    - description: "serve_system.go uses daemonconfig.GeneratePlist"
      command: "grep -c 'daemonconfig.GeneratePlist' cmd/orch/serve_system.go"
      expected: "1"

  notes: |
    Phase 2 of daemon config extraction (orch-go-1092 design).
    Moved buildPlistData() from cmd/orch/config_cmd.go to pkg/daemonconfig/plist.go.
    Added GeneratePlist() convenience function.
    config_cmd.go reduced by 35 lines, serve_system.go simplified.
