verification:
  tests:
    - command: "go test ./pkg/kbmetrics/ -run 'Decision|Validate|Extract' -v"
      expect: "PASS"
    - command: "go build ./cmd/orch/"
      expect: "no errors"
  smoke:
    - command: "go run ./cmd/orch/ kb audit decisions"
      expect: "Decision Audit: N decisions (N architectural, N implementation)"
    - command: "go run ./cmd/orch/ kb audit decisions --json --type implementation"
      expect: "valid JSON array of DecisionReport objects"
    - command: "go run ./cmd/orch/ kb audit decisions --type architectural"
      expect: "only ARCH-tagged entries"
  manual: []
