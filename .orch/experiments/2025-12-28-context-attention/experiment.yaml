name: context-attention
hypothesis: |
  Constraint position and framing affect whether agents recognize pre-existing answers.
  An agent with the answer in line 85 of 569 re-investigated for 30 minutes.
  We test whether moving constraints to top and/or changing framing improves recognition.
created: "2025-12-28"
status: running
runs_per_condition: 2

conditions:
  A:
    description: "Top position (line 10), KNOWN ANSWER framing"
    spawn_context_mods:
      constraint_position: top
      constraint_framing: known_answer
  B:
    description: "Top position (line 10), Constraint framing (current style)"
    spawn_context_mods:
      constraint_position: top
      constraint_framing: constraint
  C:
    description: "Buried position (line 85), KNOWN ANSWER framing"
    spawn_context_mods:
      constraint_position: buried
      constraint_framing: known_answer
  D:
    description: "Buried position (line 85), Constraint framing (baseline/control)"
    spawn_context_mods:
      constraint_position: buried
      constraint_framing: constraint

metrics:
  - tool_calls_before_recognition
  - recognized_existing_answer
  - time_to_recognition_seconds
