claims:

  # --- Section: The Problem: Accretion ---

  - id: HE-01
    text: "Every agent does the right thing. The codebase degrades anyway."
    type: observation
    scope: local
    evidence: "daemon.go growth from 667 to 1,559 lines across 30 individually-correct commits over 60 days"
    strength: strong
    lines: "9"

  - id: HE-02
    text: "daemon.go grew from 667 lines to 1,559 lines in 60 days from 30 individually correct commits"
    type: observation
    scope: local
    evidence: "Direct measurement of file size over time, commit history"
    strength: strong
    lines: "13"

  - id: HE-03
    text: "Accretion is the thermodynamic tendency of multi-agent codebases toward entropy"
    type: mechanism
    scope: universal
    evidence: "Metaphor applied to daemon.go growth pattern. No formal entropy measure defined."
    strength: weak
    lines: "15"
    notes: "Overclaimed. 'Thermodynamic tendency' uses physics language for a software pattern. No formal entropy metric."

  - id: HE-04
    text: "Faster, more capable agents accrete more code per session with higher confidence"
    type: generalization
    scope: universal
    evidence: "Asserted. daemon.go data doesn't isolate model capability as a variable. Merge experiment shows equal conflict rates."
    strength: weak
    lines: "15"
    notes: "Stated as fact but evidence doesn't support the directional claim about capability → worse coordination."

  - id: HE-05
    text: "Individual excellence doesn't compose into collective coherence without structural coordination"
    type: generalization
    scope: bounded
    evidence: "daemon.go as illustrative example; consistent with multi-agent systems literature"
    strength: moderate
    lines: "15"

  - id: HE-06
    text: "Feature gravity — new code lands in existing run functions because that's where the Cobra command lives"
    type: mechanism
    scope: local
    evidence: "runDaemonLoop() grew to 702 lines as gravitational center for daemon features"
    strength: strong
    lines: "21"

  - id: HE-07
    text: "6 cross-cutting concerns independently reimplemented across 4-9 files each (~2,100 lines of duplicated infrastructure)"
    type: observation
    scope: local
    evidence: "Direct measurement via AST fingerprinting (pkg/dupdetect/)"
    strength: strong
    lines: "24"

  - id: HE-08
    text: "Three entropy spirals over 12 weeks. 1,625 commits lost in a single crash."
    type: observation
    scope: local
    evidence: "Event logs, git history, crash records"
    strength: strong
    lines: "27"

