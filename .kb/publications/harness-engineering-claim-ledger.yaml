  # --- Section: The Framework: Harness Engineering ---

  - id: HE-19
    text: "Agent failure is a harness bug, not an agent bug (attributed to OpenAI Codex team)"
    type: mechanism
    scope: universal
    evidence: "Attributed to external source (OpenAI). Applied here as design principle."
    strength: moderate
    lines: "123"
    notes: "Probe review flagged this as potentially unfalsifiable — any agent failure can be attributed to harness."

  - id: HE-20
    text: "Hard harness for enforcement, soft harness for orientation (hard/soft taxonomy)"
    type: recommendation
    scope: bounded
    evidence: "Consistent with observed behavior across experiments 1-3"
    strength: moderate
    lines: "129-144"

  - id: HE-21
    text: "Behavioral constraints dilute in context — worst content type for enforcement"
    type: mechanism
    scope: bounded
    evidence: "87 constraints → ~83 non-functional in orchestrator skill (dependent on HE-12 methodology)"
    strength: weak
    lines: "147-151"
    notes: "Key design claim rests on the unvalidated 265-trial methodology."

