name: Resource Guardrails

on:
  pull_request:
    branches: [master, main]

jobs:
  resource-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install golangci-lint v2.8.0
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Fetch base branch for delta checks
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: C1 - bounded lifetime analyzer (new issues only)
        run: |
          golangci-lint custom
          ./bin/custom-gcl run --enable-only boundedlifetime --new-from-rev "origin/${{ github.base_ref }}" ./...

      - name: C2 - exec.Start cleanup guardrail
        run: scripts/pre-commit-exec-start-cleanup.sh --diff-base "origin/${{ github.base_ref }}"
