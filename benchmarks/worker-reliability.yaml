name: worker-reliability
default_model: opus
trials: 3
parallel: 2
thresholds:
  pass_rate: 0.8
  max_error_rate: 0.1
  max_rework_rate: 0.5
scenarios:
  - name: simple-feature
    skill: feature-impl
    task: "Add a hello world HTTP endpoint at /health that returns 200 OK"
    eval: "go test ./..."
    max_reworks: 1
    timeout: 30m
  - name: bug-fix
    skill: systematic-debugging
    task: "Fix the sorting function to handle nil slice input"
    eval: "make test"
    max_reworks: 2
    timeout: 20m
  - name: test-addition
    skill: feature-impl
    task: "Add unit tests for the config parsing module"
    eval: "go test ./pkg/config/..."
    model: sonnet
    max_reworks: 1
    timeout: 15m
