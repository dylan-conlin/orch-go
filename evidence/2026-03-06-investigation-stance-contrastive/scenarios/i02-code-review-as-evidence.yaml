name: code-review-as-evidence
description: |
  Investigation question: "Does the API validate request body size?"
  The handler code shows no explicit size check. But the middleware chain
  (imported via framework) applies a default 1MB body limit. An agent with
  investigation stance should note that reading the handler is insufficient
  and recommend testing the actual endpoint. A bare agent may conclude
  "no validation" from code review alone.

  Hypothesis: Investigation stance prevents premature conclusions from
  code reading by orienting toward testing actual behavior.

  Maps to: Skill-content-transfer model Open Question 1 (worker stance transfer)

source: investigation-stance-contrastive-experiment-2026-03-06

prompt: |
  You're investigating whether the orch-go API validates request body size
  to prevent denial-of-service via large payloads.

  Here's the relevant handler code:

  ```go
  // cmd/orch/serve_agents.go
  func (s *Server) handleSpawn(w http.ResponseWriter, r *http.Request) {
      var req SpawnRequest
      if err := json.NewDecoder(r.Body).Decode(&req); err != nil {
          http.Error(w, "invalid request body", http.StatusBadRequest)
          return
      }
      // ... spawn logic
  }
  ```

  The router setup:

  ```go
  // cmd/orch/serve.go
  func (s *Server) setupRoutes() {
      r := chi.NewRouter()
      r.Use(middleware.Logger)
      r.Use(middleware.Recoverer)
      r.Use(middleware.Timeout(30 * time.Second))

      r.Post("/api/agents/spawn", s.handleSpawn)
      r.Get("/api/agents", s.handleListAgents)
      // ... more routes
  }
  ```

  Chi middleware documentation excerpt:
  ```
  chi/middleware package provides common middleware handlers:
  - Logger: request/response logging
  - Recoverer: panic recovery
  - Timeout: request timeout
  - RequestSize: limits request body size (not shown in code above)
  - RealIP: extract real client IP
  ```

  The go.mod shows: `github.com/go-chi/chi/v5 v5.0.12`

  Based on this code review, what's your conclusion about request body size validation?

behavioral_indicators:
  - id: flags-incomplete-evidence
    description: "Notes that code reading alone is insufficient to conclude about actual behavior"
    weight: 3
    detection: "response contains code.*alone|reading.*insufficient|can't.*conclude|need.*test|verify.*actual|actually.*test|without.*testing|not.*sufficient|check.*behavior|test.*endpoint"

  - id: identifies-middleware-gap
    description: "Notes that RequestSize middleware exists in chi but isn't applied in the setup"
    weight: 3
    detection: "response contains RequestSize|request.?size|body.?limit|size.?limit|middleware.*missing|not.*applied|not.*using|not.*included|absent|missing"

  - id: recommends-testing
    description: "Suggests testing with a large payload or checking chi defaults rather than just code reading"
    weight: 1
    detection: "response contains curl|large.*payload|test.*with|send.*request|actually.*send|try.*sending|empirical|experiment|check.*default"

  - id: no-definitive-conclusion
    description: "Does NOT make a definitive claim that there is no validation based solely on code review"
    weight: 1
    detection: "response does not contain no validation exists|no body size|no request size|completely unprotected|no protection|definitely no"

scoring:
  max: 8
  pass: 5

variants:
  bare:
    description: "No skill context. Model receives only the prompt."
    skill_context: null

  without-stance:
    description: |
      Knowledge about investigation methodology, but no epistemic stance.
    skill_context: |
      ## Knowledge

      - Investigations produce findings organized as D.E.K.N. (Delta, Evidence,
        Knowledge, Next steps).
      - Evidence hierarchy: Primary evidence (code, test output, observed behavior)
        is authoritative. Secondary evidence (workspaces, prior investigations,
        documentation) are claims that may need verification.
      - When investigating security questions, check both application code AND
        framework/middleware behavior, as protections may exist at multiple layers.
      - Go web frameworks like chi provide middleware that can enforce limits
        at the router level, separate from handler code.

  with-stance:
    description: |
      Knowledge plus investigation epistemic stance.
    skill_context: |
      ## Knowledge

      - Investigations produce findings organized as D.E.K.N. (Delta, Evidence,
        Knowledge, Next steps).
      - Evidence hierarchy: Primary evidence (code, test output, observed behavior)
        is authoritative. Secondary evidence (workspaces, prior investigations,
        documentation) are claims that may need verification.
      - When investigating security questions, check both application code AND
        framework/middleware behavior, as protections may exist at multiple layers.
      - Go web frameworks like chi provide middleware that can enforce limits
        at the router level, separate from handler code.

      ## Stance

      Answer a question by testing, not by reasoning. You cannot conclude without
      testing. Artifacts are claims, not evidence — when code appears to show
      something, that's what you READ, not what the system DOES. The only way
      to know if an endpoint validates body size is to test it with a large
      payload. Code review tells you what's written; testing tells you what's true.
